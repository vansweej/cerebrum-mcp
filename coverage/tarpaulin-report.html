\n        }\n    }\n\n    /// Set the maximum number of retries.\n    pub fn with_max_retries(mut self, max_retries: u32) -\u003e Self {\n        self.max_retries = max_retries;\n        self\n    }\n\n    /// Set the initial backoff duration.\n    pub fn with_initial_backoff_ms(mut self, ms: u64) -\u003e Self {\n        self.initial_backoff_ms = ms;\n        self\n    }\n\n    /// Set the maximum backoff duration.\n    pub fn with_max_backoff_ms(mut self, ms: u64) -\u003e Self {\n        self.max_backoff_ms = ms;\n        self\n    }\n\n    /// Set the backoff multiplier.\n    pub fn with_backoff_multiplier(mut self, multiplier: f64) -\u003e Self {\n        self.backoff_multiplier = multiplier;\n        self\n    }\n\n    /// Set whether to use jitter.\n    pub fn with_jitter(mut self, use_jitter: bool) -\u003e Self {\n        self.use_jitter = use_jitter;\n        self\n    }\n\n    /// Calculate the backoff duration for a given attempt number.\n    pub fn calculate_backoff(\u0026self, attempt: u32) -\u003e Duration {\n        let backoff_ms =\n            (self.initial_backoff_ms as f64 * self.backoff_multiplier.powi(attempt as i32)) as u64;\n        let backoff_ms = backoff_ms.min(self.max_backoff_ms);\n\n        if self.use_jitter {\n            // Add jitter: random value between 0 and backoff_ms\n            let jitter = (backoff_ms as f64 * 0.1) as u64; // 10% jitter\n            Duration::from_millis(backoff_ms + jitter)\n        } else {\n            Duration::from_millis(backoff_ms)\n        }\n    }\n}\n\nimpl Default for RetryConfig {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Circuit breaker for handling transient failures.\n///\n/// The circuit breaker has three states:\n/// - Closed: Normal operation, requests pass through\n/// - Open: Too many failures, requests fail immediately\n/// - Half-Open: Testing if the service has recovered\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum CircuitState {\n    /// Normal operation, requests pass through.\n    Closed,\n    /// Too many failures, requests fail immediately.\n    Open,\n    /// Testing if the service has recovered.\n    HalfOpen,\n}\n\n/// Configuration for circuit breaker.\n#[derive(Debug, Clone)]\npub struct CircuitBreakerConfig {\n    /// Number of consecutive failures to trigger open state.\n    pub failure_threshold: u64,\n    /// Duration to wait before transitioning from Open to HalfOpen.\n    pub timeout_ms: u64,\n}\n\nimpl CircuitBreakerConfig {\n    /// Create a new CircuitBreakerConfig with default values.\n    pub fn new() -\u003e Self {\n        Self {\n            failure_threshold: 5,\n            timeout_ms: 60000, // 1 minute\n        }\n    }\n\n    /// Set the failure threshold.\n    pub fn with_failure_threshold(mut self, threshold: u64) -\u003e Self {\n        self.failure_threshold = threshold;\n        self\n    }\n\n    /// Set the timeout duration.\n    pub fn with_timeout_ms(mut self, ms: u64) -\u003e Self {\n        self.timeout_ms = ms;\n        self\n    }\n}\n\nimpl Default for CircuitBreakerConfig {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Circuit breaker for handling transient failures.\npub struct CircuitBreaker {\n    state: Arc\u003cstd::sync::Mutex\u003cCircuitState\u003e\u003e,\n    failure_count: Arc\u003cAtomicU64\u003e,\n    last_failure_time: Arc\u003cstd::sync::Mutex\u003cOption\u003cInstant\u003e\u003e\u003e,\n    config: CircuitBreakerConfig,\n}\n\nimpl CircuitBreaker {\n    /// Create a new circuit breaker.\n    pub fn new(config: CircuitBreakerConfig) -\u003e Self {\n        Self {\n            state: Arc::new(std::sync::Mutex::new(CircuitState::Closed)),\n            failure_count: Arc::new(AtomicU64::new(0)),\n            last_failure_time: Arc::new(std::sync::Mutex::new(None)),\n            config,\n        }\n    }\n\n    /// Get the current state of the circuit breaker.\n    pub fn state(\u0026self) -\u003e CircuitState {\n        *self.state.lock().unwrap()\n    }\n\n    /// Record a successful operation.\n    pub fn record_success(\u0026self) {\n        let mut state = self.state.lock().unwrap();\n        self.failure_count.store(0, Ordering::Relaxed);\n        *state = CircuitState::Closed;\n        debug!(\"Circuit breaker: success, state=Closed\");\n    }\n\n    /// Record a failed operation.\n    pub fn record_failure(\u0026self) {\n        let failures = self.failure_count.fetch_add(1, Ordering::Relaxed) + 1;\n        *self.last_failure_time.lock().unwrap() = Some(Instant::now());\n\n        if failures \u003e= self.config.failure_threshold {\n            let mut state = self.state.lock().unwrap();\n            *state = CircuitState::Open;\n            warn!(\n                \"Circuit breaker: failure threshold reached ({}), state=Open\",\n                failures\n            );\n        }\n    }\n\n    /// Check if a request should be allowed.\n    pub fn allow_request(\u0026self) -\u003e Result\u003c()\u003e {\n        let mut state = self.state.lock().unwrap();\n\n        match *state {\n            CircuitState::Closed =\u003e Ok(()),\n            CircuitState::Open =\u003e {\n                // Check if timeout has elapsed\n                if let Some(last_failure) = *self.last_failure_time.lock().unwrap() {\n                    if last_failure.elapsed() \u003e Duration::from_millis(self.config.timeout_ms) {\n                        *state = CircuitState::HalfOpen;\n                        debug!(\"Circuit breaker: timeout elapsed, state=HalfOpen\");\n                        Ok(())\n                    } else {\n                        Err(CerebrumError::Unavailable(\n                            \"Circuit breaker is open\".to_string(),\n                        ))\n                    }\n                } else {\n                    Err(CerebrumError::Unavailable(\n                        \"Circuit breaker is open\".to_string(),\n                    ))\n                }\n            }\n            CircuitState::HalfOpen =\u003e Ok(()),\n        }\n    }\n\n    /// Reset the circuit breaker to closed state.\n    pub fn reset(\u0026self) {\n        let mut state = self.state.lock().unwrap();\n        *state = CircuitState::Closed;\n        self.failure_count.store(0, Ordering::Relaxed);\n        *self.last_failure_time.lock().unwrap() = None;\n        debug!(\"Circuit breaker: reset, state=Closed\");\n    }\n}\n\nimpl Clone for CircuitBreaker {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            state: Arc::clone(\u0026self.state),\n            failure_count: Arc::clone(\u0026self.failure_count),\n            last_failure_time: Arc::clone(\u0026self.last_failure_time),\n            config: self.config.clone(),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_retry_config_new() {\n        let config = RetryConfig::new();\n        assert_eq!(config.max_retries, 3);\n        assert_eq!(config.initial_backoff_ms, 100);\n        assert_eq!(config.max_backoff_ms, 10000);\n        assert_eq!(config.backoff_multiplier, 2.0);\n        assert!(config.use_jitter);\n    }\n\n    #[test]\n    fn test_retry_config_with_max_retries() {\n        let config = RetryConfig::new().with_max_retries(5);\n        assert_eq!(config.max_retries, 5);\n    }\n\n    #[test]\n    fn test_retry_config_with_initial_backoff() {\n        let config = RetryConfig::new().with_initial_backoff_ms(200);\n        assert_eq!(config.initial_backoff_ms, 200);\n    }\n\n    #[test]\n    fn test_retry_config_calculate_backoff() {\n        let config = RetryConfig::new()\n            .with_initial_backoff_ms(100)\n            .with_jitter(false);\n\n        let backoff0 = config.calculate_backoff(0);\n        let backoff1 = config.calculate_backoff(1);\n        let backoff2 = config.calculate_backoff(2);\n\n        assert_eq!(backoff0.as_millis(), 100);\n        assert_eq!(backoff1.as_millis(), 200);\n        assert_eq!(backoff2.as_millis(), 400);\n    }\n\n    #[test]\n    fn test_retry_config_calculate_backoff_max() {\n        let config = RetryConfig::new()\n            .with_initial_backoff_ms(100)\n            .with_max_backoff_ms(500)\n            .with_jitter(false);\n\n        let backoff5 = config.calculate_backoff(5);\n        assert!(backoff5.as_millis() \u003c= 500);\n    }\n\n    #[test]\n    fn test_circuit_breaker_config_new() {\n        let config = CircuitBreakerConfig::new();\n        assert_eq!(config.failure_threshold, 5);\n        assert_eq!(config.timeout_ms, 60000);\n    }\n\n    #[test]\n    fn test_circuit_breaker_new() {\n        let config = CircuitBreakerConfig::new();\n        let breaker = CircuitBreaker::new(config);\n        assert_eq!(breaker.state(), CircuitState::Closed);\n    }\n\n    #[test]\n    fn test_circuit_breaker_allow_request_closed() {\n        let config = CircuitBreakerConfig::new();\n        let breaker = CircuitBreaker::new(config);\n        assert!(breaker.allow_request().is_ok());\n    }\n\n    #[test]\n    fn test_circuit_breaker_record_success() {\n        let config = CircuitBreakerConfig::new();\n        let breaker = CircuitBreaker::new(config);\n        breaker.record_success();\n        assert_eq!(breaker.state(), CircuitState::Closed);\n    }\n\n    #[test]\n    fn test_circuit_breaker_record_failure() {\n        let config = CircuitBreakerConfig::new().with_failure_threshold(3);\n        let breaker = CircuitBreaker::new(config);\n\n        breaker.record_failure();\n        breaker.record_failure();\n        assert_eq!(breaker.state(), CircuitState::Closed);\n\n        breaker.record_failure();\n        assert_eq!(breaker.state(), CircuitState::Open);\n    }\n\n    #[test]\n    fn test_circuit_breaker_open_denies_requests() {\n        let config = CircuitBreakerConfig::new().with_failure_threshold(1);\n        let breaker = CircuitBreaker::new(config);\n\n        breaker.record_failure();\n        assert_eq!(breaker.state(), CircuitState::Open);\n        assert!(breaker.allow_request().is_err());\n    }\n\n    #[test]\n    fn test_circuit_breaker_reset() {\n        let config = CircuitBreakerConfig::new().with_failure_threshold(1);\n        let breaker = CircuitBreaker::new(config);\n\n        breaker.record_failure();\n        assert_eq!(breaker.state(), CircuitState::Open);\n\n        breaker.reset();\n        assert_eq!(breaker.state(), CircuitState::Closed);\n        assert!(breaker.allow_request().is_ok());\n    }\n\n    #[test]\n    fn test_circuit_breaker_clone() {\n        let config = CircuitBreakerConfig::new();\n        let breaker = CircuitBreaker::new(config);\n        let cloned = breaker.clone();\n\n        breaker.record_failure();\n        // Both should share the same state\n        assert_eq!(cloned.state(), breaker.state());\n    }\n\n    #[test]\n    fn test_retry_config_default() {\n        let default_config = RetryConfig::default();\n        let new_config = RetryConfig::new();\n        assert_eq!(\n            default_config.calculate_backoff(0).as_millis(),\n            new_config.calculate_backoff(0).as_millis()\n        );\n    }\n\n    #[test]\n    fn test_circuit_breaker_config_default() {\n        let config = CircuitBreakerConfig::default();\n        assert_eq!(config.failure_threshold, 5);\n        assert_eq!(config.timeout_ms, 60000);\n    }\n\n    #[test]\n    fn test_retry_config_with_backoff_multiplier() {\n        let config = RetryConfig::new()\n            .with_initial_backoff_ms(100)\n            .with_backoff_multiplier(3.0)\n            .with_jitter(false);\n        let backoff0 = config.calculate_backoff(0);\n        let backoff1 = config.calculate_backoff(1);\n        assert!(backoff1.as_millis() \u003e backoff0.as_millis());\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":10}},{"line":35,"address":[],"length":0,"stats":{"Line":3}},{"line":36,"address":[],"length":0,"stats":{"Line":3}},{"line":37,"address":[],"length":0,"s ength":0,"stats":{"Line":12}},{"line":160,"address":[],"length":0,"stats":{"Line":12}},{"line":164,"address":[],"length":0,"stats":{"Line":5}},{"line":165,"address":[],"length":0,"stats":{"Line":15}},{"line":166,"address":[],"length":0,"stats":{"Line":10}},{"line":167,"address":[],"length":0,"stats":{"Line":5}},{"line":168,"address":[],"length":0,"stats":{"Line":5}},{"line":172,"address":[],"length":0,"stats":{"Line":90}},{"line":173,"address":[],"length":0,"stats":{"Line":270}},{"line":174,"address":[],"length":0,"stats":{"Line":90}},{"line":176,"address":[],"length":0,"stats":{"Line":90}},{"line":177,"address":[],"length":0,"stats":{"Line":165}},{"line":178,"address":[],"length":0,"stats":{"Line":55}},{"line":179,"address":[],"length":0,"stats":{"Line":55}},{"line":187,"address":[],"length":0,"stats":{"Line":20}},{"line":188,"address":[],"length":0,"stats":{"Line":60}},{"line":190,"address":[],"length":0,"stats":{"Line":20}},{"line":191,"address":[],"length":0,"stats":{"Line":12}},{"line":194,"address":[],"length":0,"stats":{"Line":16}},{"line":195,"address":[],"length":0,"stats":{"Line":16}},{"line":196,"address":[],"length":0,"stats":{"Line":1}},{"line":197,"address":[],"length":0,"stats":{"Line":1}},{"line":198,"address":[],"length":0,"stats":{"Line":1}},{"line":200,"address":[],"length":0,"stats":{"Line":7}},{"line":201,"address":[],"length":0,"stats":{"Line":7}},{"line":205,"address":[],"length":0,"stats":{"Line":0}},{"line":206,"address":[],"length":0,"stats":{"Line":0}},{"line":210,"address":[],"length":0,"stats":{"Line":0}},{"line":215,"address":[],"length":0,"stats":{"Line":1}},{"line":216,"address":[],"length":0,"stats":{"Line":3}},{"line":217,"address":[],"length":0,"stats":{"Line":1}},{"line":218,"address":[],"length":0,"stats":{"Line":2}},{"line":219,"address":[],"length":0,"stats":{"Line":1}},{"line":220,"address":[],"length":0,"stats":{"Line":1}},{"line":225,"address":[],"length":0,"stats":{"Line":1}},{"line":227,"address":[],"length":0,"stats":{"Line":3}},{"line":228,"address":[],"length":0,"stats":{"Line":3}},{"line":229,"address":[],"length":0,"stats":{"Line":3}},{"line":230,"address":[],"length":0,"stats":{"Line":1}}],"covered":75,"coverable":78},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","summarization.rs"],"content":"//! Memory summarization strategies for compressing and distilling memories.\n//!\n//! This module provides pluggable summarization strategies that determine how\n//! memories are compressed or distilled when promoted from Synapse to Cortex.\n\nuse crate::models::MemoryEntry;\n\n/// Trait for memory summarization strategies.\n///\n/// Implementations define different approaches to summarizing or compressing\n/// memories while preserving their essential meaning.\npub trait Summarizer: Send + Sync {\n    /// Summarize a memory entry.\n    ///\n    /// Returns a new MemoryEntry with summarized content.\n    /// The summarized entry should preserve the original ID, timestamp, and metadata.\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry;\n\n    /// Get the name of this summarizer.\n    fn name(\u0026self) -\u003e \u0026str;\n}\n\n/// Identity summarizer that returns the memory unchanged.\n///\n/// Useful as a no-op summarizer or for testing.\npub struct IdentitySummarizer;\n\nimpl Summarizer for IdentitySummarizer {\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry {\n        entry.clone()\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"Identity\"\n    }\n}\n\n/// Length-based summarizer that truncates memories to a maximum length.\n///\n/// Preserves the beginning of the memory up to the specified length.\npub struct LengthBasedSummarizer {\n    /// Maximum length of summarized content in characters\n    pub max_length: usize,\n}\n\nimpl LengthBasedSummarizer {\n    /// Create a new length-based summarizer.\n    ///\n    /// # Arguments\n    /// * `max_length` - Maximum length of summarized content in characters\n    pub fn new(max_length: usize) -\u003e Self {\n        Self { max_length }\n    }\n}\n\nimpl Summarizer for LengthBasedSummarizer {\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry {\n        let mut summarized = entry.clone();\n\n        if entry.content.len() \u003e self.max_length {\n            // Truncate to max_length, ensuring we don't cut in the middle of a character\n            summarized.content = entry\n                .content\n                .chars()\n                .take(self.max_length)\n                .collect::\u003cString\u003e();\n\n            // Add ellipsis to indicate truncation\n            if summarized.content.len() \u003e 3 {\n                summarized.content.truncate(summarized.content.len() - 3);\n                summarized.content.push_str(\"...\");\n            }\n        }\n\n        summarized\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"LengthBased\"\n    }\n}\n\n/// Keyword-based summarizer that extracts key terms and creates a summary.\n///\n/// Identifies important words and creates a condensed summary.\npub struct KeywordSummarizer {\n    /// Maximum number of keywords to extract\n    pub max_keywords: usize,\n}\n\nimpl KeywordSummarizer {\n    /// Create a new keyword-based summarizer.\n    ///\n    /// # Arguments\n    /// * `max_keywords` - Maximum number of keywords to extract\n    pub fn new(max_keywords: usize) -\u003e Self {\n        Self { max_keywords }\n    }\n\n    /// Extract keywords from text.\n    ///\n    /// Simple heuristic: words longer than 4 characters that aren't common stop words.\n    fn extract_keywords(\u0026self, text: \u0026str) -\u003e Vec\u003cString\u003e {\n        let stop_words = [\n            \"the\", \"a\", \"an\", \"and\", \"or\", \"but\", \"in\", \"on\", \"at\", \"to\", \"for\", \"of\", \"with\",\n            \"by\", \"from\", \"is\", \"are\", \"was\", \"were\", \"be\", \"been\", \"being\", \"have\", \"has\", \"had\",\n            \"do\", \"does\", \"did\", \"will\", \"would\", \"could\", \"should\", \"may\", \"might\", \"must\", \"can\",\n            \"this\", \"that\", \"these\", \"those\", \"i\", \"you\", \"he\", \"she\", \"it\", \"we\", \"they\", \"what\",\n            \"which\", \"who\", \"when\", \"where\", \"why\", \"how\",\n        ];\n\n        let mut keywords: Vec\u003cString\u003e = text\n            .to_lowercase()\n            .split(|c: char| !c.is_alphanumeric())\n            .filter(|word| word.len() \u003e 4 \u0026\u0026 !stop_words.contains(word))\n            .map(|s| s.to_string())\n            .collect();\n\n        // Remove duplicates while preserving order\n        let mut seen = std::collections::HashSet::new();\n        keywords.retain(|k| seen.insert(k.clone()));\n\n        keywords.truncate(self.max_keywords);\n        keywords\n    }\n}\n\nimpl Summarizer for KeywordSummarizer {\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry {\n        let mut summarized = entry.clone();\n\n        let keywords = self.extract_keywords(\u0026entry.content);\n\n        if !keywords.is_empty() {\n            // Create a summary from keywords\n            let summary = format!(\"Keywords: {}\", keywords.join(\", \"));\n            summarized.content = summary;\n        }\n\n        summarized\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"KeywordBased\"\n    }\n}\n\n/// Sentence-based summarizer that keeps the first N sentences.\n///\n/// Useful for preserving the main idea while reducing length.\npub struct SentenceBasedSummarizer {\n    /// Maximum number of sentences to keep\n    pub max_sentences: usize,\n}\n\nimpl SentenceBasedSummarizer {\n    /// Create a new sentence-based summarizer.\n    ///\n    /// # Arguments\n    /// * `max_sentences` - Maximum number of sentences to keep\n    pub fn new(max_sentences: usize) -\u003e Self {\n        Self { max_sentences }\n    }\n}\n\nimpl Summarizer for SentenceBasedSummarizer {\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry {\n        let mut summarized = entry.clone();\n\n        // Split by sentence delimiters\n        let sentences: Vec\u003c\u0026str\u003e = entry\n            .content\n            .split(['.', '!', '?'])\n            .filter(|s| !s.trim().is_empty())\n            .take(self.max_sentences)\n            .collect();\n\n        if !sentences.is_empty() \u0026\u0026 sentences.len() \u003c entry.content.split('.').count() {\n            // Reconstruct with periods\n            summarized.content = sentences.join(\". \") + \".\";\n        }\n\n        summarized\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"SentenceBased\"\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::models::{MemoryId, MemoryTier};\n    use chrono::Utc;\n    use std::collections::HashMap;\n\n    fn create_test_entry(content: \u0026str) -\u003e MemoryEntry {\n        MemoryEntry {\n            id: MemoryId::new(),\n            content: content.to_string(),\n            metadata: HashMap::new(),\n            timestamp: Utc::now(),\n            salience: 0.5,\n            tier: MemoryTier::Synapse,\n            embedding: None,\n            source_session_id: None,\n            scope: crate::models::MemoryScope::Global,\n        }\n    }\n\n    #[test]\n    fn test_identity_summarizer() {\n        let summarizer = IdentitySummarizer;\n        let entry = create_test_entry(\"This is a test memory\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert_eq!(summarized.content, entry.content);\n        assert_eq!(summarized.id, entry.id);\n    }\n\n    #[test]\n    fn test_length_based_summarizer_short_content() {\n        let summarizer = LengthBasedSummarizer::new(100);\n        let entry = create_test_entry(\"Short\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert_eq!(summarized.content, \"Short\");\n    }\n\n    #[test]\n    fn test_length_based_summarizer_long_content() {\n        let summarizer = LengthBasedSummarizer::new(20);\n        let entry = create_test_entry(\"This is a very long memory that should be truncated\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert!(summarized.content.len() \u003c= 23); // 20 + \"...\"\n        assert!(summarized.content.ends_with(\"...\"));\n    }\n\n    #[test]\n    fn test_keyword_summarizer() {\n        let summarizer = KeywordSummarizer::new(5);\n        let entry = create_test_entry(\"The important project deadline is tomorrow morning\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert!(summarized.content.contains(\"Keywords:\"));\n        assert!(summarized.content.contains(\"important\") || summarized.content.contains(\"project\"));\n    }\n\n    #[test]\n    fn test_keyword_summarizer_empty() {\n        let summarizer = KeywordSummarizer::new(5);\n        let entry = create_test_entry(\"a an the\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        // Should keep original if no keywords found\n        assert!(!summarized.content.is_empty());\n    }\n\n    #[test]\n    fn test_sentence_based_summarizer_single_sentence() {\n        let summarizer = SentenceBasedSummarizer::new(1);\n        let entry = create_test_entry(\"First sentence. Second sentence. Third sentence.\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert!(summarized.content.contains(\"First sentence\"));\n        assert!(!summarized.content.contains(\"Second\"));\n    }\n\n    #[test]\n    fn test_sentence_based_summarizer_multiple_sentences() {\n        let summarizer = SentenceBasedSummarizer::new(2);\n        let entry = create_test_entry(\"First sentence. Second sentence. Third sentence.\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert!(summarized.content.contains(\"First\"));\n        assert!(summarized.content.contains(\"Second\"));\n        assert!(!summarized.content.contains(\"Third\"));\n    }\n\n    #[test]\n    fn test_summarizer_name() {\n        let identity = IdentitySummarizer;\n        assert_eq!(identity.name(), \"Identity\");\n\n        let length = LengthBasedSummarizer::new(100);\n        assert_eq!(length.name(), \"LengthBased\");\n\n        let keyword = KeywordSummarizer::new(5);\n        assert_eq!(keyword.name(), \"KeywordBased\");\n\n        let sentence = SentenceBasedSummarizer::new(2);\n        assert_eq!(sentence.name(), \"SentenceBased\");\n    }\n\n    #[test]\n    fn test_summarizer_preserves_metadata() {\n        let summarizer = LengthBasedSummarizer::new(10);\n        let mut entry = create_test_entry(\"This is a very long memory\");\n        entry\n            .metadata\n            .insert(\"key\".to_string(), \"value\".to_string());\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert_eq!(summarized.metadata.get(\"key\"), Some(\u0026\"value\".to_string()));\n    }\n\n    #[test]\n    fn test_summarizer_preserves_id() {\n        let summarizer = KeywordSummarizer::new(5);\n        let entry = create_test_entry(\"Test memory content\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert_eq!(summarized.id, entry.id);\n    }\n}\n","traces":[{"line":29,"address":[],"length":0,"stats":{"Line":3}},{"line":30,"address":[],"length":0,"stats":{"Line":6}},{"line":33,"address":[],"length":0,"stats":{"Line":1}},{"line":34,"address":[],"length":0,"stats":{"Line":1}},{"line":51,"address":[],"length":0,"stats":{"Line":8}},{"line":57,"address":[],"length":0,"stats":{"Line":9}},{"line":58,"address":[],"length":0,"stats":{"Line":27}},{"line":60,"address":[],"length":0,"stats":{"Line":18}},{"line":62,"address":[],"length":0,"stats":{"Line":12}},{"line":63,"address":[],"length":0,"stats":{"Line":6}},{"line":64,"address":[],"length":0,"stats":{"Line":6}},{"line":65,"address":[],"length":0,"stats": ddress":[],"length":0,"stats":{"Line":16}},{"line":172,"address":[],"length":0,"stats":{"Line":8}},{"line":173,"address":[],"length":0,"stats":{"Line":4}},{"line":174,"address":[],"length":0,"stats":{"Line":16}},{"line":175,"address":[],"length":0,"stats":{"Line":8}},{"line":178,"address":[],"length":0,"stats":{"Line":19}},{"line":180,"address":[],"length":0,"stats":{"Line":9}},{"line":183,"address":[],"length":0,"stats":{"Line":4}},{"line":186,"address":[],"length":0,"stats":{"Line":1}},{"line":187,"address":[],"length":0,"stats":{"Line":1}}],"covered":57,"coverable":57},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","synapse.rs"],"content":"use crate::embedder::Embedder;\nuse crate::error::Result;\nuse crate::models::{MemoryEntry, MemoryId, MemoryScope};\nuse crate::traits::MemoryStore;\nuse async_trait::async_trait;\nuse parking_lot::RwLock;\nuse std::collections::HashMap;\nuse std::sync::Arc;\n\n/// In-memory short-term memory storage (Synapse tier).\n///\n/// Stores memories in a thread-safe HashMap. Memories are volatile and cleared\n/// when the session ends. Supports semantic search using embeddings.\n#[derive(Clone)]\npub struct SynapseMemory {\n    memories: Arc\u003cRwLock\u003cHashMap\u003cMemoryId, MemoryEntry\u003e\u003e\u003e,\n    embedder: Arc\u003cdyn Embedder\u003e,\n}\n\nimpl SynapseMemory {\n    /// Create a new empty Synapse memory store.\n    pub fn new(embedder: Arc\u003cdyn Embedder\u003e) -\u003e Self {\n        Self {\n            memories: Arc::new(RwLock::new(HashMap::new())),\n            embedder,\n        }\n    }\n\n    /// Get the number of memories currently stored.\n    pub fn len(\u0026self) -\u003e usize {\n        self.memories.read().len()\n    }\n\n    /// Check if the store is empty.\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.memories.read().is_empty()\n    }\n\n    /// Clear all memories (typically called at session end).\n    pub async fn clear(\u0026self) -\u003e Result\u003c()\u003e {\n        self.memories.write().clear();\n        Ok(())\n    }\n\n    /// List all memories (for debugging/inspection).\n    pub async fn list(\u0026self) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        let memories = self.memories.read();\n        Ok(memories.values().cloned().collect())\n    }\n\n    /// Calculate cosine similarity between two vectors.\n    fn cosine_similarity(a: \u0026[f32], b: \u0026[f32]) -\u003e f32 {\n        if a.len() != b.len() || a.is_empty() {\n            return 0.0;\n        }\n\n        let dot_product: f32 = a.iter().zip(b.iter()).map(|(x, y)| x * y).sum();\n        let norm_a: f32 = a.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n        let norm_b: f32 = b.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n\n        if norm_a == 0.0 || norm_b == 0.0 {\n            return 0.0;\n        }\n\n        dot_product / (norm_a * norm_b)\n    }\n}\n\nimpl Default for SynapseMemory {\n    fn default() -\u003e Self {\n        Self::new(Arc::new(crate::embedder::MockEmbedder::new()))\n    }\n}\n\n#[async_trait]\nimpl MemoryStore for SynapseMemory {\n    async fn store(\u0026self, entry: MemoryEntry) -\u003e Result\u003c()\u003e {\n        self.memories.write().insert(entry.id, entry);\n        Ok(())\n    }\n\n    async fn retrieve(\u0026self, query: \u0026str, limit: usize) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        // Generate embedding for query using the configured embedder\n        let query_embedding: Vec\u003cf32\u003e = self.embedder.embed(query).await?;\n\n        let memories = self.memories.read();\n\n        // If no memories, return empty\n        if memories.is_empty() {\n            return Ok(Vec::new());\n        }\n\n        // Score all memories by similarity\n        let mut scored: Vec\u003c_\u003e = memories\n            .values()\n            .filter_map(|entry| {\n                entry.embedding.as_ref().map(|embedding| {\n                    let similarity = Self::cosine_similarity(\u0026query_embedding, embedding);\n                    // Combine similarity with salience for ranking\n                    let score = (similarity * 0.7) + (entry.salience * 0.3);\n                    (entry.clone(), score)\n                })\n            })\n            .collect();\n\n        // Sort by score (descending)\n        scored.sort_by(|a, b| b.1.partial_cmp(\u0026a.1).unwrap_or(std::cmp::Ordering::Equal));\n\n        // Return top N\n        Ok(scored\n            .into_iter()\n            .take(limit)\n            .map(|(entry, _)| entry)\n            .collect())\n    }\n\n    async fn retrieve_by_scope(\n        \u0026self,\n        query: \u0026str,\n        scope: \u0026MemoryScope,\n        limit: usize,\n    ) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        // Generate embedding for query using the configured embedder\n        let query_embedding: Vec\u003cf32\u003e = self.embedder.embed(query).await?;\n\n        let memories = self.memories.read();\n\n        // If no memories, return empty\n        if memories.is_empty() {\n            return Ok(Vec::new());\n        }\n\n        // Score all memories by similarity, filtering by scope\n        let mut scored: Vec\u003c_\u003e = memories\n            .values()\n            .filter(|entry| entry.scope.matches(scope))\n            .filter_map(|entry| {\n                entry.embedding.as_ref().map(|embedding| {\n                    let similarity = Self::cosine_similarity(\u0026query_embedding, embedding);\n                    // Combine similarity with salience for ranking\n                    let score = (similarity * 0.7) + (entry.salience * 0.3);\n                    (entry.clone(), score)\n                })\n            })\n            .collect();\n\n        // Sort by score (descending)\n        scored.sort_by(|a, b| b.1.partial_cmp(\u0026a.1).unwrap_or(std::cmp::Ordering::Equal));\n\n        // Return top N\n        Ok(scored\n            .into_iter()\n            .take(limit)\n            .map(|(entry, _)| entry)\n            .collect())\n    }\n\n    async fn delete(\u0026self, id: \u0026MemoryId) -\u003e Result\u003c()\u003e {\n        self.memories.write().remove(id);\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::embedder::MockEmbedder;\n\n    fn create_synapse() -\u003e SynapseMemory {\n        SynapseMemory::new(Arc::new(MockEmbedder::new()))\n    }\n\n    /// Helper function to generate embeddings from text using MockEmbedder\n    async fn generate_embedding(text: \u0026str) -\u003e Vec\u003cf32\u003e {\n        let embedder = MockEmbedder::new();\n        embedder\n            .embed(text)\n            .await\n            .unwrap_or_else(|_| vec![0.0; 384])\n    }\n\n    #[tokio::test]\n    async fn test_synapse_new() {\n        let synapse = create_synapse();\n        assert!(synapse.is_empty());\n        assert_eq!(synapse.len(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_store_and_retrieve() {\n        let synapse = create_synapse();\n        let id = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry = MemoryEntry::builder(id, \"Test memory\".to_string())\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry.clone()).await.unwrap();\n        assert_eq!(synapse.len(), 1);\n\n        let results = synapse.retrieve(\"test\", 10).await.unwrap();\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_synapse_delete() {\n        let synapse = create_synapse();\n        let id = MemoryId::new();\n        let entry = MemoryEntry::new(id, \"Test memory\".to_string());\n\n        synapse.store(entry).await.unwrap();\n        assert_eq!(synapse.len(), 1);\n\n        synapse.delete(\u0026id).await.unwrap();\n        assert_eq!(synapse.len(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_clear() {\n        let synapse = create_synapse();\n\n        for i in 0..5 {\n            let id = MemoryId::new();\n            let entry = MemoryEntry::new(id, format!(\"Memory {}\", i));\n            synapse.store(entry).await.unwrap();\n        }\n\n        assert_eq!(synapse.len(), 5);\n        synapse.clear().await.unwrap();\n        assert_eq!(synapse.len(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_list() {\n        let synapse = create_synapse();\n        let id1 = MemoryId::new();\n        let id2 = MemoryId::new();\n\n        let entry1 = MemoryEntry::new(id1, \"Memory 1\".to_string());\n        let entry2 = MemoryEntry::new(id2, \"Memory 2\".to_string());\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        let list = synapse.list().await.unwrap();\n        assert_eq!(list.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_cosine_similarity() {\n        let a = vec![1.0, 0.0, 0.0];\n        let b = vec![1.0, 0.0, 0.0];\n        let similarity = SynapseMemory::cosine_similarity(\u0026a, \u0026b);\n        assert!((similarity - 1.0).abs() \u003c 0.001);\n\n        let c = vec![0.0, 1.0, 0.0];\n        let similarity2 = SynapseMemory::cosine_similarity(\u0026a, \u0026c);\n        assert!(similarity2.abs() \u003c 0.001);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_empty() {\n        let synapse = create_synapse();\n        let results = synapse.retrieve(\"test\", 10).await.unwrap();\n        assert!(results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_with_salience() {\n        let synapse = create_synapse();\n\n        let id1 = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry1 = MemoryEntry::builder(id1, \"Important memory\".to_string())\n            .salience(0.9)\n            .embedding(embedding.clone())\n            .build();\n\n        let id2 = MemoryId::new();\n        let entry2 = MemoryEntry::builder(id2, \"Important memory\".to_string())\n            .salience(0.1)\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        let results = synapse.retrieve(\"important\", 10).await.unwrap();\n        assert_eq!(results.len(), 2);\n        // Higher salience should rank first\n        assert!(results[0].salience \u003e= results[1].salience);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_by_scope_global() {\n        let synapse = create_synapse();\n\n        let id1 = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry1 = MemoryEntry::builder(id1, \"Global memory\".to_string())\n            .scope(MemoryScope::Global)\n            .embedding(embedding.clone())\n            .build();\n\n        let id2 = MemoryId::new();\n        let entry2 = MemoryEntry::builder(id2, \"User memory\".to_string())\n            .scope(MemoryScope::User(\"user1\".to_string()))\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        // Global scope should match all\n        let results = synapse\n            .retrieve_by_scope(\"memory\", \u0026MemoryScope::Global, 10)\n            .await\n            .unwrap();\n        assert_eq!(results.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_by_scope_user() {\n        let synapse = create_synapse();\n\n        let id1 = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry1 = MemoryEntry::builder(id1, \"User1 memory\".to_string())\n            .scope(MemoryScope::User(\"user1\".to_string()))\n            .embedding(embedding.clone())\n            .build();\n\n        let id2 = MemoryId::new();\n        let entry2 = MemoryEntry::builder(id2, \"User2 memory\".to_string())\n            .scope(MemoryScope::User(\"user2\".to_string()))\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        // User1 scope should only match user1 memories\n        let results = synapse\n            .retrieve_by_scope(\"memory\", \u0026MemoryScope::User(\"user1\".to_string()), 10)\n            .await\n            .unwrap();\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].content, \"User1 memory\");\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_by_scope_agent() {\n        let synapse = create_synapse();\n\n        let id1 = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry1 = MemoryEntry::builder(id1, \"Agent1 memory\".to_string())\n            .scope(MemoryScope::Agent(\"agent1\".to_string()))\n            .embedding(embedding.clone())\n            .build();\n\n        let id2 = MemoryId::new();\n        let entry2 = MemoryEntry::builder(id2, \"Agent2 memory\".to_string())\n            .scope(MemoryScope::Agent(\"agent2\".to_string()))\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        // Agent1 scope should only match agent1 memories\n        let results = synapse\n            .retrieve_by_scope(\"memory\", \u0026MemoryScope::Agent(\"agent1\".to_string()), 10)\n            .await\n            .unwrap();\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].content, \"Agent1 memory\");\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_by_scope_session() {\n        let synapse = create_synapse();\n\n        let id1 = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry1 = MemoryEntry::builder(id1, \"Session1 memory\".to_string())\n            .scope(MemoryScope::Session(\"session1\".to_string()))\n            .embedding(embedding.clone())\n            .build();\n\n        let id2 = MemoryId::new();\n        let entry2 = MemoryEntry::builder(id2, \"Session2 memory\".to_string())\n            .scope(MemoryScope::Session(\"session2\".to_string()))\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        // Session1 scope should only match session1 memories\n        let results = synapse\n            .retrieve_by_scope(\"memory\", \u0026MemoryScope::Session(\"session1\".to_string()), 10)\n            .await\n            .unwrap();\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].content, \"Session1 memory\");\n    }\n\n    // ============================================================================\n    // Phase 2: Behavioral Relevance Tests\n    // ============================================================================\n    // These tests verify that semantic similarity and salience blending work\n    // correctly with the blending formula: score = 0.7 * similarity + 0.3 * salience\n\n    #[tokio::test]\n    async fn test_synapse_semantic_similarity_ranking() {\n        // Test that exact matches rank higher than non-matches\n        // With MockEmbedder, same text produces same embedding (similarity = 1.0)\n        let synapse = create_synapse();\n\n        // Generate embeddings for each text\n        let embedding_dog = generate_embedding(\"dog\").await;\n        let embedding_puppy = generate_embedding(\"puppy\").await;\n        let embedding_unrelated = generate_embedding(\"unrelated\").await;\n\n        // Store three memories with their actual embeddings\n        let id_exact = MemoryId::new();\n        let entry_exact = MemoryEntry::builder(id_exact, \"dog\".to_string())\n            .embedding(embedding_dog)\n            .salience(0.5) // Medium salience\n            .build();\n\n        let id_partial = MemoryId::new();\n        let entry_partial = MemoryEntry::builder(id_partial, \"puppy\".to_string())\n            .embedding(embedding_puppy)\n            .salience(0.5) // Same salience as exact\n            .build();\n\n        let id_unrelated = MemoryId::new();\n        let entry_unrelated = MemoryEntry::builder(id_unrelated, \"unrelated\".to_string())\n            .embedding(embedding_unrelated)\n            .salience(0.5) // Same salience as exact\n            .build();\n\n        synapse.store(entry_exact).await.unwrap();\n        synapse.store(entry_partial).await.unwrap();\n        synapse.store(entry_unrelated).await.unwrap();\n\n        // Query with \"dog\" - exact match should rank first\n        let results = synapse.retrieve(\"dog\", 10).await.unwrap();\n        assert_eq!(results.len(), 3);\n\n        // Exact match should be first (similarity = 1.0 to itself)\n        // score = 0.7 * 1.0 + 0.3 * 0.5 = 0.85\n        assert_eq!(results[0].content, \"dog\");\n    }\n\n    #[tokio::test]\n    async fn test_synapse_salience_override_blending() {\n        // Test that high salience can boost ranking\n        // Formula: score = 0.7 * similarity + 0.3 * salience\n        let synapse = create_synapse();\n\n        // Generate embeddings for each text\n        let embedding_important = generate_embedding(\"important\").await;\n        let embedding_trivial = generate_embedding(\"trivial\").await;\n\n        // Create two entries with different salience values\n        let id_high_sal = MemoryId::new();\n        let entry_high_sal = MemoryEntry::builder(id_high_sal, \"important\".to_string())\n            .embedding(embedding_important)\n            .salience(0.9) // High salience\n            .build();\n\n        let id_low_sal = MemoryId::new();\n        let entry_low_sal = MemoryEntry::builder(id_low_sal, \"trivial\".to_string())\n            .embedding(embedding_trivial)\n            .salience(0.1) // Low salience\n            .build();\n\n        synapse.store(entry_high_sal).await.unwrap();\n        synapse.store(entry_low_sal).await.unwrap();\n\n        // Query with \"important\" - should rank first due to exact match + high salience\n        let results = synapse.retrieve(\"important\", 10).await.unwrap();\n        assert_eq!(results.len(), 2);\n\n        // \"important\" should rank first\n        // score = 0.7 * 1.0 + 0.3 * 0.9 = 0.97\n        assert_eq!(results[0].content, \"important\");\n        assert_eq!(results[1].content, \"trivial\");\n    }\n\n    #[tokio::test]\n    async fn test_synapse_salience_blending_weights() {\n        // Test that the blending weights (0.7 similarity, 0.3 salience) are applied correctly\n        // When two entries have same text (same embedding) but different salience\n        let synapse = create_synapse();\n\n        // Generate embedding for \"memory\"\n        let embedding_memory = generate_embedding(\"memory\").await;\n\n        // Create two entries with same text but different salience\n        let id_high_sal = MemoryId::new();\n        let entry_high_sal = MemoryEntry::builder(id_high_sal, \"memory\".to_string())\n            .embedding(embedding_memory.clone())\n            .salience(0.9) // High salience\n            .build();\n\n        let id_low_sal = MemoryId::new();\n        let entry_low_sal = MemoryEntry::builder(id_low_sal, \"memory\".to_string())\n            .embedding(embedding_memory)\n            .salience(0.1) // Low salience\n            .build();\n\n        synapse.store(entry_high_sal).await.unwrap();\n        synapse.store(entry_low_sal).await.unwrap();\n\n        // Query with \"memory\" - both have same similarity (1.0) but different salience\n        let results = synapse.retrieve(\"memory\", 10).await.unwrap();\n        assert_eq!(results.len(), 2);\n\n        // High salience should rank first\n        // score_high = 0.7 * 1.0 + 0.3 * 0.9 = 0.97\n        // score_low = 0.7 * 1.0 + 0.3 * 0.1 = 0.73\n        assert_eq!(results[0].salience, 0.9);\n        assert_eq!(results[1].salience, 0.1);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_respects_limit() {\n        // Test that retrieve respects the limit parameter\n        let synapse = create_synapse();\n\n        // Generate embedding for \"memory\"\n        let embedding_memory = generate_embedding(\"memory\").await;\n\n        // Store 5 memories with same text (same embedding)\n        for _i in 0..5 {\n            let id = MemoryId::new();\n            let entry = MemoryEntry::builder(id, \"memory\".to_string())\n                .embedding(embedding_memory.clone())\n                .build();\n            synapse.store(entry).await.unwrap();\n        }\n\n        // Query with limit 2\n        let results = synapse.retrieve(\"memory\", 2).await.unwrap();\n        assert_eq!(results.len(), 2);\n\n        // Query with limit 10 (more than stored)\n        let results = synapse.retrieve(\"memory\", 10).await.unwrap();\n        assert_eq!(results.len(), 5);\n\n        // Query with limit 0\n        let results = synapse.retrieve(\"memory\", 0).await.unwrap();\n        assert_eq!(results.len(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_blending_formula_verification() {\n        // Test that the blending formula (0.7 * similarity + 0.3 * salience) is applied\n        // by verifying that higher salience boosts ranking when similarity is equal\n        let synapse = create_synapse();\n\n        // Generate embedding for \"test\"\n        let embedding_test = generate_embedding(\"test\").await;\n\n        // Create two entries with same text (same embedding) but different salience\n        let id_high_sal = MemoryId::new();\n        let entry_high_sal = MemoryEntry::builder(id_high_sal, \"test\".to_string())\n            .embedding(embedding_test.clone())\n            .salience(0.9) // High salience\n            .build();\n\n        let id_low_sal = MemoryId::new();\n        let entry_low_sal = MemoryEntry::builder(id_low_sal, \"test\".to_string())\n            .embedding(embedding_test)\n            .salience(0.1) // Low salience\n            .build();\n\n        synapse.store(entry_high_sal).await.unwrap();\n        synapse.store(entry_low_sal).await.unwrap();\n\n        // Query with \"test\" - both have same similarity (1.0) but different salience\n        let results = synapse.retrieve(\"test\", 10).await.unwrap();\n        assert_eq!(results.len(), 2);\n\n        // High salience should rank first when similarity is equal\n        // score_high = 0.7 * 1.0 + 0.3 * 0.9 = 0.97\n        // score_low = 0.7 * 1.0 + 0.3 * 0.1 = 0.73\n        assert_eq!(results[0].salience, 0.9);\n        assert_eq!(results[1].salience, 0.1);\n    }\n}\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":121}},{"line":24,"address":[],"length":0,"stats":{"Line":363}},{"line":30,"address":[],"length":0,"stats":{"Line":67}},{"line":31,"address":[],"length":0,"stats":{"Line":67}},{"line":35,"address":[],"length":0,"stats":{"Line":1}},{"line":36,"address":[],"length":0,"stats":{"Line":1}},{"line":40,"address":[],"length":0,"stats":{"Line":42}},{"line":41,"address":[],"length":0,"stats":{"Line":21}},{"line":42,"address":[],"length":0,"stats":{"Line":21}},{"line":46,"address":[],"length":0,"stats":{"Line":86}},{"line":47,"address":[],"length":0,"stats":{"Line":86}},{"line":48,"address":[],"length":0,"stats":{"Line":86}},{"line":52,"address":[],"length":0,"stats":{"Line":734}},{"line":53,"address":[],"length":0,"stats":{"Line":3670}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":568794}},{"line":58,"address":[],"length":0,"stats":{"Line":567326}},{"line":59,"address":[],"length":0,"stats":{"Line":567326}},{"line":61,"address":[],"length":0,"stats":{"Line":1468}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length":0,"stats":{"Line":1468}},{"line":70,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":2062}},{"line":82,"address         query: \u0026str,\n        scope: \u0026MemoryScope,\n        limit: usize,\n    ) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e;\n\n    /// Delete a memory by ID.\n    async fn delete(\u0026self, id: \u0026MemoryId) -\u003e Result\u003c()\u003e;\n\n    /// List all memories in the store.\n    async fn list(\u0026self) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        // Default implementation: retrieve with a wildcard query and max limit\n        // Use a non-empty query to avoid embedder validation errors\n        self.retrieve(\"*\", usize::MAX).await\n    }\n\n    /// Get the number of memories in the store.\n    async fn len(\u0026self) -\u003e Result\u003cusize\u003e {\n        // Default implementation: count items in list\n        Ok(self.list().await?.len())\n    }\n\n    /// Check if the store is empty.\n    async fn is_empty(\u0026self) -\u003e Result\u003cbool\u003e {\n        // Default implementation: check if len is 0\n        Ok(self.len().await? == 0)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    /// Minimal in-test store that implements MemoryStore with only required methods.\n    /// Deliberately does NOT override list/len/is_empty to test default implementations.\n    struct DefaultStore;\n\n    #[async_trait]\n    impl MemoryStore for DefaultStore {\n        async fn store(\u0026self, _entry: MemoryEntry) -\u003e Result\u003c()\u003e {\n            Ok(())\n        }\n\n        async fn retrieve(\u0026self, _query: \u0026str, _limit: usize) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n            // Return a fixed Vec of two entries regardless of input\n            Ok(vec![\n                MemoryEntry::new(MemoryId::new(), \"content1\".to_string()),\n                MemoryEntry::new(MemoryId::new(), \"content2\".to_string()),\n            ])\n        }\n\n        async fn retrieve_by_scope(\n            \u0026self,\n            _query: \u0026str,\n            _scope: \u0026MemoryScope,\n            _limit: usize,\n        ) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n            Ok(vec![])\n        }\n\n        async fn delete(\u0026self, _id: \u0026MemoryId) -\u003e Result\u003c()\u003e {\n            Ok(())\n        }\n    }\n\n    #[tokio::test]\n    async fn test_default_list_delegates_to_retrieve() {\n        let store = DefaultStore;\n        let result = store.list().await.unwrap();\n        assert_eq!(result.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_default_len_counts_list() {\n        let store = DefaultStore;\n        let len = store.len().await.unwrap();\n        assert_eq!(len, 2);\n    }\n\n    #[tokio::test]\n    async fn test_default_is_empty_false_when_populated() {\n        let store = DefaultStore;\n        let is_empty = store.is_empty().await.unwrap();\n        assert_eq!(is_empty, false);\n    }\n}\n","traces":[{"line":36,"address":[],"length":0,"stats":{"Line":8}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":43,"address":[],"length":0,"stats":{"Line":2}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":49,"address":[],"length":0,"stats":{"Line":1}},{"line":51,"address":[],"length":0,"stats":{"Line":0}}],"covered":3,"coverable":6},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","utils.rs"],"content":"use crate::error::Result;\nuse crate::models::MemoryId;\n\n/// Generate a new random MemoryId.\npub fn generate_memory_id() -\u003e MemoryId {\n    MemoryId::new()\n}\n\n/// Validate that an embedding has the correct dimension (384 for BGE-small).\npub fn validate_embedding_dimension(embedding: \u0026[f32]) -\u003e Result\u003c()\u003e {\n    const EXPECTED_DIM: usize = 384;\n    if embedding.len() != EXPECTED_DIM {\n        return Err(crate::error::CerebrumError::Embedding(format!(\n            \"Invalid embedding dimension: expected {}, got {}\",\n            EXPECTED_DIM,\n            embedding.len()\n        )));\n    }\n    Ok         var previousData = {"files":[{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","config.rs"],"content":"//! Hardcoded configuration defaults for the single-user local build.\n//!\n//! `Config` holds all runtime parameters for the LanceDB storage path.\n//! These are compile-time defaults — override any field by constructing the\n//! struct directly (e.g. in tests, set `db_path` to a `tempdir()` path).\n\nuse std::path::PathBuf;\n\n/// Configuration for `cerebrum-core` storage.\n///\n/// All fields have hardcoded defaults suitable for a single-user local\n/// deployment where the MCP client controls the working directory.\n/// Tests override `db_path` via `tempfile::tempdir()` to avoid\n/// touching the production store.\n#[derive(Debug, Clone)]\npub struct Config {\n    /// Path to the LanceDB database directory (CWD-relative by default).\n    ///\n    /// Resolved against the process working directory at startup.\n    /// Set the MCP server's `cwd` to a durable project folder so\n    /// `./data/cerebrum` lands somewhere persistent.\n    pub db_path: PathBuf,\n    /// Name of the LanceDB table that holds memories.\n    pub table_name: String,\n    /// Expected dimension of the embedding vectors.\n    pub embedding_dim: usize,\n}\n\nimpl Default for Config {\n    fn default() -\u003e Self {\n        Self {\n            db_path: PathBuf::from(\"./data/cerebrum\"),\n            table_name: \"memories\".to_string(),\n            embedding_dim: 384,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn default_db_path_is_relative() {\n        let config = Config::default();\n        assert!(config.db_path.is_relative());\n        assert_eq!(config.db_path, PathBuf::from(\"./data/cerebrum\"));\n    }\n\n    #[test]\n    fn default_table_name_is_memories() {\n        assert_eq!(Config::default().table_name, \"memories\");\n    }\n\n    #[test]\n    fn default_embedding_dim_is_384() {\n        assert_eq!(Config::default().embedding_dim, 384);\n    }\n}\n","traces":[{"line":30,"address":[],"length":0,"stats":{"Line":3}},{"line":32,"address":[],"length":0,"stats":{"Line":6}},{"line":33,"address":[],"length":0,"stats":{"Line":3}}],"covered":3,"coverable":3},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","decay.rs"],"content":"//! Memory decay strategies for detecting and handling stale memories.\n//!\n//! This module provides pluggable decay strategies that determine when memories\n//! become stale and should be purged or demoted from long-term storage.\n\nuse crate::models::MemoryEntry;\n\n/// Trait for memory decay strategies.\n///\n/// Implementations define different criteria for detecting stale memories\n/// that should be purged or demoted.\npub trait DecayStrategy: Send + Sync {\n    /// Calculate a decay score for a memory (0.0-1.0).\n    ///\n    /// Higher scores indicate more stale/decayed memories.\n    /// A score of 1.0 means the memory is completely stale and should be purged.\n    /// A score of 0.0 means the memory is fresh and should be kept.\n    fn score(\u0026self, entry: \u0026MemoryEntry, context: \u0026DecayContext) -\u003e f32;\n\n    /// Get the name of this strategy.\n    fn name(\u0026self) -\u003e \u0026str;\n}\n\n/// Context information for decay decisions.\n///\n/// Provides additional data that decay strategies may use to make decisions.\n#[derive(Clone, Debug)]\npub struct DecayContext {\n    /// Current timestamp for age calculations\n    pub current_timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    /// Average salience of memories in storage\n    pub avg_salience: f32,\n    /// Maximum salience of memories in storage\n    pub max_salience: f32,\n    /// Minimum salience of memories in storage\n    pub min_salience: f32,\n}\n\n/// Time-based decay strategy.\n///\n/// Decays memories based on their age. Older memories get higher decay scores.\npub struct TimeBasedDecay {\n    /// Maximum age in seconds before a memory is considered fully decayed\n    pub max_age_seconds: i64,\n}\n\nimpl TimeBasedDecay {\n    /// Create a new time-based decay strategy.\n    ///\n    /// # Arguments\n    /// * `max_age_seconds` - Age in seconds at which decay score reaches 1.0\n    pub fn new(max_age_seconds: i64) -\u003e Self {\n        Self { max_age_seconds }\n    }\n}\n\nimpl DecayStrategy for TimeBasedDecay {\n    fn score(\u0026self, entry: \u0026MemoryEntry, context: \u0026DecayContext) -\u003e f32 {\n        let age_seconds = (context.current_timestamp - entry.timestamp).num_seconds();\n\n        if age_seconds \u003c= 0 {\n            0.0 // Future timestamp (shouldn't happen)\n        } else if age_seconds \u003e= self.max_age_seconds {\n            1.0 // Fully decayed\n        } else {\n            // Linear decay based on age\n            age_seconds as f32 / self.max_age_seconds as f32\n        }\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"TimeBasedDecay\"\n    }\n}\n\n/// Access-based decay strategy.\n///\n/// Decays memories based on how infrequently they are accessed.\n/// Memories with low access counts decay faster.\npub struct AccessBasedDecay {\n    /// Minimum access count to avoid decay\n    pub min_access_count: usize,\n}\n\nimpl AccessBasedDecay {\n    /// Create a new access-based decay strategy.\n    ///\n    /// # Arguments\n    /// * `min_access_count` - Access count below which decay begins\n    pub fn new(min_access_count: usize) -\u003e Self {\n        Self { min_access_count }\n    }\n}\n\nimpl DecayStrategy for AccessBasedDecay {\n    fn score(\u0026self, entry: \u0026MemoryEntry, _context: \u0026DecayContext) -\u003e f32 {\n        let access_count = entry\n            .metadata\n            .get(\"access_count\")\n            .and_then(|s| s.parse::\u003cusize\u003e().ok())\n            .unwrap_or(0);\n\n        if access_count \u003e= self.min_access_count {\n            0.0 // No decay for frequently accessed memories\n        } else {\n            // Decay based on how far below threshold\n            let deficit = (self.min_access_count - access_count) as f32;\n            let max_deficit = self.min_access_count as f32;\n            (deficit / max_deficit).min(1.0)\n        }\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"AccessBasedDecay\"\n    }\n}\n\n/// Relevance-based decay strategy.\n///\n/// Decays memories based on their salience relative to the average.\n/// Low-salience memories decay faster.\npub struct RelevanceBasedDecay {\n    /// Salience threshold below which decay begins\n    pub salience_threshold: f32,\n}\n\nimpl RelevanceBasedDecay {\n    /// Create a new relevance-based decay strategy.\n    ///\n    /// # Arguments\n    /// * `salience_threshold` - Salience below which decay begins (0.0-1.0)\n    pub fn new(salience_threshold: f32) -\u003e Self {\n        Self {\n            salience_threshold: salience_threshold.clamp(0.0, 1.0),\n        }\n    }\n}\n\nimpl DecayStrategy for RelevanceBasedDecay {\n    fn score(\u0026self, entry: \u0026MemoryEntry, _context: \u0026DecayContext) -\u003e f32 {\n        if entry.salience \u003e= self.salience_threshold {\n            0.0 // No decay for relevant memories\n        } else {\n            // Decay based on how far below threshold\n            let deficit = self.salience_threshold - entry.salience;\n            let max_deficit = self.salience_threshold;\n            if max_deficit \u003e 0.0 {\n                (deficit / max_deficit).min(1.0)\n            } else {\n                0.0\n            }\n        }\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"RelevanceBasedDecay\"\n    }\n}\n\n/// Hybrid decay strategy combining multiple strategies.\n///\n/// Combines multiple decay strategies with configurable weights.\npub struct HybridDecay {\n    strategies: Vec\u003c(Box\u003cdyn DecayStrategy\u003e, f32)\u003e, // (strategy, weight)\n}\n\nimpl HybridDecay {\n    /// Create a new hybrid decay strategy.\n    pub fn new() -\u003e Self {\n        Self {\n            strategies: Vec::new(),\n        }\n    }\n\n    /// Add a strategy with a weight.\n    ///\n    /// Weights are normalized, so they don't need to sum to 1.0.\n    pub fn add_strategy(mut self, strategy: Box\u003cdyn DecayStrategy\u003e, weight: f32) -\u003e Self {\n        self.strategies.push((strategy, weight));\n        self\n    }\n}\n\nimpl Default for HybridDecay {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl DecayStrategy for HybridDecay {\n    fn score(\u0026self, entry: \u0026MemoryEntry, context: \u0026DecayContext) -\u003e f32 {\n        if self.strategies.is_empty() {\n            return 0.0;\n        }\n\n        let total_weight: f32 = self.strategies.iter().map(|(_, w)| w).sum();\n        if total_weight == 0.0 {\n            return 0.0;\n        }\n\n        let weighted_score: f32 = self\n            .strategies\n            .iter()\n            .map(|(strategy, weight)| strategy.score(entry, context) * weight)\n            .sum();\n\n        weighted_score / total_weight\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"HybridDecay\"\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::models::{MemoryId, MemoryTier};\n    use chrono::Utc;\n    use std::collections::HashMap;\n\n    fn create_test_entry(salience: f32, access_count: usize) -\u003e MemoryEntry {\n        let mut metadata = HashMap::new();\n        metadata.insert(\"access_count\".to_string(), access_count.to_string());\n\n        MemoryEntry {\n            id: MemoryId::new(),\n            content: \"Test memory\".to_string(),\n            metadata,\n            timestamp: Utc::now(),\n            salience,\n            tier: MemoryTier::Cortex,\n            embedding: None,\n            source_session_id: None,\n            scope: crate::models::MemoryScope::Global,\n        }\n    }\n\n    fn create_test_context() -\u003e DecayContext {\n        DecayContext {\n            current_timestamp: Utc::now(),\n            avg_salience: 0.5,\n            max_salience: 0.9,\n            min_salience: 0.1,\n        }\n    }\n\n    #[test]\n    fn test_time_based_decay_fresh_memory() {\n        let strategy = TimeBasedDecay::new(86400); // 1 day\n        let entry = create_test_entry(0.5, 0);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert!(score \u003c 0.01, \"Fresh memories should have minimal decay\");\n    }\n\n    #[test]\n    fn test_time_based_decay_old_memory() {\n        let strategy = TimeBasedDecay::new(3600); // 1 hour\n        let mut entry = create_test_entry(0.5, 0);\n        entry.timestamp = Utc::now() - chrono::Duration::hours(2);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.5, \"Old memories should have significant decay\");\n    }\n\n    #[test]\n    fn test_time_based_decay_fully_decayed() {\n        let strategy = TimeBasedDecay::new(3600); // 1 hour\n        let mut entry = create_test_entry(0.5, 0);\n        entry.timestamp = Utc::now() - chrono::Duration::hours(3);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 1.0, \"Very old memories should be fully decayed\");\n    }\n\n    #[test]\n    fn test_access_based_decay_frequently_accessed() {\n        let strategy = AccessBasedDecay::new(5);\n        let entry = create_test_entry(0.5, 10);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.0, \"Frequently accessed memories should not decay\");\n    }\n\n    #[test]\n    fn test_access_based_decay_rarely_accessed() {\n        let strategy = AccessBasedDecay::new(5);\n        let entry = create_test_entry(0.5, 1);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.0, \"Rarely accessed memories should decay\");\n    }\n\n    #[test]\n    fn test_relevance_based_decay_high_salience() {\n        let strategy = RelevanceBasedDecay::new(0.7);\n        let entry = create_test_entry(0.8, 0);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.0, \"High-salience memories should not decay\");\n    }\n\n    #[test]\n    fn test_relevance_based_decay_low_salience() {\n        let strategy = RelevanceBasedDecay::new(0.7);\n        let entry = create_test_entry(0.3, 0);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.0, \"Low-salience memories should decay\");\n    }\n\n    #[test]\n    fn test_hybrid_decay_single_strategy() {\n        let time_strategy = Box::new(TimeBasedDecay::new(3600));\n        let hybrid = HybridDecay::new().add_strategy(time_strategy, 1.0);\n\n        let entry = create_test_entry(0.5, 0);\n        let context = create_test_context();\n\n        let score = hybrid.score(\u0026entry, \u0026context);\n        assert!(\n            score \u003e= 0.0 \u0026\u0026 score \u003c= 1.0,\n            \"Hybrid should work with single strategy\"\n        );\n    }\n\n    #[test]\n    fn test_hybrid_decay_multiple_strategies() {\n        let time_strategy = Box::new(TimeBasedDecay::new(3600));\n        let access_strategy = Box::new(AccessBasedDecay::new(5));\n\n        let hybrid = HybridDecay::new()\n            .add_strategy(time_strategy, 0.5)\n            .add_strategy(access_strategy, 0.5);\n\n        let entry = create_test_entry(0.5, 2);\n        let context = create_test_context();\n\n        let score = hybrid.score(\u0026entry, \u0026context);\n        assert!(\n            score \u003e= 0.0 \u0026\u0026 score \u003c= 1.0,\n            \"Hybrid should combine multiple strategies\"\n        );\n    }\n\n    #[test]\n    fn test_decay_strategy_name() {\n        let time = TimeBasedDecay::new(3600);\n        assert_eq!(time.name(), \"TimeBasedDecay\");\n\n        let access = AccessBasedDecay::new(5);\n        assert_eq!(access.name(), \"AccessBasedDecay\");\n\n        let relevance = RelevanceBasedDecay::new(0.7);\n        assert_eq!(relevance.name(), \"RelevanceBasedDecay\");\n\n        let hybrid = HybridDecay::new();\n        assert_eq!(hybrid.name(), \"HybridDecay\");\n    }\n}\n","traces":[{"line":52,"address":[],"length":0,"stats":{"Line":6}},{"line":58,"address":[],"length":0,"stats":{"Line":5}},{"line":59,"address":[],"length":0,"stats":{"Line":15}},{"line":61,"address":[],"length":0,"stats":{"Line":5}},{"line":62,"address":[],"length":0,"stats":{"Line":3}},{"line":63,"address":[],"length":0,"stats":{"Line":2}},{"line":64,"address":[],"length":0,"stats":{"Line":2}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":1}},{"line":72,"address":[],"length":0,"stats":{"Line":1}},{"line":90,"address":[],"length":0,"stats":{"Line":10}},{"line":96,"address":[],"length":0,"stats":{"Line":9}},{"line":97,"address":[],"length":0,"stats":{"Line":18}},{"line":98,"address":[],"length":0,"stats":{"Line":9}},{"line":100,"address":[],"length":0,"stats":{"Line":15}},{"line":103,"address":[],"length":0,"stats":{"Line":9}},{"line":104,"address":[],"length":0,"stats":{"Line":1}},{"line":107,"address":[],"length":0,"stats":{"Line":16}},{"line":108,"address":[],"length":0,"stats":{"Line":16}},{"line":109,"address":[],"length":0,"stats":{"Line":16}},{"line":113,"address":[],"length":0,"stats":{"Line":1}},{"line":114,"address":[],"length":0,"stats":{"Line":1}},{"line":132,"address":[],"length":0,"stats":{"Line":3}},{"line":134,"address":[],"length":0,"stats":{"Line":3}},{"line":140,"address":[],"length":0," enerates deterministic embeddings\n/// based on text hashing. In production, this should be replaced with a real\n/// embedding model like fastembed (BGE-small, 384-dimensional).\npub struct MockEmbedder;\n\nimpl MockEmbedder {\n    /// Create a new MockEmbedder.\n    pub fn new() -\u003e Self {\n        Self\n    }\n\n    /// Get the embedding dimension (384 for BGE-small compatibility).\n    pub fn dimension() -\u003e usize {\n        384\n    }\n}\n\nimpl Default for MockEmbedder {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[async_trait]\nimpl Embedder for MockEmbedder {\n    async fn embed(\u0026self, text: \u0026str) -\u003e Result\u003cVec\u003cf32\u003e\u003e {\n        if text.is_empty() {\n            return Err(CerebrumError::Embedding(\n                \"Cannot embed empty text\".to_string(),\n            ));\n        }\n\n        // Generate a deterministic embedding based on text hash\n        use std::collections::hash_map::DefaultHasher;\n        use std::hash::{Hash, Hasher};\n\n        let mut hasher = DefaultHasher::new();\n        text.hash(\u0026mut hasher);\n        let hash = hasher.finish();\n\n        // Create a 384-dimensional vector from the hash\n        let mut embedding = Vec::with_capacity(Self::dimension());\n        let mut seed = hash;\n\n        for _ in 0..Self::dimension() {\n            // Linear congruential generator for pseudo-random values\n            seed = seed.wrapping_mul(1103515245).wrapping_add(12345);\n            let value = ((seed / 65536) % 32768) as f32 / 32768.0;\n            embedding.push(value);\n        }\n\n        // Normalize the embedding to unit length\n        let norm: f32 = embedding.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n        if norm \u003e 0.0 {\n            for val in \u0026mut embedding {\n                *val /= norm;\n            }\n        }\n\n        Ok(embedding)\n    }\n\n    fn dimension(\u0026self) -\u003e usize {\n        384\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[tokio::test]\n    async fn test_mock_embedder_dimension() {\n        assert_eq!(MockEmbedder::dimension(), 384);\n    }\n\n    #[tokio::test]\n    async fn test_mock_embed_simple_text() {\n        let embedder = MockEmbedder::new();\n        let embedding = embedder\n            .embed(\"Hello, world!\")\n            .await\n            .expect(\"Failed to embed text\");\n\n        assert_eq!(embedding.len(), 384);\n        assert!(embedding.iter().all(|\u0026x| x.is_finite()));\n    }\n\n    #[tokio::test]\n    async fn test_mock_embed_empty_text() {\n        let embedder = MockEmbedder::new();\n        let result = embedder.embed(\"\").await;\n\n        assert!(result.is_err());\n    }\n\n    #[tokio::test]\n    async fn test_mock_embed_consistency() {\n        let embedder = MockEmbedder::new();\n        let text = \"The quick brown fox jumps over the lazy dog\";\n\n        let embedding1 = embedder.embed(text).await.expect(\"Failed to embed text\");\n        let embedding2 = embedder.embed(text).await.expect(\"Failed to embed text\");\n\n        // Embeddings should be identical for the same text\n        assert_eq!(embedding1, embedding2);\n    }\n\n    #[tokio::test]\n    async fn test_mock_embed_different_texts() {\n        let embedder = MockEmbedder::new();\n\n        let embedding1 = embedder\n            .embed(\"Hello, world!\")\n            .await\n            .expect(\"Failed to embed\");\n        let embedding2 = embedder\n            .embed(\"Goodbye, world!\")\n            .await\n            .expect(\"Failed to embed\");\n\n        // Different texts should produce different embeddings\n        assert_ne!(embedding1, embedding2);\n    }\n\n    #[tokio::test]\n    async fn test_mock_embed_normalized() {\n        let embedder = MockEmbedder::new();\n        let embedding = embedder.embed(\"Test text\").await.expect(\"Failed to embed\");\n\n        // Check that embedding is approximately unit length\n
