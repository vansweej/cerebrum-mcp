th":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","orchestrator.rs"],"content":"use crate::embedder::Embedder;\nuse crate::error::Result;\nuse crate::lancedb_cortex::LanceDBCortex;\nuse crate::models::{MemoryEntry, MemoryId, MemoryScope, MemoryTier};\nuse crate::synapse::SynapseMemory;\nuse crate::traits::MemoryStore;\nuse std::collections::HashMap;\nuse std::path::Path;\nuse std::sync::Arc;\n\n/// Orchestrates memory operations across Synapse and Cortex tiers.\n///\n/// Provides a unified interface for memory operations with automatic\n/// tier management, blended search, and promotion logic.\npub struct MemoryOrchestrator {\n    synapse: Arc\u003cSynapseMemory\u003e,\n    cortex: Arc\u003cdyn MemoryStore\u003e,\n    embedder: Arc\u003cdyn Embedder\u003e,\n}\n\nimpl MemoryOrchestrator {\n    /// Create a new MemoryOrchestrator with LanceDB Cortex backend.\n    ///\n    /// # Arguments\n    /// * `db_path`    – Path to the LanceDB database directory\n    /// * `table_name` – Name of the LanceDB table\n    /// * `dim`        – Expected embedding dimension\n    /// * `embedder`   – Embedder instance for generating embeddings\n    pub async fn new(\n        db_path: \u0026Path,\n        table_name: \u0026str,\n        dim: usize,\n        embedder: Arc\u003cdyn Embedder\u003e,\n    ) -\u003e Result\u003cSelf\u003e {\n        let synapse = Arc::new(SynapseMemory::new(embedder.clone()));\n        let cortex: Arc\u003cdyn MemoryStore\u003e =\n            Arc::new(LanceDBCortex::new(db_path, table_name, dim, embedder.clone()).await?);\n\n        Ok(Self {\n            synapse,\n            cortex,\n            embedder,\n        })\n    }\n\n    /// Get a reference to the embedder.\n    pub fn embedder(\u0026self) -\u003e Arc\u003cdyn Embedder\u003e {\n        Arc::clone(\u0026self.embedder)\n    }\n\n    /// Get a reference to the Synapse tier.\n    pub fn synapse(\u0026self) -\u003e Arc\u003cSynapseMemory\u003e {\n        Arc::clone(\u0026self.synapse)\n    }\n\n    /// Get a reference to the Cortex tier.\n    pub fn cortex(\u0026self) -\u003e Arc\u003cdyn MemoryStore\u003e {\n        Arc::clone(\u0026self.cortex)\n    }\n\n    /// Store a memory in the Synapse tier (short-term).\n    ///\n    /// # Arguments\n    /// * `content` - The memory content\n    /// * `metadata` - Optional metadata key-value pairs\n    ///\n    /// # Returns\n    /// The ID of the stored memory\n    pub async fn remember(\n        \u0026self,\n        content: String,\n        metadata: HashMap\u003cString, String\u003e,\n    ) -\u003e Result\u003cMemoryId\u003e {\n        let id = MemoryId::new();\n\n        // Generate embedding\n        let embedding = self.embedder.embed(\u0026content).await?;\n\n        // Create entry with embedding\n        let mut entry = MemoryEntry::builder(id, content)\n            .embedding(embedding)\n            .tier(MemoryTier::Synapse)\n            .build();\n\n        entry.metadata = metadata;\n\n        // Store in Synapse\n        self.synapse.store(entry).await?;\n\n        Ok(id)\n    }\n\n    /// Recall memories matching a query from both tiers.\n    ///\n    /// Performs blended search across Synapse and Cortex, merging and\n    /// ranking results by relevance and salience.\n    ///\n    /// # Arguments\n    /// * `query` - The search query\n    /// * `limit` - Maximum number of results to return\n    ///\n    /// # Returns\n    /// Ranked list of matching memories\n    pub async fn recall(\u0026self, query: String, limit: usize) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        // Search both tiers in parallel\n        let synapse_results = self.synapse.retrieve(\u0026query, limit).await?;\n        let cortex_results = self.cortex.retrieve(\u0026query, limit).await?;\n\n        // Merge results\n        let mut all_results = Vec::new();\n        all_results.extend(synapse_results);\n        all_results.extend(cortex_results);\n\n        // Remove duplicates (keep first occurrence)\n        let mut seen = std::collections::HashSet::new();\n        all_results.retain(|entry| seen.insert(entry.id));\n\n        // Sort by salience (descending)\n        all_results.sort_by(|a, b| {\n            b.salience\n                .partial_cmp(\u0026a.salience)\n                .unwrap_or(std::cmp::Ordering::Equal)\n        });\n\n        // Return top N\n        Ok(all_results.into_iter().take(limit).collect())\n    }\n\n    /// Recall memories matching a query and scope from both tiers (Phase 5).\n    ///\n    /// Performs blended search across Synapse and Cortex, filtering by scope,\n    /// and merging and ranking results by relevance and salience.\n    ///\n    /// # Arguments\n    /// * `query` - The search query\n    /// * `scope` - Memory scope filter\n    /// * `limit` - Maximum number of results to return\n    ///\n    /// # Returns\n    /// Ranked list of matching memories within the specified scope\n    pub async fn recall_by_scope(\n        \u0026self,\n        query: String,\n        scope: MemoryScope,\n        limit: usize,\n    ) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        // Search both tiers in parallel with scope filtering\n        let synapse_results = self\n            .synapse\n            .retrieve_by_scope(\u0026query, \u0026scope, limit)\n            .await?;\n        let cortex_results = self.cortex.retrieve_by_scope(\u0026query, \u0026scope, limit).await?;\n\n        // Merge results\n        let mut all_results = Vec::new();\n        all_results.extend(synapse_results);\n        all_results.extend(cortex_results);\n\n        // Remove duplicates (keep first occurrence)\n        let mut seen = std::collections::HashSet::new();\n        all_results.retain(|entry| seen.insert(entry.id));\n\n        // Sort by salience (descending)\n        all_results.sort_by(|a, b| {\n            b.salience\n                .partial_cmp(\u0026a.salience)\n                .unwrap_or(std::cmp::Ordering::Equal)\n        });\n\n        // Return top N\n        Ok(all_results.into_iter().take(limit).collect())\n    }\n    ///\n    /// Moves a memory from short-term to long-term storage.\n    ///\n    /// # Arguments\n    /// * `id` - The ID of the memory to promote\n    pub async fn memorize(\u0026self, id: MemoryId) -\u003e Result\u003c()\u003e {\n        // Retrieve from Synapse\n        if let Some(entry) = self.synapse.list().await?.into_iter().find(|e| e.id == id) {\n            // Create a copy with Cortex tier\n            let mut cortex_entry = entry.clone();\n            cortex_entry.tier = MemoryTier::Cortex;\n\n            // Store in Cortex\n            self.cortex.store(cortex_entry).await?;\n\n            // Delete from Synapse\n            self.synapse.delete(\u0026id).await?;\n\n            Ok(())\n        } else {\n            Err(crate::error::CerebrumError::NotFound(format!(\n                \"Memory {} not found in Synapse\",\n                id\n            )))\n        }\n    }\n\n    /// Delete a memory from both tiers.\n    ///\n    /// # Arguments\n    /// * `id` - The ID of the memory to delete\n    pub async fn forget(\u0026self, id: MemoryId) -\u003e Result\u003c()\u003e {\n        // Try to delete from both tiers (ignore errors if not found)\n        let _ = self.synapse.delete(\u0026id).await;\n        let _ = self.cortex.delete(\u0026id).await;\n\n        Ok(())\n    }\n\n    /// End the current session.\n    ///\n    /// Clears Synapse and optionally promotes high-salience memories to Cortex.\n    ///\n    /// # Arguments\n    /// * `auto_promote_threshold` - Salience threshold for automatic promotion (0.0-1.0)\n    pub async fn end_session(\u0026self, auto_promote_threshold: f32) -\u003e Result\u003c()\u003e {\n        // Get all memories from Synapse\n        let memories = self.synapse.list().await?;\n\n        // Promote high-salience memories\n        for entry in memories {\n            if entry.salience \u003e= auto_promote_threshold {\n                let mut cortex_entry = entry.clone();\n                cortex_entry.tier = MemoryTier::Cortex;\n                self.cortex.store(cortex_entry).await?;\n            }\n        }\n\n        // Clear Synapse\n        self.synapse.clear().await?;\n\n        Ok(())\n    }\n\n    /// Get the number of memories in Synapse.\n    pub async fn synapse_len(\u0026self) -\u003e Result\u003cusize\u003e {\n        Ok(self.synapse.len())\n    }\n\n    /// Get the number of memories in Cortex.\n    pub async fn cortex_len(\u0026self) -\u003e Result\u003cusize\u003e {\n        self.cortex.len().await\n    }\n\n    /// Get all memories from Synapse.\n    pub async fn synapse_list(\u0026self) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        self.synapse.list().await\n    }\n\n    /// Get all memories from Cortex.\n    pub async fn cortex_list(\u0026self) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        self.cortex.list().await\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use tempfile;\n\n    #[tokio::test]\n    async fn test_orchestrator_new() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n        assert_eq!(orchestrator.cortex_len().await.unwrap(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_remember() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n\n        let memories = orchestrator.synapse_list().await.unwrap();\n        assert_eq!(memories[0].id, id);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_recall() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let results = orchestrator\n            .recall(\"test\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_memorize() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n        assert_eq!(orchestrator.cortex_len().await.unwrap(), 0);\n\n        orchestrator.memorize(id).await.expect(\"Failed to memorize\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n        assert_eq!(orchestrator.cortex_len().await.unwrap(), 1);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_forget() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n\n        orchestrator.forget(id).await.expect(\"Failed to forget\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_end_session_with_promotion() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        // Store memories with different salience levels\n        let _id1 = orchestrator\n            .remember(\"Important memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let _id2 = orchestrator\n            .remember(\"Less important memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Manually set salience (in real scenario, this would be set during remember)\n        let mut memories = orchestrator.synapse_list().await.unwrap();\n        memories[0].salience = 0.9;\n        memories[1].salience = 0.2;\n\n        // Re-store with updated salience\n        orchestrator.forget(_id1).await.ok();\n        orchestrator.forget(_id2).await.ok();\n\n        let _id1 = orchestrator\n            .remember(\"Important memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let _id2 = orchestrator\n            .remember(\"Less important memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Update salience manually\n        let mut synapse_memories = orchestrator.synapse_list().await.unwrap();\n        synapse_memories[0].salience = 0.9;\n        synapse_memories[1].salience = 0.2;\n\n        // End session with threshold 0.5\n        orchestrator\n            .end_session(0.5)\n            .await\n            .expect(\"Failed to end session\");\n\n        // Synapse should be empty\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_blended_recall() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        // Store in Synapse\n        let _id1 = orchestrator\n            .remember(\"Synapse memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Store in Cortex\n        let id2 = orchestrator\n            .remember(\"Cortex memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        orchestrator\n            .memorize(id2)\n            .await\n            .expect(\"Failed to memorize\");\n\n        // Recall should return results from both tiers\n        let results = orchestrator\n            .recall(\"memory\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        assert_eq!(results.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_recall_deduplication() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Promote to Cortex (now in both tiers)\n        orchestrator.memorize(id).await.expect(\"Failed to memorize\");\n\n        // Store another copy in Synapse\n        let _id2 = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Recall should deduplicate\n        let results = orchestrator\n            .recall(\"test\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        // Should have 2 unique memories, not duplicates\n        assert_eq!(results.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_accessor_embedder() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let retrieved_embedder = orchestrator.embedder();\n        // Verify we can use the embedder\n        let embedding = retrieved_embedder\n            .embed(\"test\")\n            .await\n            .expect(\"Failed to embed\");\n        assert!(!embedding.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_accessor_synapse() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let synapse = orchestrator.synapse();\n        assert_eq!(synapse.len(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_accessor_cortex() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let cortex = orchestrator.cortex();\n        // Verify we can use the cortex trait object\n        let is_empty = cortex.list().await.expect(\"Failed to list\").is_empty();\n        assert!(is_empty);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_lancedb_remember_and_recall() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let _id1 = orchestrator\n            .remember(\"First memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let _id2 = orchestrator\n            .remember(\"Second memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let results = orchestrator\n            .recall(\"memory\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        assert_eq!(results.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_lancedb_memorize() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n\n        orchestrator.memorize(id).await.expect(\"Failed to memorize\");\n\n        // After memorize, memory should still be accessible\n        let results = orchestrator\n            .recall(\"test\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_lancedb_forget() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n\n        orchestrator.forget(id).await.expect(\"Failed to forget\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_lancedb_recall_by_scope() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let _id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let results = orchestrator\n            .recall_by_scope(\"test\".to_string(), MemoryScope::Global, 10)\n            .await\n            .expect(\"Failed to recall by scope\");\n\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_lancedb_end_session() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let _id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        orchestrator\n            .end_session(0.5)\n            .await\n            .expect(\"Failed to end session\");\n\n        // After end_session, synapse should be empty\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n    }\n}\n","traces":[{"line":29,"address":[],"length":0,"stats":{"Line":81}},{"line":35,"address":[],"length":0,"stats":{"Line":324}},{"line":36,"address":[],"length":0,"stats":{"Line":162}},{"line":37,"address":[],"length":0,"stats":{"Line":486}},{"line":39,"address":[],"length":0,"stats":{"Line":81}},{"line":40,"address":[],"length":0,"stats":{"Line":162}},{"line":41,"address":[],"length":0,"stats":{"Line":81}},{"line":42,"address":[],"length":0,"stats":{"Line":81}},{"line":47,"address":[],"length":0,"stats":{"Line":2}},{"line":48,"address":[],"length":0,"stats":{"Line":2}},{"line":52,"address":[],"length":0,"stats":{"Line":2}},{"line":53,"address":[],"length":0,"stats":{"Line":4}},{"line":57,"address":[],"length":0,"stats":{"Line":3}},{"line":58,"address":[],"length":0," d","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","promotion.rs"],"content":"//! Memory promotion strategies for automatic Synapse → Cortex promotion.\n//!\n//! This module provides pluggable promotion strategies that determine when and how\n//! memories should be promoted from short-term (Synapse) to long-term (Cortex) storage.\n\nuse crate::models::MemoryEntry;\n\n/// Trait for memory promotion strategies.\n///\n/// Implementations define different criteria for promoting memories from Synapse to Cortex.\npub trait PromotionStrategy: Send + Sync {\n    /// Calculate a promotion score for a memory (0.0-1.0).\n    ///\n    /// Higher scores indicate stronger candidates for promotion.\n    /// A score of 1.0 means the memory should definitely be promoted.\n    /// A score of 0.0 means the memory should not be promoted.\n    fn score(\u0026self, entry: \u0026MemoryEntry, context: \u0026PromotionContext) -\u003e f32;\n\n    /// Get the name of this strategy.\n    fn name(\u0026self) -\u003e \u0026str;\n}\n\n/// Context information for promotion decisions.\n///\n/// Provides additional data that promotion strategies may use to make decisions.\n#[derive(Clone, Debug)]\npub struct PromotionContext {\n    /// Total number of memories in Synapse\n    pub synapse_total: usize,\n    /// Total number of memories in Cortex\n    pub cortex_total: usize,\n    /// Average salience of memories in Synapse\n    pub avg_salience: f32,\n    /// Maximum salience of memories in Synapse\n    pub max_salience: f32,\n    /// Minimum salience of memories in Synapse\n    pub min_salience: f32,\n}\n\n/// Frequency-based promotion strategy.\n///\n/// Promotes memories that have been accessed frequently.\n/// Requires `access_count` field in MemoryEntry.\npub struct FrequencyBasedPromotion {\n    /// Threshold for access count (memories with count \u003e= threshold are promoted)\n    pub threshold: usize,\n}\n\nimpl FrequencyBasedPromotion {\n    /// Create a new frequency-based promotion strategy.\n    pub fn new(threshold: usize) -\u003e Self {\n        Self { threshold }\n    }\n}\n\nimpl PromotionStrategy for FrequencyBasedPromotion {\n    fn score(\u0026self, entry: \u0026MemoryEntry, _context: \u0026PromotionContext) -\u003e f32 {\n        // Score based on access count (normalized to 0.0-1.0)\n        // Assuming access_count is stored in metadata under \"access_count\"\n        let access_count = entry\n            .metadata\n            .get(\"access_count\")\n            .and_then(|s| s.parse::\u003cusize\u003e().ok())\n            .unwrap_or(0);\n\n        if access_count \u003e= self.threshold {\n            // Normalize: score increases with access count\n            // Cap at 1.0 for very high access counts\n            ((access_count as f32) / (self.threshold as f32 * 2.0)).min(1.0)\n        } else {\n            0.0\n        }\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"FrequencyBased\"\n    }\n}\n\n/// Recency-based promotion strategy.\n///\n/// Promotes memories that have been accessed recently.\n/// Uses the `timestamp` field to determine recency.\npub struct RecencyBasedPromotion {\n    /// Maximum age in seconds for a memory to be considered recent\n    pub max_age_seconds: i64,\n}\n\nimpl RecencyBasedPromotion {\n    /// Create a new recency-based promotion strategy.\n    pub fn new(max_age_seconds: i64) -\u003e Self {\n        Self { max_age_seconds }\n    }\n}\n\nimpl PromotionStrategy for RecencyBasedPromotion {\n    fn score(\u0026self, entry: \u0026MemoryEntry, _context: \u0026PromotionContext) -\u003e f32 {\n        use chrono::Utc;\n\n        let now = Utc::now();\n        let age_seconds = (now - entry.timestamp).num_seconds();\n\n        if age_seconds \u003c= self.max_age_seconds {\n            // Score decreases with age\n            // Recent memories get higher scores\n            1.0 - (age_seconds as f32 / self.max_age_seconds as f32)\n        } else {\n            0.0\n        }\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"RecencyBased\"\n    }\n}\n\n/// Importance-based promotion strategy.\n///\n/// Promotes memories with high salience scores.\npub struct ImportanceBasedPromotion {\n    /// Salience threshold for promotion (0.0-1.0)\n    pub threshold: f32,\n}\n\nimpl ImportanceBasedPromotion {\n    /// Create a new importance-based promotion strategy.\n    pub fn new(threshold: f32) -\u003e Self {\n        Self {\n            threshold: threshold.clamp(0.0, 1.0),\n        }\n    }\n}\n\nimpl PromotionStrategy for ImportanceBasedPromotion {\n    fn score(\u0026self, entry: \u0026MemoryEntry, _context: \u0026PromotionContext) -\u003e f32 {\n        if entry.salience \u003e= self.threshold {\n            entry.salience\n        } else {\n            0.0\n        }\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"ImportanceBased\"\n    }\n}\n\n/// Hybrid promotion strategy combining multiple strategies.\n///\n/// Combines multiple strategies with configurable weights.\npub struct HybridPromotion {\n    strategies: Vec\u003c(Box\u003cdyn PromotionStrategy\u003e, f32)\u003e, // (strategy, weight)\n}\n\nimpl HybridPromotion {\n    /// Create a new hybrid promotion strategy.\n    pub fn new() -\u003e Self {\n        Self {\n            strategies: Vec::new(),\n        }\n    }\n\n    /// Add a strategy with a weight.\n    ///\n    /// Weights are normalized, so they don't need to sum to 1.0.\n    pub fn add_strategy(mut self, strategy: Box\u003cdyn PromotionStrategy\u003e, weight: f32) -\u003e Self {\n        self.strategies.push((strategy, weight));\n        self\n    }\n}\n\nimpl Default for HybridPromotion {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl PromotionStrategy for HybridPromotion {\n    fn score(\u0026self, entry: \u0026MemoryEntry, context: \u0026PromotionContext) -\u003e f32 {\n        if self.strategies.is_empty() {\n            return 0.0;\n        }\n\n        let total_weight: f32 = self.strategies.iter().map(|(_, w)| w).sum();\n        if total_weight == 0.0 {\n            return 0.0;\n        }\n\n        let weighted_score: f32 = self\n            .strategies\n            .iter()\n            .map(|(strategy, weight)| strategy.score(entry, context) * weight)\n            .sum();\n\n        weighted_score / total_weight\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"Hybrid\"\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::models::{MemoryId, MemoryTier};\n    use chrono::Utc;\n    use std::collections::HashMap;\n\n    fn create_test_entry(salience: f32, access_count: usize) -\u003e MemoryEntry {\n        let mut metadata = HashMap::new();\n        metadata.insert(\"access_count\".to_string(), access_count.to_string());\n\n        MemoryEntry {\n            id: MemoryId::new(),\n            content: \"Test memory\".to_string(),\n            metadata,\n            timestamp: Utc::now(),\n            salience,\n            tier: MemoryTier::Synapse,\n            embedding: None,\n            source_session_id: None,\n            scope: crate::models::MemoryScope::Global,\n        }\n    }\n\n    fn create_test_context() -\u003e PromotionContext {\n        PromotionContext {\n            synapse_total: 10,\n            cortex_total: 50,\n            avg_salience: 0.5,\n            max_salience: 0.9,\n            min_salience: 0.1,\n        }\n    }\n\n    #[test]\n    fn test_frequency_based_promotion_above_threshold() {\n        let strategy = FrequencyBasedPromotion::new(5);\n        let entry = create_test_entry(0.5, 10);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.0, \"Should promote high-frequency memories\");\n    }\n\n    #[test]\n    fn test_frequency_based_promotion_below_threshold() {\n        let strategy = FrequencyBasedPromotion::new(5);\n        let entry = create_test_entry(0.5, 2);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.0, \"Should not promote low-frequency memories\");\n    }\n\n    #[test]\n    fn test_importance_based_promotion_above_threshold() {\n        let strategy = ImportanceBasedPromotion::new(0.7);\n        let entry = create_test_entry(0.8, 0);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.8, \"Should promote high-salience memories\");\n    }\n\n    #[test]\n    fn test_importance_based_promotion_below_threshold() {\n        let strategy = ImportanceBasedPromotion::new(0.7);\n        let entry = create_test_entry(0.5, 0);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.0, \"Should not promote low-salience memories\");\n    }\n\n    #[test]\n    fn test_recency_based_promotion_recent() {\n        let strategy = RecencyBasedPromotion::new(3600); // 1 hour\n        let entry = create_test_entry(0.5, 0);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.9, \"Should promote very recent memories\");\n    }\n\n    #[test]\n    fn test_recency_based_promotion_old() {\n        let strategy = RecencyBasedPromotion::new(60); // 1 minute\n        let mut entry = create_test_entry(0.5, 0);\n        // Simulate an old memory by setting timestamp to 2 hours ago\n        entry.timestamp = Utc::now() - chrono::Duration::hours(2);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.0, \"Should not promote old memories\");\n    }\n\n    #[test]\n    fn test_hybrid_promotion_single_strategy() {\n        let freq_strategy = Box::new(FrequencyBasedPromotion::new(5));\n        let hybrid = HybridPromotion::new().add_strategy(freq_strategy, 1.0);\n\n        let entry = create_test_entry(0.5, 10);\n        let context = create_test_context();\n\n        let score = hybrid.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.0, \"Hybrid should work with single strategy\");\n    }\n\n    #[test]\n    fn test_hybrid_promotion_multiple_strategies() {\n        let freq_strategy = Box::new(FrequencyBasedPromotion::new(5));\n        let importance_strategy = Box::new(ImportanceBasedPromotion::new(0.7));\n\n        let hybrid = HybridPromotion::new()\n            .add_strategy(freq_strategy, 0.5)\n            .add_strategy(importance_strategy, 0.5);\n\n        let entry = create_test_entry(0.8, 10);\n        let context = create_test_context();\n\n        let score = hybrid.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.0, \"Hybrid should combine multiple strategies\");\n    }\n\n    #[test]\n    fn test_promotion_strategy_name() {\n        let freq = FrequencyBasedPromotion::new(5);\n        assert_eq!(freq.name(), \"FrequencyBased\");\n\n        let importance = ImportanceBasedPromotion::new(0.7);\n        assert_eq!(importance.name(), \"ImportanceBased\");\n\n        let recency = RecencyBasedPromotion::new(3600);\n        assert_eq!(recency.name(), \"RecencyBased\");\n\n        let hybrid = HybridPromotion::new();\n        assert_eq!(hybrid.name(), \"Hybrid\");\n    }\n}\n","traces":[{"line":51,"address":[],"length":0,"stats":{"Line":7}},{"line":57,"address":[],"length":0,"stats":{"Line":6}},{"line":60,"address":[],"length":0,"stats":{"Line":12}},{"line":61,"address":[],"length":0,"stats":{"Line":6}},{"line":63,"address":[],"length":0,"stats":{"Line":14}},{"line":66,"address":[],"length":0,"stats":{"Line":6}},{"line":69,"address":[],"length":0,"stats":{"Line":6}},{"line":71,"address":[],"length":0,"stats":{"Line":3}},{"line":75,"address":[],"length":0,"stats":{"Line":1}},{"line":76,"address":[],"length":0,"stats":{" gth":0,"stats":{"Line":1}}],"covered":42,"coverable":46},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","resilience.rs"],"content":"use crate::error::{CerebrumError, Result};\nuse std::sync::atomic::{AtomicU64, Ordering};\nuse std::sync::Arc;\nuse std::time::{Duration, Instant};\nuse tracing::{debug, warn};\n\n/// Configuration for retry logic with exponential backoff.\n#[derive(Debug, Clone)]\npub struct RetryConfig {\n    /// Maximum number of retry attempts.\n    pub max_retries: u32,\n    /// Initial backoff duration in milliseconds.\n    pub initial_backoff_ms: u64,\n    /// Maximum backoff duration in milliseconds.\n    pub max_backoff_ms: u64,\n    /// Backoff multiplier for exponential growth.\n    pub backoff_multiplier: f64,\n    /// Whether to add jitter to backoff times.\n    pub use_jitter: bool,\n}\n\nimpl RetryConfig {\n    /// Create a new RetryConfig with default values.\n    pub fn new() -\u003e Self {\n        Self {\n            max_retries: 3,\n            initial_backoff_ms: 100,\n            max_backoff_ms: 10000,\n            backoff_multiplier: 2.0,\n            use_jitter: true,\n        }\n    }\n\n    /// Set the maximum number of retries.\n    pub fn with_max_retries(mut self, max_retries: u32) -\u003e Self {\n        self.max_retries = max_retries;\n        self\n    }\n\n    /// Set the initial backoff duration.\n    pub fn with_initial_backoff_ms(mut self, ms: u64) -\u003e Self {\n        self.initial_backoff_ms = ms;\n        self\n    }\n\n    /// Set the maximum backoff duration.\n    pub fn with_max_backoff_ms(mut self, ms: u64) -\u003e Self {\n        self.max_backoff_ms = ms;\n        self\n    }\n\n    /// Set the backoff multiplier.\n    pub fn with_backoff_multiplier(mut self, multiplier: f64) -\u003e Self {\n        self.backoff_multiplier = multiplier;\n        self\n    }\n\n    /// Set whether to use jitter.\n    pub fn with_jitter(mut self, use_jitter: bool) -\u003e Self {\n        self.use_jitter = use_jitter;\n        self\n    }\n\n    /// Calculate the backoff duration for a given attempt number.\n    pub fn calculate_backoff(\u0026self, attempt: u32) -\u003e Duration {\n        let backoff_ms =\n            (self.initial_backoff_ms as f64 * self.backoff_multiplier.powi(attempt as i32)) as u64;\n        let backoff_ms = backoff_ms.min(self.max_backoff_ms);\n\n        if self.use_jitter {\n            // Add jitter: random value between 0 and backoff_ms\n            let jitter = (backoff_ms as f64 * 0.1) as u64; // 10% jitter\n            Duration::from_millis(backoff_ms + jitter)\n        } else {\n            Duration::from_millis(backoff_ms)\n        }\n    }\n}\n\nimpl Default for RetryConfig {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Circuit breaker for handling transient failures.\n///\n/// The circuit breaker has three states:\n/// - Closed: Normal operation, requests pass through\n/// - Open: Too many failures, requests fail immediately\n/// - Half-Open: Testing if the service has recovered\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum CircuitState {\n    /// Normal operation, requests pass through.\n    Closed,\n    /// Too many failures, requests fail immediately.\n    Open,\n    /// Testing if the service has recovered.\n    HalfOpen,\n}\n\n/// Configuration for circuit breaker.\n#[derive(Debug, Clone)]\npub struct CircuitBreakerConfig {\n    /// Number of consecutive failures to trigger open state.\n    pub failure_threshold: u64,\n    /// Duration to wait before transitioning from Open to HalfOpen.\n    pub timeout_ms: u64,\n}\n\nimpl CircuitBreakerConfig {\n    /// Create a new CircuitBreakerConfig with default values.\n    pub fn new() -\u003e Self {\n        Self {\n            failure_threshold: 5,\n            timeout_ms: 60000, // 1 minute\n        }\n    }\n\n    /// Set the failure threshold.\n    pub fn with_failure_threshold(mut self, threshold: u64) -\u003e Self {\n        self.failure_threshold = threshold;\n        self\n    }\n\n    /// Set the timeout duration.\n    pub fn with_timeout_ms(mut self, ms: u64) -\u003e Self {\n        self.timeout_ms = ms;\n        self\n    }\n}\n\nimpl Default for CircuitBreakerConfig {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Circuit breaker for handling transient failures.\npub struct CircuitBreaker {\n    state: Arc\u003cstd::sync::Mutex\u003cCircuitState\u003e\u003e,\n    failure_count: Arc\u003cAtomicU64\u003e,\n    last_failure_time: Arc\u003cstd::sync::Mutex\u003cOption\u003cInstant\u003e\u003e\u003e,\n    config: CircuitBreakerConfig,\n}\n\nimpl CircuitBreaker {\n    /// Create a new circuit breaker.\n    pub fn new(config: CircuitBreakerConfig) -\u003e Self {\n        Self {\n            state: Arc::new(std::sync::Mutex::new(CircuitState::Closed)),\n            failure_count: Arc::new(AtomicU64::new(0)),\n            last_failure_time: Arc::new(std::sync::Mutex::new(None)),\n            config,\n        }\n    }\n\n    /// Get the current state of the circuit breaker.\n    pub fn state(\u0026self) -\u003e CircuitState {\n        *self.state.lock().unwrap()\n    }\n\n    /// Record a successful operation.\n    pub fn record_success(\u0026self) {\n        let mut state = self.state.lock().unwrap();\n        self.failure_count.store(0, Ordering::Relaxed);\n        *state = CircuitState::Closed;\n        debug!(\"Circuit breaker: success, state=Closed\");\n    }\n\n    /// Record a failed operation.\n    pub fn record_failure(\u0026self) {\n        let failures = self.failure_count.fetch_add(1, Ordering::Relaxed) + 1;\n        *self.last_failure_time.lock().unwrap() = Some(Instant::now());\n\n        if failures \u003e= self.config.failure_threshold {\n            let mut state = self.state.lock().unwrap();\n            *state = CircuitState::Open;\n            warn!(\n                \"Circuit breaker: failure threshold reached ({}), state=Open\",\n                failures\n            );\n        }\n    }\n\n    /// Check if a request should be allowed.\n    pub fn allow_request(\u0026self) -\u003e Result\u003c()\u003e {\n        let mut state = self.state.lock().unwrap();\n\n        match *state {\n            CircuitState::Closed =\u003e Ok(()),\n            CircuitState::Open =\u003e {\n                // Check if timeout has elapsed\n                if let Some(last_failure) = *self.last_failure_time.lock().unwrap() {\n                    if last_failure.elapsed() \u003e Duration::from_millis(self.config.timeout_ms) {\n                        *state = CircuitState::HalfOpen;\n                        debug!(\"Circuit breaker: timeout elapsed, state=HalfOpen\");\n                        Ok(())\n                    } else {\n                        Err(CerebrumError::Unavailable(\n                            \"Circuit breaker is open\".to_string(),\n                        ))\n                    }\n                } else {\n                    Err(CerebrumError::Unavailable(\n                        \"Circuit breaker is open\".to_string(),\n                    ))\n                }\n            }\n            CircuitState::HalfOpen =\u003e Ok(()),\n        }\n    }\n\n    /// Reset the circuit breaker to closed state.\n    pub fn reset(\u0026self) {\n        let mut state = self.state.lock().unwrap();\n        *state = CircuitState::Closed;\n        self.failure_count.store(0, Ordering::Relaxed);\n        *self.last_failure_time.lock().unwrap() = None;\n        debug!(\"Circuit breaker: reset, state=Closed\");\n    }\n}\n\nimpl Clone for CircuitBreaker {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            state: Arc::clone(\u0026self.state),\n            failure_count: Arc::clone(\u0026self.failure_count),\n            last_failure_time: Arc::clone(\u0026self.last_failure_time),\n            config: self.config.clone(),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_retry_config_new() {\n        let config = RetryConfig::new();\n        assert_eq!(config.max_retries, 3);\n        assert_eq!(config.initial_backoff_ms, 100);\n        assert_eq!(config.max_backoff_ms, 10000);\n        assert_eq!(config.backoff_multiplier, 2.0);\n        assert!(config.use_jitter);\n    }\n\n    #[test]\n    fn test_retry_config_with_max_retries() {\n        let config = RetryConfig::new().with_max_retries(5);\n        assert_eq!(config.max_retries, 5);\n    }\n\n    #[test]\n    fn test_retry_config_with_initial_backoff() {\n        let config = RetryConfig::new().with_initial_backoff_ms(200);\n        assert_eq!(config.initial_backoff_ms, 200);\n    }\n\n    #[test]\n    fn test_retry_config_calculate_backoff() {\n        let config = RetryConfig::new()\n            .with_initial_backoff_ms(100)\n            .with_jitter(false);\n\n        let backoff0 = config.calculate_backoff(0);\n        let backoff1 = config.calculate_backoff(1);\n        let backoff2 = config.calculate_backoff(2);\n\n        assert_eq!(backoff0.as_millis(), 100);\n        assert_eq!(backoff1.as_millis(), 200);\n        assert_eq!(backoff2.as_millis(), 400);\n    }\n\n    #[test]\n    fn test_retry_config_calculate_backoff_max() {\n        let config = RetryConfig::new()\n            .with_initial_backoff_ms(100)\n            .with_max_backoff_ms(500)\n            .with_jitter(false);\n\n        let backoff5 = config.calculate_backoff(5);\n        assert!(backoff5.as_millis() \u003c= 500);\n    }\n\n    #[test]\n    fn test_circuit_breaker_config_new() {\n        let config = CircuitBreakerConfig::new();\n        assert_eq!(config.failure_threshold, 5);\n        assert_eq!(config.timeout_ms, 60000);\n    }\n\n    #[test]\n    fn test_circuit_breaker_new() {\n        let config = CircuitBreakerConfig::new();\n        let breaker = CircuitBreaker::new(config);\n        assert_eq!(breaker.state(), CircuitState::Closed);\n    }\n\n    #[test]\n    fn test_circuit_breaker_allow_request_closed() {\n        let config = CircuitBreakerConfig::new();\n        let breaker = CircuitBreaker::new(config);\n        assert!(breaker.allow_request().is_ok());\n    }\n\n    #[test]\n    fn test_circuit_breaker_record_success() {\n        let config = CircuitBreakerConfig::new();\n        let breaker = CircuitBreaker::new(config);\n        breaker.record_success();\n        assert_eq!(breaker.state(), CircuitState::Closed);\n    }\n\n    #[test]\n    fn test_circuit_breaker_record_failure() {\n        let config = CircuitBreakerConfig::new().with_failure_threshold(3);\n        let breaker = CircuitBreaker::new(config);\n\n        breaker.record_failure();\n        breaker.record_failure();\n        assert_eq!(breaker.state(), CircuitState::Closed);\n\n        breaker.record_failure();\n        assert_eq!(breaker.state(), CircuitState::Open);\n    }\n\n    #[test]\n    fn test_circuit_breaker_open_denies_requests() {\n        let config = CircuitBreakerConfig::new().with_failure_threshold(1);\n        let breaker = CircuitBreaker::new(config);\n\n        breaker.record_failure();\n        assert_eq!(breaker.state(), CircuitState::Open);\n        assert!(breaker.allow_request().is_err());\n    }\n\n    #[test]\n    fn test_circuit_breaker_reset() {\n        let config = CircuitBreakerConfig::new().with_failure_threshold(1);\n        let breaker = CircuitBreaker::new(config);\n\n        breaker.record_failure();\n        assert_eq!(breaker.state(), CircuitState::Open);\n\n        breaker.reset();\n        assert_eq!(breaker.state(), CircuitState::Closed);\n        assert!(breaker.allow_request().is_ok());\n    }\n\n    #[test]\n    fn test_circuit_breaker_clone() {\n        let config = CircuitBreakerConfig::new();\n        let breaker = CircuitBreaker::new(config);\n        let cloned = breaker.clone();\n\n        breaker.record_failure();\n        // Both should share the same state\n        assert_eq!(cloned.state(), breaker.state());\n    }\n\n    #[test]\n    fn test_retry_config_default() {\n        let default_config = RetryConfig::default();\n        let new_config = RetryConfig::new();\n        assert_eq!(\n            default_config.calculate_backoff(0).as_millis(),\n            new_config.calculate_backoff(0).as_millis()\n        );\n    }\n\n    #[test]\n    fn test_circuit_breaker_config_default() {\n        let config = CircuitBreakerConfig::default();\n        assert_eq!(config.failure_threshold, 5);\n        assert_eq!(config.timeout_ms, 60000);\n    }\n\n    #[test]\n    fn test_retry_config_with_backoff_multiplier() {\n        let config = RetryConfig::new()\n            .with_initial_backoff_ms(100)\n            .with_backoff_multiplier(3.0)\n            .with_jitter(false);\n        let backoff0 = config.calculate_backoff(0);\n        let backoff1 = config.calculate_backoff(1);\n        assert!(backoff1.as_millis() \u003e backoff0.as_millis());\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":10}},{"line":35,"address":[],"length":0,"stats":{"Line":3}},{"line":36,"address":[],"length":0,"stats":{"Line":3}},{"line":37,"address":[],"length":0,"stats":{"Line":3}},{"line":41,"address":[],"length":0,"stats":{"Line":6}},{"line":42,"address":[],"length":0,"stats":{"Line":6}},{"line":43,"address":[],"length":0,"stats":{"Line":6}},{"line":47,"address":[],"length":0,"stats":{"Line":1}},{"line":48,"address":[],"length":0,"stats":{"Line":1}},{"line":49,"address":[],"length":0,"stats":{"Line":1}},{"line":53,"address":[],"length":0,"stats":{"Line":1}},{"line":54,"address":[],"length":0,"stats":{"Line":1}},{"line":55,"address":[],"length":0,"stats":{"Line":1}},{"line":59,"address":[],"length":0,"stats":{"Line":3}},{"line":60,"address":[],"length":0,"stats":{"Line":3}},{"line":61,"address":[],"length":0,"stats":{"Line":3}},{"line":65,"address":[],"length":0,"stats":{"Line":12}},{"line":66,"address":[],"length":0,"stats":{"Line":12}},{"line":67,"address":[],"length":0,"stats":{"Li 8,"address":[],"length":0,"stats":{"Line":60}},{"line":190,"address":[],"length":0,"stats":{"Line":20}},{"line":191,"address":[],"length":0,"stats":{"Line":12}},{"line":194,"address":[],"length":0,"stats":{"Line":16}},{"line":195,"address":[],"length":0,"stats":{"Line":16}},{"line":196,"address":[],"length":0,"stats":{"Line":1}},{"line":197,"address":[],"length":0,"stats":{"Line":1}},{"line":198,"address":[],"length":0,"stats":{"Line":1}},{"line":200,"address":[],"length":0,"stats":{"Line":7}},{"line":201,"address":[],"length":0,"stats":{"Line":7}},{"line":205,"address":[],"length":0,"stats":{"Line":0}},{"line":206,"address":[],"length":0,"stats":{"Line":0}},{"line":210,"address":[],"length":0,"stats":{"Line":0}},{"line":215,"address":[],"length":0,"stats":{"Line":1}},{"line":216,"address":[],"length":0,"stats":{"Line":3}},{"line":217,"address":[],"length":0,"stats":{"Line":1}},{"line":218,"address":[],"length":0,"stats":{"Line":2}},{"line":219,"address":[],"length":0,"stats":{"Line":1}},{"line":220,"address":[],"length":0,"stats":{"Line":1}},{"line":225,"address":[],"length":0,"stats":{"Line":1}},{"line":227,"address":[],"length":0,"stats":{"Line":3}},{"line":228,"address":[],"length":0,"stats":{"Line":3}},{"line":229,"address":[],"length":0,"stats":{"Line":3}},{"line":230,"address":[],"length":0,"stats":{"Line":1}}],"covered":75,"coverable":78},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","summarization.rs"],"content":"//! Memory summarization strategies for compressing and distilling memories.\n//!\n//! This module provides pluggable summarization strategies that determine how\n//! memories are compressed or distilled when promoted from Synapse to Cortex.\n\nuse crate::models::MemoryEntry;\n\n/// Trait for memory summarization strategies.\n///\n/// Implementations define different approaches to summarizing or compressing\n/// memories while preserving their essential meaning.\npub trait Summarizer: Send + Sync {\n    /// Summarize a memory entry.\n    ///\n    /// Returns a new MemoryEntry with summarized content.\n    /// The summarized entry should preserve the original ID, timestamp, and metadata.\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry;\n\n    /// Get the name of this summarizer.\n    fn name(\u0026self) -\u003e \u0026str;\n}\n\n/// Identity summarizer that returns the memory unchanged.\n///\n/// Useful as a no-op summarizer or for testing.\npub struct IdentitySummarizer;\n\nimpl Summarizer for IdentitySummarizer {\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry {\n        entry.clone()\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"Identity\"\n    }\n}\n\n/// Length-based summarizer that truncates memories to a maximum length.\n///\n/// Preserves the beginning of the memory up to the specified length.\npub struct LengthBasedSummarizer {\n    /// Maximum length of summarized content in characters\n    pub max_length: usize,\n}\n\nimpl LengthBasedSummarizer {\n    /// Create a new length-based summarizer.\n    ///\n    /// # Arguments\n    /// * `max_length` - Maximum length of summarized content in characters\n    pub fn new(max_length: usize) -\u003e Self {\n        Self { max_length }\n    }\n}\n\nimpl Summarizer for LengthBasedSummarizer {\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry {\n        let mut summarized = entry.clone();\n\n        if entry.content.len() \u003e self.max_length {\n            // Truncate to max_length, ensuring we don't cut in the middle of a character\n            summarized.content = entry\n                .content\n                .chars()\n                .take(self.max_length)\n                .collect::\u003cString\u003e();\n\n            // Add ellipsis to indicate truncation\n            if summarized.content.len() \u003e 3 {\n                summarized.content.truncate(summarized.content.len() - 3);\n                summarized.content.push_str(\"...\");\n            }\n        }\n\n        summarized\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"LengthBased\"\n    }\n}\n\n/// Keyword-based summarizer that extracts key terms and creates a summary.\n///\n/// Identifies important words and creates a condensed summary.\npub struct KeywordSummarizer {\n    /// Maximum number of keywords to extract\n    pub max_keywords: usize,\n}\n\nimpl KeywordSummarizer {\n    /// Create a new keyword-based summarizer.\n    ///\n    /// # Arguments\n    /// * `max_keywords` - Maximum number of keywords to extract\n    pub fn new(max_keywords: usize) -\u003e Self {\n        Self { max_keywords }\n    }\n\n    /// Extract keywords from text.\n    ///\n    /// Simple heuristic: words longer than 4 characters that aren't common stop words.\n    fn extract_keywords(\u0026self, text: \u0026str) -\u003e Vec\u003cString\u003e {\n        let stop_words = [\n            \"the\", \"a\", \"an\", \"and\", \"or\", \"but\", \"in\", \"on\", \"at\", \"to\", \"for\", \"of\", \"with\",\n            \"by\", \"from\", \"is\", \"are\", \"was\", \"were\", \"be\", \"been\", \"being\", \"have\", \"has\", \"had\",\n            \"do\", \"does\", \"did\", \"will\", \"would\", \"could\", \"should\", \"may\", \"might\", \"must\", \"can\",\n            \"this\", \"that\", \"these\", \"those\", \"i\", \"you\", \"he\", \"she\", \"it\", \"we\", \"they\", \"what\",\n            \"which\", \"who\", \"when\", \"where\", \"why\", \"how\",\n        ];\n\n        let mut keywords: Vec\u003cString\u003e = text\n            .to_lowercase()\n            .split(|c: char| !c.is_alphanumeric())\n            .filter(|word| word.len() \u003e 4 \u0026\u0026 !stop_words.contains(word))\n            .map(|s| s.to_string())\n            .collect();\n\n        // Remove duplicates while preserving order\n        let mut seen = std::collections::HashSet::new();\n        keywords.retain(|k| seen.insert(k.clone()));\n\n        keywords.truncate(self.max_keywords);\n        keywords\n    }\n}\n\nimpl Summarizer for KeywordSummarizer {\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry {\n        let mut summarized = entry.clone();\n\n        let keywords = self.extract_keywords(\u0026entry.content);\n\n        if !keywords.is_empty() {\n            // Create a summary from keywords\n            let summary = format!(\"Keywords: {}\", keywords.join(\", \"));\n            summarized.content = summary;\n        }\n\n        summarized\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"KeywordBased\"\n    }\n}\n\n/// Sentence-based summarizer that keeps the first N sentences.\n///\n/// Useful for preserving the main idea while reducing length.\npub struct SentenceBasedSummarizer {\n    /// Maximum number of sentences to keep\n    pub max_sentences: usize,\n}\n\nimpl SentenceBasedSummarizer {\n    /// Create a new sentence-based summarizer.\n    ///\n    /// # Arguments\n    /// * `max_sentences` - Maximum number of sentences to keep\n    pub fn new(max_sentences: usize) -\u003e Self {\n        Self { max_sentences }\n    }\n}\n\nimpl Summarizer for SentenceBasedSummarizer {\n    fn summarize(\u0026self, entry: \u0026MemoryEntry) -\u003e MemoryEntry {\n        let mut summarized = entry.clone();\n\n        // Split by sentence delimiters\n        let sentences: Vec\u003c\u0026str\u003e = entry\n            .content\n            .split(['.', '!', '?'])\n            .filter(|s| !s.trim().is_empty())\n            .take(self.max_sentences)\n            .collect();\n\n        if !sentences.is_empty() \u0026\u0026 sentences.len() \u003c entry.content.split('.').count() {\n            // Reconstruct with periods\n            summarized.content = sentences.join(\". \") + \".\";\n        }\n\n        summarized\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"SentenceBased\"\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::models::{MemoryId, MemoryTier};\n    use chrono::Utc;\n    use std::collections::HashMap;\n\n    fn create_test_entry(content: \u0026str) -\u003e MemoryEntry {\n        MemoryEntry {\n            id: MemoryId::new(),\n            content: content.to_string(),\n            metadata: HashMap::new(),\n            timestamp: Utc::now(),\n            salience: 0.5,\n            tier: MemoryTier::Synapse,\n            embedding: None,\n            source_session_id: None,\n            scope: crate::models::MemoryScope::Global,\n        }\n    }\n\n    #[test]\n    fn test_identity_summarizer() {\n        let summarizer = IdentitySummarizer;\n        let entry = create_test_entry(\"This is a test memory\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert_eq!(summarized.content, entry.content);\n        assert_eq!(summarized.id, entry.id);\n    }\n\n    #[test]\n    fn test_length_based_summarizer_short_content() {\n        let summarizer = LengthBasedSummarizer::new(100);\n        let entry = create_test_entry(\"Short\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert_eq!(summarized.content, \"Short\");\n    }\n\n    #[test]\n    fn test_length_based_summarizer_long_content() {\n        let summarizer = LengthBasedSummarizer::new(20);\n        let entry = create_test_entry(\"This is a very long memory that should be truncated\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert!(summarized.content.len() \u003c= 23); // 20 + \"...\"\n        assert!(summarized.content.ends_with(\"...\"));\n    }\n\n    #[test]\n    fn test_keyword_summarizer() {\n        let summarizer = KeywordSummarizer::new(5);\n        let entry = create_test_entry(\"The important project deadline is tomorrow morning\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert!(summarized.content.contains(\"Keywords:\"));\n        assert!(summarized.content.contains(\"important\") || summarized.content.contains(\"project\"));\n    }\n\n    #[test]\n    fn test_keyword_summarizer_empty() {\n        let summarizer = KeywordSummarizer::new(5);\n        let entry = create_test_entry(\"a an the\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        // Should keep original if no keywords found\n        assert!(!summarized.content.is_empty());\n    }\n\n    #[test]\n    fn test_sentence_based_summarizer_single_sentence() {\n        let summarizer = SentenceBasedSummarizer::new(1);\n        let entry = create_test_entry(\"First sentence. Second sentence. Third sentence.\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert!(summarized.content.contains(\"First sentence\"));\n        assert!(!summarized.content.contains(\"Second\"));\n    }\n\n    #[test]\n    fn test_sentence_based_summarizer_multiple_sentences() {\n        let summarizer = SentenceBasedSummarizer::new(2);\n        let entry = create_test_entry(\"First sentence. Second sentence. Third sentence.\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert!(summarized.content.contains(\"First\"));\n        assert!(summarized.content.contains(\"Second\"));\n        assert!(!summarized.content.contains(\"Third\"));\n    }\n\n    #[test]\n    fn test_summarizer_name() {\n        let identity = IdentitySummarizer;\n        assert_eq!(identity.name(), \"Identity\");\n\n        let length = LengthBasedSummarizer::new(100);\n        assert_eq!(length.name(), \"LengthBased\");\n\n        let keyword = KeywordSummarizer::new(5);\n        assert_eq!(keyword.name(), \"KeywordBased\");\n\n        let sentence = SentenceBasedSummarizer::new(2);\n        assert_eq!(sentence.name(), \"SentenceBased\");\n    }\n\n    #[test]\n    fn test_summarizer_preserves_metadata() {\n        let summarizer = LengthBasedSummarizer::new(10);\n        let mut entry = create_test_entry(\"This is a very long memory\");\n        entry\n            .metadata\n            .insert(\"key\".to_string(), \"value\".to_string());\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert_eq!(summarized.metadata.get(\"key\"), Some(\u0026\"value\".to_string()));\n    }\n\n    #[test]\n    fn test_summarizer_preserves_id() {\n        let summarizer = KeywordSummarizer::new(5);\n        let entry = create_test_entry(\"Test memory content\");\n\n        let summarized = summarizer.summarize(\u0026entry);\n        assert_eq!(summarized.id, entry.id);\n    }\n}\n","traces":[{"line":29,"address":[],"length":0,"stats":{"Line":3}},{"line":30,"address":[],"length":0,"stats":{"Line":6}},{"line":33,"address":[],"length":0,"stats":{"Line":1}},{"line":34,"address":[],"length":0,"stats":{"Line":1}},{"line":51,"address":[],"length":0,"stats":{"Line":8}},{"line":57,"address":[],"length":0,"stats":{"Line":9}},{"line":58,"address":[],"length":0,"stats":{"Line":27}},{"line":60,"address":[],"length":0,"stats":{"Line":18}},{"line":62,"address":[],"length":0,"stats":{"Line":12}},{"line":63,"address":[],"length":0,"stats":{"Line":6}},{"line":64,"address":[],"length":0,"stats":{"Line":6}},{"line":65,"address":[],"length":0,"stats":{"Line":12}},{"line":66,"address":[],"length":0,"stats":{"Line":6}},{"line":69,"address":[],"length":0,"stats":{"Line":12}},{"line":70,"address":[],"length":0,"stats":{"Line":24}},{"line":71,"address":[],"length":0,"stats":{"Line":12}},{"line":75,"address":[],"length":0,"stats":{"Line":9}},{"line":78,"address":[],"length":0,"stats":{"Line":1}},{"line":79,"address":[],"length":0,"stats":{"Line":1}},{"line":96,"address":[],"length":0,"stats":{"Line":6}},{"line":103,"address":[],"length":0,"stats":{"Line":5}},{"line":104,"address":[],"length":0,"stats":{"Line":10}},{"line":105,"address":[],"length":0,"stats":{"Line":65}},{"line":106,"address":[],"length":0,"stats":{"Line":65}},{"line":107,"address":[],"length":0,"stats":{"Line":60}},{"line":108,"address":[],"length":0,"stats":{"Line":65}},{"line":109,"address":[],"length":0,"sta ore;\nuse async_trait::async_trait;\nuse parking_lot::RwLock;\nuse std::collections::HashMap;\nuse std::sync::Arc;\n\n/// In-memory short-term memory storage (Synapse tier).\n///\n/// Stores memories in a thread-safe HashMap. Memories are volatile and cleared\n/// when the session ends. Supports semantic search using embeddings.\n#[derive(Clone)]\npub struct SynapseMemory {\n    memories: Arc\u003cRwLock\u003cHashMap\u003cMemoryId, MemoryEntry\u003e\u003e\u003e,\n    embedder: Arc\u003cdyn Embedder\u003e,\n}\n\nimpl SynapseMemory {\n    /// Create a new empty Synapse memory store.\n    pub fn new(embedder: Arc\u003cdyn Embedder\u003e) -\u003e Self {\n        Self {\n            memories: Arc::new(RwLock::new(HashMap::new())),\n            embedder,\n        }\n    }\n\n    /// Get the number of memories currently stored.\n    pub fn len(\u0026self) -\u003e usize {\n        self.memories.read().len()\n    }\n\n    /// Check if the store is empty.\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.memories.read().is_empty()\n    }\n\n    /// Clear all memories (typically called at session end).\n    pub async fn clear(\u0026self) -\u003e Result\u003c()\u003e {\n        self.memories.write().clear();\n        Ok(())\n    }\n\n    /// List all memories (for debugging/inspection).\n    pub async fn list(\u0026self) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        let memories = self.memories.read();\n        Ok(memories.values().cloned().collect())\n    }\n\n    /// Calculate cosine similarity between two vectors.\n    fn cosine_similarity(a: \u0026[f32], b: \u0026[f32]) -\u003e f32 {\n        if a.len() != b.len() || a.is_empty() {\n            return 0.0;\n        }\n\n        let dot_product: f32 = a.iter().zip(b.iter()).map(|(x, y)| x * y).sum();\n        let norm_a: f32 = a.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n        let norm_b: f32 = b.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n\n        if norm_a == 0.0 || norm_b == 0.0 {\n            return 0.0;\n        }\n\n        dot_product / (norm_a * norm_b)\n    }\n}\n\nimpl Default for SynapseMemory {\n    fn default() -\u003e Self {\n        Self::new(Arc::new(crate::embedder::MockEmbedder::new()))\n    }\n}\n\n#[async_trait]\nimpl MemoryStore for SynapseMemory {\n    async fn store(\u0026self, entry: MemoryEntry) -\u003e Result\u003c()\u003e {\n        self.memories.write().insert(entry.id, entry);\n        Ok(())\n    }\n\n    async fn retrieve(\u0026self, query: \u0026str, limit: usize) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        // Generate embedding for query using the configured embedder\n        let query_embedding: Vec\u003cf32\u003e = self.embedder.embed(query).await?;\n\n        let memories = self.memories.read();\n\n        // If no memories, return empty\n        if memories.is_empty() {\n            return Ok(Vec::new());\n        }\n\n        // Score all memories by similarity\n        let mut scored: Vec\u003c_\u003e = memories\n            .values()\n            .filter_map(|entry| {\n                entry.embedding.as_ref().map(|embedding| {\n                    let similarity = Self::cosine_similarity(\u0026query_embedding, embedding);\n                    // Combine similarity with salience for ranking\n                    let score = (similarity * 0.7) + (entry.salience * 0.3);\n                    (entry.clone(), score)\n                })\n            })\n            .collect();\n\n        // Sort by score (descending)\n        scored.sort_by(|a, b| b.1.partial_cmp(\u0026a.1).unwrap_or(std::cmp::Ordering::Equal));\n\n        // Return top N\n        Ok(scored\n            .into_iter()\n            .take(limit)\n            .map(|(entry, _)| entry)\n            .collect())\n    }\n\n    async fn retrieve_by_scope(\n        \u0026self,\n        query: \u0026str,\n        scope: \u0026MemoryScope,\n        limit: usize,\n    ) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        // Generate embedding for query using the configured embedder\n        let query_embedding: Vec\u003cf32\u003e = self.embedder.embed(query).await?;\n\n        let memories = self.memories.read();\n\n        // If no memories, return empty\n        if memories.is_empty() {\n            return Ok(Vec::new());\n        }\n\n        // Score all memories by similarity, filtering by scope\n        let mut scored: Vec\u003c_\u003e = memories\n            .values()\n            .filter(|entry| entry.scope.matches(scope))\n            .filter_map(|entry| {\n                entry.embedding.as_ref().map(|embedding| {\n                    let similarity = Self::cosine_similarity(\u0026query_embedding, embedding);\n                    // Combine similarity with salience for ranking\n                    let score = (similarity * 0.7) + (entry.salience * 0.3);\n                    (entry.clone(), score)\n                })\n            })\n            .collect();\n\n        // Sort by score (descending)\n        scored.sort_by(|a, b| b.1.partial_cmp(\u0026a.1).unwrap_or(std::cmp::Ordering::Equal));\n\n        // Return top N\n        Ok(scored\n            .into_iter()\n            .take(limit)\n            .map(|(entry, _)| entry)\n            .collect())\n    }\n\n    async fn delete(\u0026self, id: \u0026MemoryId) -\u003e Result\u003c()\u003e {\n        self.memories.write().remove(id);\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::embedder::MockEmbedder;\n\n    fn create_synapse() -\u003e SynapseMemory {\n        SynapseMemory::new(Arc::new(MockEmbedder::new()))\n    }\n\n    /// Helper function to generate embeddings from text using MockEmbedder\n    async fn generate_embedding(text: \u0026str) -\u003e Vec\u003cf32\u003e {\n        let embedder = MockEmbedder::new();\n        embedder\n            .embed(text)\n            .await\n            .unwrap_or_else(|_| vec![0.0; 384])\n    }\n\n    #[tokio::test]\n    async fn test_synapse_new() {\n        let synapse = create_synapse();\n        assert!(synapse.is_empty());\n        assert_eq!(synapse.len(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_store_and_retrieve() {\n        let synapse = create_synapse();\n        let id = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry = MemoryEntry::builder(id, \"Test memory\".to_string())\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry.clone()).await.unwrap();\n        assert_eq!(synapse.len(), 1);\n\n        let results = synapse.retrieve(\"test\", 10).await.unwrap();\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_synapse_delete() {\n        let synapse = create_synapse();\n        let id = MemoryId::new();\n        let entry = MemoryEntry::new(id, \"Test memory\".to_string());\n\n        synapse.store(entry).await.unwrap();\n        assert_eq!(synapse.len(), 1);\n\n        synapse.delete(\u0026id).await.unwrap();\n        assert_eq!(synapse.len(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_clear() {\n        let synapse = create_synapse();\n\n        for i in 0..5 {\n            let id = MemoryId::new();\n            let entry = MemoryEntry::new(id, format!(\"Memory {}\", i));\n            synapse.store(entry).await.unwrap();\n        }\n\n        assert_eq!(synapse.len(), 5);\n        synapse.clear().await.unwrap();\n        assert_eq!(synapse.len(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_list() {\n        let synapse = create_synapse();\n        let id1 = MemoryId::new();\n        let id2 = MemoryId::new();\n\n        let entry1 = MemoryEntry::new(id1, \"Memory 1\".to_string());\n        let entry2 = MemoryEntry::new(id2, \"Memory 2\".to_string());\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        let list = synapse.list().await.unwrap();\n        assert_eq!(list.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_cosine_similarity() {\n        let a = vec![1.0, 0.0, 0.0];\n        let b = vec![1.0, 0.0, 0.0];\n        let similarity = SynapseMemory::cosine_similarity(\u0026a, \u0026b);\n        assert!((similarity - 1.0).abs() \u003c 0.001);\n\n        let c = vec![0.0, 1.0, 0.0];\n        let similarity2 = SynapseMemory::cosine_similarity(\u0026a, \u0026c);\n        assert!(similarity2.abs() \u003c 0.001);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_empty() {\n        let synapse = create_synapse();\n        let results = synapse.retrieve(\"test\", 10).await.unwrap();\n        assert!(results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_with_salience() {\n        let synapse = create_synapse();\n\n        let id1 = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry1 = MemoryEntry::builder(id1, \"Important memory\".to_string())\n            .salience(0.9)\n            .embedding(embedding.clone())\n            .build();\n\n        let id2 = MemoryId::new();\n        let entry2 = MemoryEntry::builder(id2, \"Important memory\".to_string())\n            .salience(0.1)\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        let results = synapse.retrieve(\"important\", 10).await.unwrap();\n        assert_eq!(results.len(), 2);\n        // Higher salience should rank first\n        assert!(results[0].salience \u003e= results[1].salience);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_by_scope_global() {\n        let synapse = create_synapse();\n\n        let id1 = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry1 = MemoryEntry::builder(id1, \"Global memory\".to_string())\n            .scope(MemoryScope::Global)\n            .embedding(embedding.clone())\n            .build();\n\n        let id2 = MemoryId::new();\n        let entry2 = MemoryEntry::builder(id2, \"User memory\".to_string())\n            .scope(MemoryScope::User(\"user1\".to_string()))\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        // Global scope should match all\n        let results = synapse\n            .retrieve_by_scope(\"memory\", \u0026MemoryScope::Global, 10)\n            .await\n            .unwrap();\n        assert_eq!(results.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_by_scope_user() {\n        let synapse = create_synapse();\n\n        let id1 = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry1 = MemoryEntry::builder(id1, \"User1 memory\".to_string())\n            .scope(MemoryScope::User(\"user1\".to_string()))\n            .embedding(embedding.clone())\n            .build();\n\n        let id2 = MemoryId::new();\n        let entry2 = MemoryEntry::builder(id2, \"User2 memory\".to_string())\n            .scope(MemoryScope::User(\"user2\".to_string()))\n            .embedding(embedding)\n            .build();\n\n        synapse.store(entry1).await.unwrap();\n        synapse.store(entry2).await.unwrap();\n\n        // User1 scope should only match user1 memories\n        let results = synapse\n            .retrieve_by_scope(\"memory\", \u0026MemoryScope::User(\"user1\".to_string()), 10)\n            .await\n            .unwrap();\n        assert_eq!(results.len(), 1);\n        assert_eq!(results[0].content, \"User1 memory\");\n    }\n\n    #[tokio::test]\n    async fn test_synapse_retrieve_by_scope_agent() {\n        let synapse = create_synapse();\n\n        let id1 = MemoryId::new();\n        let embedding = vec![0.1; 384];\n        let entry1 = MemoryEntry::builder(id1, \"Agent1 memory\".to_string())\n            .scope(MemoryScope::Agent(\"agent1\".to_string()))\n            .embedding(embedding.clone()
