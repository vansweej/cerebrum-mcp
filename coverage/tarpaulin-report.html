aits::Embedder;\nuse async_trait::async_trait;\nuse once_cell::sync::Lazy;\nuse serde::{Deserialize, Serialize};\nuse std::sync::Arc;\nuse std::time::Instant;\n\n/// Request body for Ollama embedding API\n#[derive(Debug, Clone, Serialize, Deserialize)]\nstruct OllamaEmbedRequest {\n    model: String,\n    prompt: String,\n}\n\n/// Response body from Ollama embedding API\n#[derive(Debug, Clone, Serialize, Deserialize)]\nstruct OllamaEmbedResponse {\n    embedding: Vec\u003cf32\u003e,\n}\n\n/// Global HTTP client for Ollama requests\nstatic HTTP_CLIENT: Lazy\u003creqwest::Client\u003e = Lazy::new(|| {\n    reqwest::Client::builder()\n        .timeout(std::time::Duration::from_secs(5))\n        .build()\n        .unwrap_or_else(|_| reqwest::Client::new())\n});\n\n/// Ollama-based embedder using nomic-embed-text model (384-dimensional).\n///\n/// Provides real semantic embeddings for accurate similarity search.\n/// Uses the nomic-embed-text model which is optimized for performance and quality.\n/// Requires Ollama to be running at http://localhost:11434\n///\n/// Includes observability metrics and resilience patterns:\n/// - Tracks latency, success rate, and error counts\n/// - Circuit breaker for handling Ollama endpoint failures\npub struct FastEmbedEmbedder {\n    /// Ollama endpoint URL\n    endpoint: String,\n    /// Model name (default: nomic-embed-text)\n    model: String,\n    /// Metrics for tracking operation performance\n    metrics: Arc\u003cOperationMetrics\u003e,\n    /// Circuit breaker for handling transient failures\n    circuit_breaker: Arc\u003cCircuitBreaker\u003e,\n}\n\nimpl FastEmbedEmbedder {\n    /// Create a new FastEmbed embedder with Ollama backend.\n    ///\n    /// # Arguments\n    /// * `endpoint` - Ollama API endpoint (default: http://localhost:11434)\n    /// * `model` - Model name (default: nomic-embed-text)\n    pub fn new() -\u003e Self {\n        Self {\n            endpoint: \"http://localhost:11434\".to_string(),\n            model: \"nomic-embed-text\".to_string(),\n            metrics: Arc::new(OperationMetrics::new()),\n            circuit_breaker: Arc::new(CircuitBreaker::new(CircuitBreakerConfig::new())),\n        }\n    }\n\n    /// Create a new FastEmbed embedder with custom endpoint.\n    pub fn with_endpoint(endpoint: String) -\u003e Self {\n        Self {\n            endpoint,\n            model: \"nomic-embed-text\".to_string(),\n            metrics: Arc::new(OperationMetrics::new()),\n            circuit_breaker: Arc::new(CircuitBreaker::new(CircuitBreakerConfig::new())),\n        }\n    }\n\n    /// Create a new FastEmbed embedder with custom endpoint and model.\n    pub fn with_config(endpoint: String, model: String) -\u003e Self {\n        Self {\n            endpoint,\n            model,\n            metrics: Arc::new(OperationMetrics::new()),\n            circuit_breaker: Arc::new(CircuitBreaker::new(CircuitBreakerConfig::new())),\n        }\n    }\n\n    /// Get the embedding dimension for this model.\n    pub fn embedding_dim(\u0026self) -\u003e usize {\n        384 // nomic-embed-text produces 384-dimensional embeddings\n    }\n\n    /// Get the metrics for this embedder.\n    pub fn metrics(\u0026self) -\u003e Arc\u003cOperationMetrics\u003e {\n        self.metrics.clone()\n    }\n\n    /// Get the circuit breaker for this embedder.\n    pub fn circuit_breaker(\u0026self) -\u003e Arc\u003cCircuitBreaker\u003e {\n        self.circuit_breaker.clone()\n    }\n\n    /// Check if Ollama is available at the configured endpoint.\n    pub async fn is_available(\u0026self) -\u003e bool {\n        let url = format!(\"{}/api/tags\", self.endpoint);\n        match tokio::time::timeout(\n            std::time::Duration::from_secs(2),\n            HTTP_CLIENT.get(\u0026url).send(),\n        )\n        .await\n        {\n            Ok(Ok(response)) =\u003e response.status().is_success(),\n            _ =\u003e false,\n        }\n    }\n}\n\nimpl Default for FastEmbedEmbedder {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[async_trait]\nimpl Embedder for FastEmbedEmbedder {\n    async fn embed(\u0026self, text: \u0026str) -\u003e Result\u003cVec\u003cf32\u003e\u003e {\n        let start_time = Instant::now();\n\n        // Check circuit breaker before making request\n        self.circuit_breaker.allow_request()?;\n\n        let url = format!(\"{}/api/embed\", self.endpoint);\n\n        let request = OllamaEmbedRequest {\n            model: self.model.clone(),\n            prompt: text.to_string(),\n        };\n\n        let result = HTTP_CLIENT\n            .post(\u0026url)\n            .json(\u0026request)\n            .send()\n            .await\n            .map_err(|e| {\n                CerebrumError::Embedding(format!(\n                    \"Failed to connect to Ollama at {}: {}\",\n                    self.endpoint, e\n                ))\n            })\n            .and_then(|response| {\n                if !response.status().is_success() {\n                    return Err(CerebrumError::Embedding(format!(\n                        \"Ollama API error: {}\",\n                        response.status()\n                    )));\n                }\n                Ok(response)\n            });\n\n        let response = match result {\n            Ok(resp) =\u003e resp,\n            Err(e) =\u003e {\n                // Record failure and update circuit breaker\n                let duration_ms = start_time.elapsed().as_millis() as u64;\n                self.metrics.record_failure(duration_ms);\n                self.circuit_breaker.record_failure();\n                return Err(e);\n            }\n        };\n\n        let embed_response: OllamaEmbedResponse = response.json().await.map_err(|e| {\n            let duration_ms = start_time.elapsed().as_millis() as u64;\n            self.metrics.record_failure(duration_ms);\n            self.circuit_breaker.record_failure();\n            CerebrumError::Embedding(format!(\"Failed to parse Ollama response: {}\", e))\n        })?;\n\n        // Verify dimensions\n        if embed_response.embedding.len() != 384 {\n            let duration_ms = start_time.elapsed().as_millis() as u64;\n            self.metrics.record_failure(duration_ms);\n            self.circuit_breaker.record_failure();\n            return Err(CerebrumError::Validation(format!(\n                \"Invalid embedding dimension from Ollama: expected 384, got {}\",\n                embed_response.embedding.len()\n            )));\n        }\n\n        // Record success\n        let duration_ms = start_time.elapsed().as_millis() as u64;\n        self.metrics.record_success(duration_ms);\n        self.circuit_breaker.record_success();\n\n        Ok(embed_response.embedding)\n    }\n\n    fn dimension(\u0026self) -\u003e usize {\n        384\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::sync::Arc;\n\n    #[tokio::test]\n    async fn test_fastembed_embedder_new() {\n        let embedder = FastEmbedEmbedder::new();\n        assert_eq!(embedder.endpoint, \"http://localhost:11434\");\n        assert_eq!(embedder.model, \"nomic-embed-text\");\n    }\n\n    #[tokio::test]\n    async fn test_fastembed_embedder_default() {\n        let embedder = FastEmbedEmbedder::default();\n        assert_eq!(embedder.endpoint, \"http://localhost:11434\");\n        assert_eq!(embedder.model, \"nomic-embed-text\");\n    }\n\n    #[tokio::test]\n    async fn test_fastembed_embedder_with_endpoint() {\n        let embedder = FastEmbedEmbedder::with_endpoint(\"http://custom:11434\".to_string());\n        assert_eq!(embedder.endpoint, \"http://custom:11434\");\n        assert_eq!(embedder.model, \"nomic-embed-text\");\n    }\n\n    #[tokio::test]\n    async fn test_fastembed_embedder_with_config() {\n        let embedder = FastEmbedEmbedder::with_config(\n            \"http://custom:11434\".to_string(),\n            \"custom-model\".to_string(),\n        );\n        assert_eq!(embedder.endpoint, \"http://custom:11434\");\n        assert_eq!(embedder.model, \"custom-model\");\n    }\n\n    #[tokio::test]\n    async fn test_fastembed_embedder_embedding_dim() {\n        let embedder = FastEmbedEmbedder::new();\n        assert_eq!(embedder.embedding_dim(), 384);\n    }\n\n    #[tokio::test]\n    async fn test_fastembed_embedder_embed_requires_ollama() {\n        let embedder = FastEmbedEmbedder::new();\n        let result = embedder.embed(\"test text\").await;\n\n        // This test will fail if Ollama is not running\n        // In CI/CD, this should be skipped or Ollama should be available\n        match result {\n            Ok(embedding) =\u003e {\n                // Ollama is available\n                assert_eq!(embedding.len(), 384);\n            }\n            Err(CerebrumError::Embedding(msg)) =\u003e {\n                // Ollama is not available - this is expected in some environments\n                assert!(msg.contains(\"Failed to connect\") || msg.contains(\"Ollama\"));\n            }\n            Err(e) =\u003e {\n                panic!(\"Unexpected error: {}\", e);\n            }\n        }\n    }\n\n    #[tokio::test]\n    #[ignore]\n    async fn test_fastembed_embedder_consistency_requires_ollama() {\n        let embedder = FastEmbedEmbedder::new();\n\n        // Skip if Ollama is not available\n        if !embedder.is_available().await {\n            return;\n        }\n\n        let embedding1 = embedder.embed(\"hello world\").await.unwrap();\n        let embedding2 = embedder.embed(\"hello world\").await.unwrap();\n\n        // Same text should produce same embedding\n        assert_eq!(embedding1, embedding2);\n    }\n\n    #[tokio::test]\n    #[ignore]\n    async fn test_fastembed_embedder_different_texts_requires_ollama() {\n        let embedder = FastEmbedEmbedder::new();\n\n        // Skip if Ollama is not available\n        if !embedder.is_available().await {\n            return;\n        }\n\n        let embedding1 = embedder.embed(\"hello world\").await.unwrap();\n        let embedding2 = embedder.embed(\"goodbye world\").await.unwrap();\n\n        // Different texts should produce different embeddings\n        assert_ne!(embedding1, embedding2);\n    }\n\n    #[tokio::test]\n    #[ignore]\n    async fn test_fastembed_embedder_empty_text_requires_ollama() {\n        let embedder = FastEmbedEmbedder::new();\n\n        // Skip if Ollama is not available\n        if !embedder.is_available().await {\n            return;\n        }\n\n        let embedding = embedder.embed(\"\").await;\n\n        // Empty text should still produce an embedding\n        assert!(embedding.is_ok());\n        let vec = embedding.unwrap();\n        assert_eq!(vec.len(), 384);\n    }\n\n    #[tokio::test]\n    #[ignore]\n    async fn test_fastembed_embedder_concurrent_access_requires_ollama() {\n        let embedder = Arc::new(FastEmbedEmbedder::new());\n\n        // Skip if Ollama is not available\n        if !embedder.is_available().await {\n            return;\n        }\n\n        // Create multiple concurrent embedding tasks\n        let mut handles = vec![];\n        for i in 0..3 {\n            let embedder_clone = Arc::clone(\u0026embedder);\n            let handle = tokio::spawn(async move {\n                let text = format!(\"text {}\", i);\n                embedder_clone.embed(\u0026text).await\n            });\n            handles.push(handle);\n        }\n\n        // Wait for all tasks to complete\n        for handle in handles {\n            let result = handle.await;\n            assert!(result.is_ok());\n            let embedding_result = result.unwrap();\n            assert!(embedding_result.is_ok());\n            let vec = embedding_result.unwrap();\n            assert_eq!(vec.len(), 384);\n        }\n    }\n\n    #[tokio::test]\n    #[ignore]\n    async fn test_fastembed_embedder_normalized_requires_ollama() {\n        let embedder = FastEmbedEmbedder::new();\n\n        // Skip if Ollama n\n        // Record a success\n        cb.record_success();\n\n        // Circuit breaker should still be Closed\n        use crate::resilience::CircuitState;\n        assert_eq!(cb.state(), CircuitState::Closed);\n    }\n\n    #[tokio::test]\n    async fn test_fastembed_embedder_circuit_breaker_opens_on_failures() {\n        let embedder = FastEmbedEmbedder::new();\n        let cb = embedder.circuit_breaker();\n\n        // Record multiple failures to trigger Open state\n        for _ in 0..5 {\n            cb.record_failure();\n        }\n\n        // Circuit breaker should be Open\n        use crate::resilience::CircuitState;\n        assert_eq!(cb.state(), CircuitState::Open);\n\n        // Circuit breaker should deny requests when Open\n        assert!(cb.allow_request().is_err());\n    }\n\n    #[tokio::test]\n    async fn test_fastembed_embedder_metrics_track_operations() {\n        let embedder = FastEmbedEmbedder::new();\n        let metrics = embedder.metrics();\n\n        // Record some operations\n        metrics.record_success(100);\n        metrics.record_success(200);\n        metrics.record_failure(150);\n\n        // Verify metrics are updated\n        assert_eq!(metrics.total_operations(), 3);\n        assert_eq!(metrics.successful_operations(), 2);\n        assert_eq!(metrics.failed_operations(), 1);\n        assert_eq!(metrics.total_time_ms(), 450);\n\n        // Verify success rate\n        let success_rate = metrics.success_rate();\n        assert!((success_rate - 66.66).abs() \u003c 0.1); // 2/3 ≈ 66.66%\n\n        // Verify average time\n        let avg_time = metrics.average_time_ms();\n        assert!((avg_time - 150.0).abs() \u003c 0.1); // 450/3 = 150\n    }\n\n    // ============================================================================\n    // Phase 3: Wiremock HTTP Tests\n    // ============================================================================\n\n    #[tokio::test]\n    async fn test_is_available_true_against_mock() {\n        use wiremock::{\n            matchers::{method, path},\n            Mock, MockServer, ResponseTemplate,\n        };\n\n        let mock_server = MockServer::start().await;\n        Mock::given(method(\"GET\"))\n            .and(path(\"/api/tags\"))\n            .respond_with(ResponseTemplate::new(200))\n            .mount(\u0026mock_server)\n            .await;\n\n        let embedder = FastEmbedEmbedder::with_endpoint(mock_server.uri());\n        assert_eq!(embedder.is_available().await, true);\n    }\n\n    #[tokio::test]\n    async fn test_is_available_false_when_unreachable() {\n        let embedder = FastEmbedEmbedder::with_endpoint(\"http://127.0.0.1:1\".to_string());\n        assert_eq!(embedder.is_available().await, false);\n    }\n\n    #[tokio::test]\n    async fn test_embed_success_against_mock() {\n        use wiremock::{\n            matchers::{method, path},\n            Mock, MockServer, ResponseTemplate,\n        };\n\n        let mock_server = MockServer::start().await;\n        Mock::given(method(\"POST\"))\n            .and(path(\"/api/embed\"))\n            .respond_with(\n                ResponseTemplate::new(200)\n                    .set_body_json(serde_json::json!({ \"embedding\": vec![0.1f32; 384] })),\n            )\n            .mount(\u0026mock_server)\n            .await;\n\n        let embedder = FastEmbedEmbedder::with_endpoint(mock_server.uri());\n        let result = embedder.embed(\"hello\").await;\n        assert!(result.is_ok());\n        let embedding = result.unwrap();\n        assert_eq!(embedding.len(), 384);\n        assert_eq!(embedder.metrics().successful_operations(), 1);\n    }\n\n    #[tokio::test]\n    async fn test_embed_http_error_records_failure() {\n        use wiremock::{\n            matchers::{method, path},\n            Mock, MockServer, ResponseTemplate,\n        };\n\n        let mock_server = MockServer::start().await;\n        Mock::given(method(\"POST\"))\n            .and(path(\"/api/embed\"))\n yEntry, MemoryId, MemoryScope};\nuse crate::traits::MemoryStore;\n\n/// Escape single quotes for safe insertion in a LanceDB SQL filter predicate.\n///\n/// Replaces every `'` with `''` and wraps the result in single quotes, making\n/// the string safe to embed in `DELETE WHERE id = …` or `WHERE scope = …` filters.\nfn sql_quote(value: \u0026str) -\u003e String {\n    format!(\"'{}'\", value.replace('\\'', \"''\"))\n}\n\n/// Build the Arrow schema for the `memories` table.\n///\n/// Column order must match the `RecordBatch` built in `store()`.\nfn schema(dim: usize) -\u003e Arc\u003cSchema\u003e {\n    let vector_field = Field::new(\"item\", DataType::Float32, true);\n    let fields = vec![\n        Field::new(\"id\", DataType::Utf8, false),\n        Field::new(\"content\", DataType::Utf8, false),\n        Field::new(\"salience\", DataType::Float32, false),\n        Field::new(\"timestamp\", DataType::Utf8, false),\n        Field::new(\"source_session_id\", DataType::Utf8, true), // nullable\n        Field::new(\"scope\", DataType::Utf8, false),\n        Field::new(\n            \"embedding\",\n            DataType::FixedSizeList(Arc::new(vector_field), dim as i32),\n            false,\n        ),\n        Field::new(\"metadata_json\", DataType::Utf8, false),\n    ];\n    Arc::new(Schema::new(Fields::from(fields)))\n}\n\n/// Schema for storing memories in LanceDB.\n///\n/// This struct represents how memories are stored in the vector database.\n/// It includes all fields from MemoryEntry plus the embedding vector.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct LanceDBMemoryRecord {\n    /// Unique identifier for this memory.\n    pub id: String,\n    /// The text content of the memory.\n    pub content: String,\n    /// Importance score (0.0–1.0) for ranking and promotion decisions.\n    pub salience: f32,\n    /// When this memory was created (ISO 8601 string).\n    pub timestamp: String,\n    /// Session ID where this memory originated (if applicable).\n    pub source_session_id: Option\u003cString\u003e,\n    /// Scope or visibility of this memory (string representation).\n    pub scope: String,\n    /// 384-dimensional embedding vector (BGE-small).\n    pub embedding: Vec\u003cf32\u003e,\n    /// Arbitrary metadata as JSON string.\n    pub metadata_json: String,\n}\n\nimpl LanceDBMemoryRecord {\n    /// Convert from MemoryEntry to LanceDBMemoryRecord.\n    pub fn from_entry(entry: \u0026MemoryEntry) -\u003e Result\u003cSelf\u003e {\n        let embedding = entry.embedding.clone().ok_or_else(|| {\n            CerebrumError::Validation(\"Memory entry missing embedding\".to_string())\n        })?;\n\n        Ok(Self {\n            id: entry.id.to_string(),\n            content: entry.content.clone(),\n            salience: entry.salience,\n            timestamp: entry.timestamp.to_rfc3339(),\n            source_session_id: entry.source_session_id.clone(),\n            scope: entry.scope.as_str(),\n            embedding,\n            metadata_json: serde_json::to_string(\u0026entry.metadata)\n                .map_err(|e| CerebrumError::Serialization(e.to_string()))?,\n        })\n    }\n\n    /// Convert from LanceDBMemoryRecord back to MemoryEntry.\n    pub fn to_entry(\u0026self) -\u003e Result\u003cMemoryEntry\u003e {\n        let id = MemoryId::from_string(\u0026self.id)?;\n        let timestamp = chrono::DateTime::parse_from_rfc3339(\u0026self.timestamp)\n            .map_err(|e| CerebrumError::Validation(format!(\"Invalid timestamp: {}\", e)))?\n            .with_timezone(\u0026chrono::Utc);\n\n        let scope = parse_scope_string(\u0026self.scope)?;\n\n        let metadata = serde_json::from_str(\u0026self.metadata_json)\n            .map_err(|e| CerebrumError::Serialization(e.to_string()))?;\n\n        Ok(MemoryEntry {\n            id,\n            content: self.content.clone(),\n            metadata,\n            timestamp,\n            salience: self.salience,\n            tier: crate::models::MemoryTier::Cortex,\n            embedding: Some(self.embedding.clone()),\n            source_session_id: self.source_session_id.clone(),\n            scope,\n        })\n    }\n}\n\n/// Parse a scope string back into a MemoryScope enum.\nfn parse_scope_string(scope_str: \u0026str) -\u003e Result\u003cMemoryScope\u003e {\n    if scope_str == \"global\" {\n        Ok(MemoryScope::Global)\n    } else if let Some(user_id) = scope_str.strip_prefix(\"user:\") {\n        Ok(MemoryScope::User(user_id.to_string()))\n    } else if let Some(agent_id) = scope_str.strip_prefix(\"agent:\") {\n        Ok(MemoryScope::Agent(agent_id.to_string()))\n    } else if let Some(session_id) = scope_str.strip_prefix(\"session:\") {\n        Ok(MemoryScope::Session(session_id.to_string()))\n    } else {\n        Err(CerebrumError::Validation(format!(\n            \"Invalid scope string: {}\",\n            scope_str\n        )))\n    }\n}\n\n/// Persistent long-term memory storage backed by LanceDB (Cortex tier).\n///\n/// Stores memories in a vector database for efficient semantic search and\n/// persistent storage across sessions. Supports salience-based ranking.\n///\n/// The LanceDB `Connection` is held for the lifetime of the store; the\n/// `Table` handle is re-opened on each operation to avoid stale snapshots.\npub struct LanceDBCortex {\n    /// Held LanceDB connection.\n    conn: Connection,\n    /// Table name for storing memories.\n    table_name: String,\n    /// Embedding dimension (384 for nomic-embed-text).\n    embedding_dim: usize,\n    /// Embedder for generating query embeddings.\n    embedder: Arc\u003cdyn Embedder\u003e,\n}\n\nimpl LanceDBCortex {\n    /// Open (or create) the memories table at `db_path`.\n    ///\n    /// Mirrors athenaeum `Store::open`. Asserts that `embedder.dimension() == dim`\n    /// at construction time to fail-fast before any schema-corrupting insert.\n    ///\n    /// # Arguments\n    /// * `db_path`    – Path to the LanceDB directory (relative or absolute).\n    /// * `table_name` – Name of the table within the database.\n    /// * `dim`        – Expected embedding dimension; must match `embedder.dimension()`.\n    /// * `embedder`   – Embedder used for query embedding during retrieval.\n    pub async fn new(\n        db_path: \u0026Path,\n        table_name: \u0026str,\n        dim: usize,\n        embedder: Arc\u003cdyn Embedder\u003e,\n    ) -\u003e Result\u003cSelf\u003e {\n        // Fail-fast: embedder dimension must match schema dimension.\n        let embedder_dim = embedder.dimension();\n        if embedder_dim != dim {\n            return Err(CerebrumError::Validation(format!(\n                \"Embedder dimension ({}) does not match schema dimension ({})\",\n                embedder_dim, dim\n            )));\n        }\n\n        let path = db_path\n            .to_str()\n            .ok_or_else(|| CerebrumError::Database(\"non-UTF-8 db_path\".to_string()))?;\n\n        let conn = lancedb::connect(path)\n            .execute()\n            .await\n            .map_err(|e| CerebrumError::Database(format!(\"Failed to connect to LanceDB: {}\", e)))?;\n\n        // Create the table if it does not yet exist.\n        let existing = conn\n            .table_names()\n            .execute()\n            .await\n            .map_err(|e| CerebrumError::Database(format!(\"Failed to list tables: {}\", e)))?;\n\n        if !existing.contains(\u0026table_name.to_string()) {\n            conn.create_empty_table(table_name, schema(dim))\n                .execute()\n                .await\n                .map_err(|e| CerebrumError::Database(format!(\"Failed to create table: {}\", e)))?;\n        }\n\n        Ok(Self {\n            conn,\n            table_name: table_name.to_string(),\n            embedding_dim: dim,\n            embedder,\n        })\n    }\n\n    /// Open the table. Re-opened per operation to avoid stale snapshots.\n    ///\n    /// Mirrors athenaeum `Store::table()`.\n    async fn table(\u0026self) -\u003e Result\u003cTable\u003e {\n        self.conn\n            .open_table(\u0026self.table_name)\n            .execute()\n            .await\n            .map_err(|e| CerebrumError::Database(format!(\"Failed to open table: {}\", e)))\n    }\n\n    /// Calculate cosine similarity between two vectors.\n    fn cosine_similarity(a: \u0026[f32], b: \u0026[f32]) -\u003e f32 {\n        if a.len() != b.len() || a.is_empty() {\n            return 0.0;\n        }\n        let dot: f32 = a.iter().zip(b.iter()).map(|(x, y)| x * y).sum();\n        let mag_a: f32 = a.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n        let mag_b: f32 = b.iter().map(|x| x * x).sum::\u003cf32\u003e().sqrt();\n        if mag_a == 0.0 || mag_b == 0.0 {\n            return 0.0;\n        }\n        dot / (mag_a * mag_b)\n    }\n\n    /// Build a single-row RecordBatch from a LanceDBMemoryRecord.\n    fn record_to_batch(record: \u0026LanceDBMemoryRecord, dim: usize) -\u003e Result\u003cRecordBatch\u003e {\n        let schema = schema(dim);\n\n        let mut id_b = StringBuilder::new();\n        let mut content_b = StringBuilder::new();\n        let mut salience_b = arrow_array::builder::Float32Builder::new();\n        let mut timestamp_b = StringBuilder::new();\n        let mut session_b = StringBuilder::new();\n        let mut scope_b = StringBuilder::new();\n        let mut embedding_b = FixedSizeListBuilder::new(Float32Builder::new(), dim as i32);\n        let mut metadata_b = StringBuilder::new();\n\n        id_b.append_value(\u0026record.id);\n        content_b.append_value(\u0026record.content);\n        salience_b.append_value(record.salience);\n        timestamp_b.append_value(\u0026record.timestamp);\n        match \u0026record.source_session_id {\n            Some(s) =\u003e session_b.append_value(s),\n            None =\u003e session_b.append_null(),\n        }\n        scope_b.append_value(\u0026record.scope);\n        for \u0026v in \u0026record.embedding {\n            embedding_b.values().append_value(v);\n        }\n        embedding_b.append(true);\n        metadata_b.append_value(\u0026record.metadata_json);\n\n        let batch = RecordBatch::try_new(\n            schema,\n            vec![\n                Arc::new(id_b.finish()) as ArrayRef,\n                Arc::new(content_b.finish()) as ArrayRef,\n                Arc::new(salience_b.finish()) as ArrayRef,\n                Arc::new(timestamp_b.finish()) as ArrayRef,\n                Arc::new(session_b.finish()) as ArrayRef,\n                Arc::new(scope_b.finish()) as ArrayRef,\n                Arc::new(embedding_b.finish()) as ArrayRef,\n                Arc::new(metadata_b.finish()) as ArrayRef,\n            ],\n        )\n        .map_err(|e| CerebrumError::Database(format!(\"Failed to build RecordBatch: {}\", e)))?;\n\n        Ok(batch)\n    }\n\n    /// Decode a RecordBatch into a Vec of LanceDBMemoryRecord.\n    fn batch_to_records(batch: \u0026RecordBatch) -\u003e Result\u003cVec\u003cLanceDBMemoryRecord\u003e\u003e {\n        let n = batch.num_rows();\n        if n == 0 {\n            return Ok(vec![]);\n        }\n\n        let id_col = batch\n            .column_by_name(\"id\")\n            .ok_or_else(|| CerebrumError::Database(\"missing 'id' column\".into()))?\n            .as_string::\u003ci32\u003e();\n        let content_col = batch\n            .column_by_name(\"content\")\n            .ok_or_else(|| CerebrumError::Database(\"missing 'content' column\".into()))?\n            .as_string::\u003ci32\u003e();\n        let salience_col = batch\n            .column_by_name(\"salience\")\n            .ok_or_else(|| CerebrumError::Database(\"missing 'salience' column\".into()))?\n            .as_primitive::\u003cFloat32Type\u003e();\n        let ts_col = batch\n            .column_by_name(\"timestamp\")\n            .ok_or_else(|| CerebrumError::Database(\"missing 'timestamp' column\".into()))?\n            .as_string::\u003ci32\u003e();\n        let session_col = batch\n            .column_by_name(\"source_session_id\")\n            .ok_or_else(|| CerebrumError::Database(\"missing 'source_session_id' column\".into()))?\n            .as_string::\u003ci32\u003e();\n        let scope_col = batch\n            .column_by_name(\"scope\")\n            .ok_or_else(|| CerebrumError::Database(\"missing 'scope' column\".into()))?\n            .as_string::\u003ci32\u003e();\n        let emb_col = batch\n            .column_by_name(\"embedding\")\n            .ok_or_else(|| CerebrumError::Database(\"missing 'embedding' column\".into()))?\n            .as_fixed_size_list();\n        let meta_col = batch\n            .column_by_name(\"metadata_json\")\n            .ok_or_else(|| CerebrumError::Database(\"missing 'metadata_json' column\".into()))?\n            .as_string::\u003ci32\u003e();\n\n        let mut records = Vec::with_capacity(n);\n        for i in 0..n {\n            let emb_values = emb_col.value(i);\n            let emb_f32 = emb_values.as_primitive::\u003cFloat32Type\u003e();\n            let embedding: Vec\u003cf32\u003e = (0..emb_f32.len()).map(|j| emb_f32.value(j)).collect();\n\n            records.push(LanceDBMemoryRecord {\n                id: id_col.value(i).to_string(),\n                content: content_col.value(i).to_string(),\n                salience: salience_col.value(i),\n                timestamp: ts_col.value(i).to_string(),\n                source_session_id: if session_col.is_null(i) {\n                    None\n                } else {\n                    Some(session_col.value(i).to_string())\n                },\n                scope: scope_col.value(i).to_string(),\n                embedding,\n                metadata_json: meta_col.value(i).to_string(),\n            });\n        }\n        Ok(records)\n    }\n\n    /// Search memories by salience (highest first).\n    pub async fn search_by_salience(\u0026self, limit: usize) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        let table = self.table().await?;\n        let row_count = table\n            .count_rows(None)\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n        if row_count == 0 {\n            return Ok(vec![]);\n        }\n\n        let stream = table\n            .query()\n            .execute()\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n        let batches: Vec\u003cRecordBatch\u003e = stream\n            .try_collect()\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n\n        let mut records: Vec\u003cLanceDBMemoryRecord\u003e = batches\n            .iter()\n            .flat_map(|b| Self::batch_to_records(b).unwrap_or_default())\n            .collect();\n\n        records.sort_by(|a, b| {\n            b.salience\n                .partial_cmp(\u0026a.salience)\n                .unwrap_or(std::cmp::Ordering::Equal)\n        });\n\n        records.iter().take(limit).map(|r| r.to_entry()).collect()\n    }\n}\n\n#[async_trait]\nimpl MemoryStore for LanceDBCortex {\n    /// Store a memory entry using an atomic upsert keyed on `id`.\n    ///\n    /// Uses LanceDB `merge_insert` so re-storing the same `MemoryId` updates\n    /// the existing row rather than duplicating it, with no crash window.\n    async fn store(\u0026self, entry: MemoryEntry) -\u003e Result\u003c()\u003e {\n        let record = LanceDBMemoryRecord::from_entry(\u0026entry)?;\n        let schema = schema(self.embedding_dim);\n        let batch = Self::record_to_batch(\u0026record, self.embedding_dim)?;\n\n        let reader = RecordBatchIterator::new(vec![Ok(batch)], schema);\n\n        let table = self.table().await?;\n        let mut mi = table.merge_insert(\u0026[\"id\"]);\n        mi.when_matched_update_all(None)\n            .when_not_matched_insert_all();\n        mi.execute(Box::new(reader))\n            .await\n            .map_err(|e| CerebrumError::Database(format!(\"merge_insert failed: {}\", e)))?;\n\n        Ok(())\n    }\n\n    /// Retrieve memories by semantic similarity, blended with salience.\n    ///\n    /// Performs an exact full-scan so that the blend `0.7*similarity + 0.3*salience`\n    /// is computed over every row — no memory can be dropped by a vector pre-filter.\n    async fn retrieve(\u0026self, query: \u0026str, limit: usize) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        let query_embedding = self.embedder.embed(query).await?;\n\n        let table = self.table().await?;\n        let row_count = table\n            .count_rows(None)\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n        if row_count == 0 {\n            return Ok(vec![]);\n        }\n\n        let stream = table\n            .query()\n            .execute()\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n        let batches: Vec\u003cRecordBatch\u003e = stream\n            .try_collect()\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n\n        let mut scored: Vec\u003c(LanceDBMemoryRecord, f32)\u003e = batches\n            .iter()\n            .flat_map(|b| Self::batch_to_records(b).unwrap_or_default())\n            .map(|record| {\n                let sim = Self::cosine_similarity(\u0026query_embedding, \u0026record.embedding);\n                let score = sim * 0.7 + record.salience * 0.3;\n                (record, score)\n            })\n            .collect();\n\n        scored.sort_by(|a, b| b.1.partial_cmp(\u0026a.1).unwrap_or(std::cmp::Ordering::Equal));\n\n        scored\n            .into_iter()\n            .take(limit)\n            .map(|(r, _)| r.to_entry())\n            .collect()\n    }\n\n    /// Retrieve memories filtered by scope, then blended-score ranked.\n    ///\n    /// Pushes a coarse SQL predicate to LanceDB (reducing rows fetched),\n    /// then applies the precise `MemoryScope::matches` logic in Rust to\n    /// handle the bidirectional Global-matches-all semantic.\n    async fn retrieve_by_scope(\n        \u0026self,\n        query: \u0026str,\n        scope: \u0026MemoryScope,\n        limit: usize,\n    ) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        let query_embedding = self.embedder.embed(query).await?;\n\n        let table = self.table().await?;\n        let row_count = table\n            .count_rows(None)\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n        if row_count == 0 {\n            return Ok(vec![]);\n        }\n\n        // Coarse SQL pushdown: global matches all, specific scopes match themselves + global.\n        let stream = match scope {\n            MemoryScope::Global =\u003e {\n                // Global scope matches everything — no filter needed.\n                table\n                    .query()\n                    .execute()\n                    .await\n                    .map_err(|e| CerebrumError::Database(e.to_string()))?\n            }\n            _ =\u003e {\n                let predicate =\n                    format!(\"scope = 'global' OR scope = {}\", sql_quote(\u0026scope.as_str()));\n                table\n                    .query()\n                    .only_if(predicate)\n                    .execute()\n                    .await\n                    .map_err(|e| CerebrumError::Database(e.to_string()))?\n            }\n        };\n\n        let batches: Vec\u003cRecordBatch\u003e = stream\n            .try_collect()\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n\n        let mut scored: Vec\u003c(LanceDBMemoryRecord, f32)\u003e = batches\n            .iter()\n            .flat_map(|b| Self::batch_to_records(b).unwrap_or_default())\n            .filter_map(|record| {\n                // Precise scope match in Rust (handles bidirectional Global logic).\n                let entry = record.to_entry().ok()?;\n                if !scope.matches(\u0026entry.scope) {\n                    return None;\n                }\n                let sim = Self::cosine_similarity(\u0026query_embedding, \u0026record.embedding);\n                let score = sim * 0.7 + record.salience * 0.3;\n                Some((record, score))\n            })\n            .collect();\n\n        scored.sort_by(|a, b| b.1.partial_cmp(\u0026a.1).unwrap_or(std::cmp::Ordering::Equal));\n\n        scored\n            .into_iter()\n            .take(limit)\n            .map(|(r, _)| r.to_entry())\n            .collect()\n    }\n\n    /// Delete a memory by ID.\n    async fn delete(\u0026self, id: \u0026MemoryId) -\u003e Result\u003c()\u003e {\n        let predicate = format!(\"id = {}\", sql_quote(\u0026id.to_string()));\n        self.table()\n            .await?\n            .delete(\u0026predicate)\n            .await\n            .map_err(|e| CerebrumError::Database(format!(\"delete failed: {}\", e)))?;\n        Ok(())\n    }\n\n    /// List all memories in the store.\n    ///\n    /// Explicit override — the trait default would embed the literal `\"*\"` string.\n    async fn list(\u0026self) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        let table = self.table().await?;\n        let row_count = table\n            .count_rows(None)\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n        if row_count == 0 {\n            return Ok(vec![]);\n        }\n\n        let stream = table\n            .query()\n            .execute()\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n        let batches: Vec\u003cRecordBatch\u003e = stream\n            .try_collect()\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))?;\n\n        batches\n            .iter()\n            .flat_map(|b| Self::batch_to_records(b).unwrap_or_default())\n            .map(|r| r.to_entry())\n            .collect()\n    }\n\n    /// Get the number of memories in the store.\n    ///\n    /// Explicit override — the trait default would call list() which embeds `\"*\"`.\n    async fn len(\u0026self) -\u003e Result\u003cusize\u003e {\n        self.table()\n            .await?\n            .count_rows(None)\n            .await\n            .map_err(|e| CerebrumError::Database(e.to_string()))\n    }\n\n    /// Check if the store is empty.\n    ///\n    /// Explicit override — the trait default would call len() via list() via retrieve(\"*\"...).\n    async fn is_empty(\u0026self) -\u003e Result\u003cbool\u003e {\n        Ok(self.len().await? == 0)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::embedder::MockEmbedder;\n    use crate::models::MemoryTier;\n    use tempfile;\n\n    #[tokio::test]\n    async fn test_lancedb_cortex_new() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let result = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder).await;\n        assert!(result.is_ok());\n    }\n\n    #[tokio::test]\n    async fn test_lancedb_cortex_store_and_retrieve() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n            .await\n            .unwrap();\n\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test memory\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Cortex)\n            .build();\n\n        cortex.store(entry.clone()).await.unwrap();\n\n        let results = cortex.retrieve(\"test\", 10).await.unwrap();\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_lancedb_cortex_len() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n            .await\n            .unwrap();\n\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test memory\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Cortex)\n            .build();\n\n        cortex.store(entry).await.unwrap();\n\n        let len = cortex.len().await.unwrap();\n        assert!(len \u003e 0);\n    }\n\n    #[tokio::test]\n    async fn test_lancedb_cortex_delete() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n            .await\n            .unwrap();\n\n        let id = MemoryId::new();\n        let entry = MemoryEntry::builder(id, \"test memory\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Cortex)\n            .build();\n\n        cortex.store(entry).await.unwrap();\n        cortex.delete(\u0026id).await.unwrap();\n\n        let results = cortex.retrieve(\"test\", 10).await.unwrap();\n        assert!(results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_lancedb_cortex_retrieve_by_scope() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n            .await\n            .unwrap();\n\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test memory\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Cortex)\n            .scope(MemoryScope::User(\"user1\".to_string()))\n            .build();\n\n        cortex.store(entry).await.unwrap();\n\n        let results = cortex\n            .retrieve_by_scope(\"test\", \u0026MemoryScope::User(\"user1\".to_string()), 10)\n            .await\n            .unwrap();\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_lancedb_cortex_retrieve_by_scope_mismatch() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n            .await\n            .unwrap();\n\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test memory\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Cortex)\n            .scope(MemoryScope::User(\"user1\".to_string()))\n            .build();\n\n        cortex.store(entry).await.unwrap();\n\n        let results = cortex\n            .retrieve_by_scope(\"test\", \u0026MemoryScope::User(\"user2\".to_string()), 10)\n            .await\n            .unwrap();\n        assert!(results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_lancedb_cortex_retrieve_by_scope_global() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n            .await\n            .unwrap();\n\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test memory\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Cortex)\n            .scope(MemoryScope::User(\"user1\".to_string()))\n            .build();\n\n        cortex.store(entry).await.unwrap();\n\n        let results = cortex\n            .retrieve_by_scope(\"test\", \u0026MemoryScope::Global, 10)\n            .await\n            .unwrap();\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_lancedb_cortex_is_empty() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n            .await\n            .unwrap();\n\n        assert!(cortex.is_empty().await.unwrap());\n    }\n\n    #[tokio::test]\n    async fn test_lancedb_cortex_list() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n            .await\n            .unwrap();\n\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test memory\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Cortex)\n            .build();\n\n        cortex.store(entry).await.unwrap();\n\n        let entries = cortex.list().await.unwrap();\n        assert!(!entries.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_cortex_persists_across_reopen() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let id = MemoryId::new();\n\n        {\n            let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n                .await\n                .unwrap();\n            let entry = MemoryEntry::builder(id, \"persistent memory\".to_string())\n                .embedding(vec![0.1; 384])\n                .tier(MemoryTier::Cortex)\n                .build();\n            cortex.store(entry).await.unwrap();\n        }\n        // LanceDBCortex dropped here — connection closed.\n\n        {\n            let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder.clone())\n                .await\n                .unwrap();\n            let results = cortex.list().await.unwrap();\n            assert_eq!(results.len(), 1, \"memory must survive process restart\");\n            assert_eq!(results[0].id, id);\n            assert_eq!(results[0].content, \"persistent memory\");\n        }\n    }\n\n    #[tokio::test]\n    async fn test_cortex_dimension_mismatch_returns_error() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new()); // reports dimension 384\n                                                      // Request dim=768 — must be rejected before any LanceDB call.\n        let result = LanceDBCortex::new(dir.path(), \"memories\", 768, embedder).await;\n        assert!(\n            result.is_err(),\n            \"mismatched dimension must error at construction\"\n        );\n    }\n\n    #[tokio::test]\n    async fn test_cortex_search_empty_table_returns_empty_vec() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .unwrap();\n        // All read operations on a fresh store must succeed with empty results.\n        assert!(cortex.retrieve(\"anything\", 10).await.unwrap().is_empty());\n        assert!(cortex.list().await.unwrap().is_empty());\n        assert_eq!(cortex.len().await.unwrap(), 0);\n        assert!(cortex.is_empty().await.unwrap());\n    }\n\n    #[tokio::test]\n    async fn test_cortex_store_upserts_on_same_id() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .unwrap();\n        let id = MemoryId::new();\n\n        cortex\n            .store(\n                MemoryEntry::builder(id, \"version 1\".to_string())\n                    .embedding(vec![0.1; 384])\n                    .tier(MemoryTier::Cortex)\n                    .build(),\n            )\n            .await\n            .unwrap();\n\n        cortex\n            .store(\n                MemoryEntry::builder(id, \"version 2\".to_string())\n                    .embedding(vec![0.2; 384])\n                    .tier(MemoryTier::Cortex)\n                    .build(),\n            )\n            .await\n            .unwrap();\n\n        let entries = cortex.list().await.unwrap();\n        assert_eq!(entries.len(), 1, \"upsert must not duplicate rows\");\n        assert_eq!(entries[0].content, \"version 2\");\n    }\n\n    #[tokio::test]\n    async fn test_cortex_list_and_len_work_without_embedding_query() {\n        // MockEmbedder rejects empty strings. If list() or len() internally called\n        // retrieve(\"*\", usize::MAX), this test would fail. It passing proves the\n        // explicit overrides are in place and the defaults are not used.\n        let dir = tempfile::tempdir().unwrap();\n        let embedder = Arc::new(MockEmbedder::new());\n        let cortex = LanceDBCortex::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .unwrap();\n        // These must succeed without embedding anything.\n        let _ = cortex.list().await.expect(\"list() must not call embed()\");\n        let _ = cortex.len().await.expect(\"len() must not call embed()\");\n        let _ = cortex\n            .is_empty()\n            .await\n            .expect(\"is_empty() must not call embed()\");\n    }\n\n    #[tokio::test]\n    async fn test_lancedb_memory_record_conversion() {\n        let id = MemoryId::new();\n        let entry = MemoryEntry::builder(id, \"test content\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Cortex)\n            .scope(MemoryScope::Global)\n            .build();\n\n        let record = LanceDBMemoryRecord::from_entry(\u0026entry).unwrap();\n        let converted = record.to_entry().unwrap();\n\n        assert_eq!(converted.id, entry.id);\n        assert_eq!(converted.content, entry.content);\n        assert_eq!(converted.salience, entry.salience);\n    }\n\n    #[test]\n    fn test_parse_scope_string_global() {\n        let result = parse_scope_string(\"global\");\n        assert!(result.is_ok());\n        assert!(matches!(result.unwrap(), MemoryScope::Global));\n    }\n\n    #[test]\n    fn test_parse_scope_string_user() {\n        let result = parse_scope_string(\"user:alice\");\n        assert!(result.is_ok());\n ],"length":0,"stats":{"Line":32}},{"line":427,"address":[],"length":0,"stats":{"Line":0}},{"line":433,"address":[],"length":0,"stats":{"Line":6}},{"line":437,"address":[],"length":0,"stats":{"Line":0}},{"line":445,"address":[],"length":0,"stats":{"Line":0}},{"line":450,"address":[],"length":0,"stats":{"Line":0}},{"line":453,"address":[],"length":0,"stats":{"Line":6}},{"line":454,"address":[],"length":0,"stats":{"Line":2}},{"line":456,"address":[],"length":0,"stats":{"Line":8}},{"line":457,"address":[],"length":0,"stats":{"Line":4}},{"line":458,"address":[],"length":0,"stats":{"Line":0}},{"line":460,"address":[],"length":0,"stats":{"Line":8}},{"line":461,"address":[],"length":0,"stats":{"Line":4}},{"line":462,"address":[],"length":0,"stats":{"Line":2}},{"line":466,"address":[],"length":0,"stats":{"Line":0}},{"line":470,"address":[],"length":0,"stats":{"Line":4}},{"line":475,"address":[],"length":0,"stats":{"Line":24}},{"line":480,"address":[],"length":0,"stats":{"Line":0}},{"line":487,"address":[],"length":0,"stats":{"Line":12}},{"line":490,"address":[],"length":0,"stats":{"Line":0}},{"line":496,"address":[],"length":0,"stats":{"Line":0}},{"line":498,"address":[],"length":0,"stats":{"Line":0}},{"line":501,"address":[],"length":0,"stats":{"Line":36}},{"line":502,"address":[],"length":0,"stats":{"Line":24}},{"line":509,"address":[],"length":0,"stats":{"Line":20}},{"line":513,"address":[],"length":0,"stats":{"Line":0}},{"line":519,"address":[],"length":0,"stats":{"Line":3}}],"covered":190,"coverable":210},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","lib.rs"],"content":"pub mod config;\npub mod decay;\npub mod embedder;\npub mod error;\npub mod fastembed_embedder;\npub mod lancedb_cortex;\npub mod migration;\npub mod models;\npub mod observability;\npub mod orchestrator;\npub mod promotion;\npub mod resilience;\npub mod summarization;\npub mod synapse;\npub mod traits;\npub mod utils;\n\n// Re-export commonly used types\npub use config::Config;\npub use decay::{\n    AccessBasedDecay, DecayContext, DecayStrategy, HybridDecay, RelevanceBasedDecay, TimeBasedDecay,\n};\npub use embedder::{Embedder, MockEmbedder};\npub use error::{CerebrumError, Result};\npub use fastembed_embedder::FastEmbedEmbedder;\npub use lancedb_cortex::LanceDBCortex;\npub use migration::{\n    EmbeddingMigration, EmbeddingProvenance, HybridMigration, MigrationConfig, MigrationManager,\n    MigrationResult, MigrationStrategy, PreserveMigration, ReembedMigration,\n};\npub use models::{MemoryEntry, MemoryId, MemoryScope, MemoryTier};\npub use observability::{ObservabilityContext, OperationMetrics, OperationTimer};\npub use orchestrator::MemoryOrchestrator;\npub use promotion::{\n    FrequencyBasedPromotion, HybridPromotion, ImportanceBasedPromotion, PromotionContext,\n    PromotionStrategy, RecencyBasedPromotion,\n};\npub use resilience::{CircuitBreaker, CircuitBreakerConfig, CircuitState, RetryConfig};\npub use summarization::{\n    IdentitySummarizer, KeywordSummarizer, LengthBasedSummarizer, SentenceBasedSummarizer,\n    Summarizer,\n};\npub use synapse::SynapseMemory;\npub use traits::MemoryStore;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","migration.rs"],"content":"use crate::embedder::Embedder;\nuse crate::error::{CerebrumError, Result};\n#[allow(unused_imports)]\nuse crate::models::{MemoryEntry, MemoryId};\nuse crate::traits::MemoryStore;\nuse async_trait::async_trait;\nuse std::collections::HashMap;\nuse std::fmt;\nuse std::sync::Arc;\n\n/// Metadata about an embedding's provenance.\n///\n/// Tracks which model generated an embedding and when, enabling\n/// migration strategies to make informed decisions about re-embedding.\n#[derive(Debug, Clone)]\npub struct EmbeddingProvenance {\n    /// Name of the model that generated this embedding (e.g., \"bge-small-v1.5\").\n    pub model_name: String,\n    /// ISO 8601 timestamp when the embedding was generated.\n    pub generated_at: String,\n    /// Version of the embedding model (for tracking breaking changes).\n    pub model_version: String,\n}\n\nimpl EmbeddingProvenance {\n    /// Create a new embedding provenance record.\n    pub fn new(model_name: String, model_version: String) -\u003e Self {\n        Self {\n            model_name,\n            generated_at: chrono::Utc::now().to_rfc3339(),\n            model_version,\n        }\n    }\n}\n\n/// Strategy for handling embedding migrations.\n///\n/// Different strategies support different use cases:\n/// - `Reembed`: Re-embed all memories with the new model (most accurate, slowest)\n/// - `Preserve`: Keep old embeddings, add new ones alongside (preserves history, uses more storage)\n/// - `Hybrid`: Re-embed high-salience memories, preserve low-salience ones (balanced approach)\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]\npub enum MigrationStrategy {\n    /// Re-embed all memories with the new model.\n    Reembed,\n    /// Keep old embeddings, add new ones alongside.\n    Preserve,\n    /// Re-embed high-salience memories, preserve low-salience ones.\n    Hybrid,\n}\n\n/// Configuration for an embedding migration.\n#[derive(Clone)]\npub struct MigrationConfig {\n    /// Strategy to use for the migration.\n    pub strategy: MigrationStrategy,\n    /// New embedder to use for re-embedding.\n    pub new_embedder: Arc\u003cdyn Embedder\u003e,\n    /// Salience threshold for hybrid strategy (0.0-1.0).\n    pub hybrid_threshold: f32,\n    /// Whether to perform a dry-run (preview changes without applying).\n    pub dry_run: bool,\n    /// Maximum number of memories to migrate in a single batch.\n    pub batch_size: usize,\n}\n\nimpl fmt::Debug for MigrationConfig {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        f.debug_struct(\"MigrationConfig\")\n            .field(\"strategy\", \u0026self.strategy)\n            .field(\"hybrid_threshold\", \u0026self.hybrid_threshold)\n            .field(\"dry_run\", \u0026self.dry_run)\n            .field(\"batch_size\", \u0026self.batch_size)\n            .field(\"new_embedder\", \u0026\"\u003cArc\u003cdyn Embedder\u003e\u003e\")\n            .finish()\n    }\n}\n\nimpl MigrationConfig {\n    /// Create a new migration configuration.\n    pub fn new(strategy: MigrationStrategy, new_embedder: Arc\u003cdyn Embedder\u003e) -\u003e Self {\n        Self {\n            strategy,\n            new_embedder,\n            hybrid_threshold: 0.5,\n            dry_run: false,\n            batch_size: 100,\n        }\n    }\n\n    /// Set the dry-run flag.\n    pub fn with_dry_run(mut self, dry_run: bool) -\u003e Self {\n        self.dry_run = dry_run;\n        self\n    }\n\n    /// Set the hybrid threshold.\n    pub fn with_hybrid_threshold(mut self, threshold: f32) -\u003e Self {\n        self.hybrid_threshold = threshold.clamp(0.0, 1.0);\n        self\n    }\n\n    /// Set the batch size.\n    pub fn with_batch_size(mut self, batch_size: usize) -\u003e Self {\n        self.batch_size = batch_size.max(1);\n        self\n    }\n}\n\n/// Result of an embedding migration.\n#[derive(Debug, Clone)]\npub struct MigrationResult {\n    /// Total number of memories processed.\n    pub total_memories: usize,\n    /// Number of memories re-embedded.\n    pub reembedded_count: usize,\n    /// Number of memories preserved.\n    pub preserved_count: usize,\n    /// Number of memories that failed to migrate.\n    pub failed_count: usize,\n    /// Whether this was a dry-run (no changes applied).\n    pub dry_run: bool,\n}\n\nimpl MigrationResult {\n    /// Create a new migration result.\n    pub fn new(total_memories: usize, dry_run: bool) -\u003e Self {\n        Self {\n            total_memories,\n            reembedded_count: 0,\n            preserved_count: 0,\n            failed_count: 0,\n            dry_run,\n        }\n    }\n\n    /// Get the success rate as a percentage.\n    pub fn success_rate(\u0026self) -\u003e f32 {\n        if self.total_memories == 0 {\n            100.0\n        } else {\n            ((self.total_memories - self.failed_count) as f32 / self.total_memories as f32) * 100.0\n        }\n    }\n}\n\n/// Trait for embedding migration strategies.\n#[async_trait]\npub trait EmbeddingMigration: Send + Sync {\n    /// Execute the migration on a memory store.\n    ///\n    /// # Arguments\n    /// * `store` - The memory store to migrate\n    /// * `config` - Migration configuration\n    ///\n    /// # Returns\n    /// A MigrationResult with statistics about the migration\n    async fn migrate(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e;\n}\n\n/// Reembed migration strategy: re-embed all memories with the new model.\npub struct ReembedMigration;\n\n#[async_trait]\nimpl EmbeddingMigration for ReembedMigration {\n    async fn migrate(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e {\n        // Retrieve all memories\n        let all_memories = store.list().await?;\n        let mut result = MigrationResult::new(all_memories.len(), config.dry_run);\n\n        for memory in all_memories {\n            match config.new_embedder.embed(\u0026memory.content).await {\n                Ok(new_embedding) =\u003e {\n                    let mut updated = memory.clone();\n                    updated.embedding = Some(new_embedding);\n\n                    if !config.dry_run {\n                        store.store(updated).await?;\n                    }\n\n                    result.reembedded_count += 1;\n                }\n                Err(_) =\u003e {\n                    result.failed_count += 1;\n                }\n            }\n        }\n\n        Ok(result)\n    }\n}\n\n/// Preserve migration strategy: keep old embeddings, add new ones alongside.\npub struct PreserveMigration;\n\n#[async_trait]\nimpl EmbeddingMigration for PreserveMigration {\n    async fn migrate(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e {\n        // Retrieve all memories\n        let all_memories = store.list().await?;\n        let mut result = MigrationResult::new(all_memories.len(), config.dry_run);\n\n        for memory in all_memories {\n            // Only add new embedding if one doesn't exist\n            if memory.embedding.is_none() {\n                match config.new_embedder.embed(\u0026memory.content).await {\n                    Ok(new_embedding) =\u003e {\n                        let mut updated = memory.clone();\n                        updated.embedding = Some(new_embedding);\n\n                        if !config.dry_run {\n                            store.store(updated).await?;\n                        }\n\n                        result.reembedded_count += 1;\n                    }\n                    Err(_) =\u003e {\n                        result.failed_count += 1;\n                    }\n                }\n            } else {\n                result.preserved_count += 1;\n            }\n        }\n\n        Ok(result)\n    }\n}\n\n/// Hybrid migration strategy: re-embed high-salience, preserve low-salience.\npub struct HybridMigration;\n\n#[async_trait]\nimpl EmbeddingMigration for HybridMigration {\n    async fn migrate(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e {\n        // Retrieve all memories\n        let all_memories = store.list().await?;\n        let mut result = MigrationResult::new(all_memories.len(), config.dry_run);\n\n        for memory in all_memories {\n            // Re-embed if salience is above threshold\n            if memory.salience \u003e= config.hybrid_threshold {\n                match config.new_embedder.embed(\u0026memory.content).await {\n                    Ok(new_embedding) =\u003e {\n                        let mut updated = memory.clone();\n                        updated.embedding = Some(new_embedding);\n\n                        if !config.dry_run {\n                            store.store(updated).await?;\n                        }\n\n                        result.reembedded_count += 1;\n                    }\n                    Err(_) =\u003e {\n                        result.failed_count += 1;\n                    }\n                }\n            } else {\n                result.preserved_count += 1;\n            }\n        }\n\n        Ok(result)\n    }\n}\n\n/// Migration manager for coordinating embedding migrations.\npub struct MigrationManager {\n    strategies: HashMap\u003cMigrationStrategy, Arc\u003cdyn EmbeddingMigration\u003e\u003e,\n}\n\nimpl MigrationManager {\n    /// Create a new migration manager with default strategies.\n    pub fn new() -\u003e Self {\n        let mut strategies = HashMap::new();\n        strategies.insert(\n            MigrationStrategy::Reembed,\n            Arc::new(ReembedMigration) as Arc\u003cdyn EmbeddingMigration\u003e,\n        );\n        strategies.insert(\n            MigrationStrategy::Preserve,\n            Arc::new(PreserveMigration) as Arc\u003cdyn EmbeddingMigration\u003e,\n        );\n        strategies.insert(\n            MigrationStrategy::Hybrid,\n            Arc::new(HybridMigration) as Arc\u003cdyn EmbeddingMigration\u003e,\n        );\n\n        Self { strategies }\n    }\n\n    /// Execute a migration using the configured strategy.\n    pub async fn execute(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e {\n        let strategy = self\n            .strategies\n            .get(\u0026config.strategy)\n            .ok_or_else(|| CerebrumError::Validation(\"Unknown migration strategy\".to_string()))?;\n\n        strategy.migrate(store, config).await\n    }\n}\n\nimpl Default for MigrationManager {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::embedder::MockEmbedder;\n    use crate::models::MemoryTier;\n    use crate::synapse::SynapseMemory;\n\n    #[test]\n    fn test_embedding_provenance_new() {\n        let provenance = EmbeddingProvenance::new(\"bge-small\".to_string(), \"1.5\".to_string());\n        assert_eq!(provenance.model_name, \"bge-small\");\n        assert_eq!(provenance.model_version, \"1.5\");\n        assert!(!provenance.generated_at.is_empty());\n    }\n\n    #[test]\n    fn test_migration_config_new() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder);\n        assert_eq!(config.strategy, MigrationStrategy::Reembed);\n        assert!(!config.dry_run);\n        assert_eq!(config.hybrid_threshold, 0.5);\n        assert_eq!(config.batch_size, 100);\n    }\n\n    #[test]\n    fn test_migration_config_with_dry_run() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder).with_dry_run(true);\n        assert!(config.dry_run);\n    }\n\n    #[test]\n    fn test_migration_config_with_hybrid_threshold() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config =\n            MigrationConfig::new(MigrationStrategy::Hybrid, embedder).with_hybrid_threshold(0.75);\n        assert_eq!(config.hybrid_threshold, 0.75);\n    }\n\n    #[test]\n    fn test_migration_config_threshold_clamping() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config =\n            MigrationConfig::new(MigrationStrategy::Hybrid, embedder).with_hybrid_threshold(1.5); // Should clamp to 1.0\n        assert_eq!(config.hybrid_threshold, 1.0);\n    }\n\n l_operations.fetch_add(1, Ordering::Relaxed);\n        self.successful_operations.fetch_add(1, Ordering::Relaxed);\n        self.total_time_ms.fetch_add(duration_ms, Ordering::Relaxed);\n    }\n\n    /// Record a failed operation with the given duration in milliseconds.\n    pub fn record_failure(\u0026self, duration_ms: u64) {\n        self.total_operations.fetch_add(1, Ordering::Relaxed);\n        self.failed_operations.fetch_add(1, Ordering::Relaxed);\n        self.total_time_ms.fetch_add(duration_ms, Ordering::Relaxed);\n    }\n\n    /// Get the total number of operations.\n    pub fn total_operations(\u0026self) -\u003e u64 {\n        self.total_operations.load(Ordering::Relaxed)\n    }\n\n    /// Get the number of successful operations.\n    pub fn successful_operations(\u0026self) -\u003e u64 {\n        self.successful_operations.load(Ordering::Relaxed)\n    }\n\n    /// Get the number of failed operations.\n    pub fn failed_operations(\u0026self) -\u003e u64 {\n        self.failed_operations.load(Ordering::Relaxed)\n    }\n\n    /// Get the total time spent in operations (in milliseconds).\n    pub fn total_time_ms(\u0026self) -\u003e u64 {\n        self.total_time_ms.load(Ordering::Relaxed)\n    }\n\n    /// Get the average time per operation (in milliseconds).\n    pub fn average_time_ms(\u0026self) -\u003e f64 {\n        let total = self.total_operations();\n        if total == 0 {\n            0.0\n        } else {\n            self.total_time_ms() as f64 / total as f64\n        }\n    }\n\n    /// Get the success rate as a percentage.\n    pub fn success_rate(\u0026self) -\u003e f64 {\n        let total = self.total_operations();\n        if total == 0 {\n            100.0\n        } else {\n            (self.successful_operations() as f64 / total as f64) * 100.0\n        }\n    }\n\n    /// Reset all metrics to zero.\n    pub fn reset(\u0026self) {\n        self.total_operations.store(0, Ordering::Relaxed);\n        self.successful_operations.store(0, Ordering::Relaxed);\n        self.failed_operations.store(0, Ordering::Relaxed);\n        self.total_time_ms.store(0, Ordering::Relaxed);\n    }\n}\n\nimpl Default for OperationMetrics {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Observability context for tracking operations.\n#[derive(Clone)]\npub struct ObservabilityContext {\n    /// Metrics for remember operations.\n    pub remember_metrics: OperationMetrics,\n    /// Metrics for recall operations.\n    pub recall_metrics: OperationMetrics,\n    /// Metrics for memorize operations.\n    pub memorize_metrics: OperationMetrics,\n    /// Metrics for forget operations.\n    pub forget_metrics: OperationMetrics,\n    /// Metrics for promote operations.\n    pub promote_metrics: OperationMetrics,\n    /// Metrics for decay operations.\n    pub decay_metrics: OperationMetrics,\n}\n\nimpl ObservabilityContext {\n    /// Create a new ObservabilityContext.\n    pub fn new() -\u003e Self {\n        Self {\n            remember_metrics: OperationMetrics::new(),\n            recall_metrics: OperationMetrics::new(),\n            memorize_metrics: OperationMetrics::new(),\n            forget_metrics: OperationMetrics::new(),\n            promote_metrics: OperationMetrics::new(),\n            decay_metrics: OperationMetrics::new(),\n        }\n    }\n\n    /// Log a summary of all metrics.\n    pub fn log_summary(\u0026self) {\n        info!(\n            \"Memory Operations Summary: remember={} recall={} memorize={} forget={} promote={} decay={}\",\n            self.remember_metrics.total_operations(),\n            self.recall_metrics.total_operations(),\n            self.memorize_metrics.total_operations(),\n            self.forget_metrics.total_operations(),\n            self.promote_metrics.total_operations(),\n            self.decay_metrics.total_operations()\n        );\n\n        debug!(\n            \"Success Rates: remember={:.1}% recall={:.1}% memorize={:.1}% forget={:.1}% promote={:.1}% decay={:.1}%\",\n            self.remember_metrics.success_rate(),\n            self.recall_metrics.success_rate(),\n            self.memorize_metrics.success_rate(),\n            self.forget_metrics.success_rate(),\n            self.promote_metrics.success_rate(),\n            self.decay_metrics.success_rate()\n        );\n\n        debug!(\n            \"Average Latencies (ms): remember={:.2} recall={:.2} memorize={:.2} forget={:.2} promote={:.2} decay={:.2}\",\n            self.remember_metrics.average_time_ms(),\n            self.recall_metrics.average_time_ms(),\n            self.memorize_metrics.average_time_ms(),\n            self.forget_metrics.average_time_ms(),\n            self.promote_metrics.average_time_ms(),\n            self.decay_metrics.average_time_ms()\n        );\n    }\n\n    /// Reset all metrics.\n    pub fn reset_all(\u0026self) {\n        self.remember_metrics.reset();\n        self.recall_metrics.reset();\n        self.memorize_metrics.reset();\n        self.forget_metrics.reset();\n        self.promote_metrics.reset();\n        self.decay_metrics.reset();\n    }\n}\n\nimpl Default for ObservabilityContext {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Timer for measuring operation duration.\npub struct OperationTimer {\n    start: Instant,\n}\n\nimpl OperationTimer {\n    /// Create a new timer.\n    pub fn new() -\u003e Self {\n        Self {\n            start: Instant::now(),\n        }\n    }\n\n    /// Get the elapsed time in milliseconds.\n    pub fn elapsed_ms(\u0026self) -\u003e u64 {\n        self.start.elapsed().as_millis() as u64\n    }\n\n    /// Record the operation as successful in the given metrics.\n    pub fn record_success(self, metrics: \u0026OperationMetrics) {\n        let duration_ms = self.elapsed_ms();\n        metrics.record_success(duration_ms);\n        debug!(\"Operation completed successfully in {}ms\", duration_ms);\n    }\n\n    /// Record the operation as failed in the given metrics.\n    pub fn record_failure(self, metrics: \u0026OperationMetrics, error: \u0026str) {\n        let duration_ms = self.elapsed_ms();\n        metrics.record_failure(duration_ms);\n        warn!(\"Operation failed after {}ms: {}\", duration_ms, error);\n    }\n}\n\nimpl Default for OperationTimer {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_operation_metrics_new() {\n        let metrics = OperationMetrics::new();\n        assert_eq!(metrics.total_operations(), 0);\n        assert_eq!(metrics.successful_operations(), 0);\n        assert_eq!(metrics.failed_operations(), 0);\n        assert_eq!(metrics.total_time_ms(), 0);\n    }\n\n    #[test]\n    fn test_operation_metrics_record_success() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n        assert_eq!(metrics.total_operations(), 1);\n        assert_eq!(metrics.successful_operations(), 1);\n        assert_eq!(metrics.failed_operations(), 0);\n        assert_eq!(metrics.total_time_ms(), 100);\n    }\n\n    #[test]\n    fn test_operation_metrics_record_failure() {\n        let metrics = OperationMetrics::new();\n        metrics.record_failure(50);\n        assert_eq!(metrics.total_operations(), 1);\n        assert_eq!(metrics.successful_operations(), 0);\n        assert_eq!(metrics.failed_operations(), 1);\n        assert_eq!(metrics.total_time_ms(), 50);\n    }\n\n    #[test]\n    fn test_operation_metrics_success_rate() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n        metrics.record_success(100);\n        metrics.record_failure(50);\n        assert_eq!(metrics.total_operations(), 3);\n        assert_eq!(metrics.successful_operations(), 2);\n        assert_eq!(metrics.failed_operations(), 1);\n        assert!((metrics.success_rate() - 66.666).abs() \u003c 0.1);\n    }\n\n    #[test]\n    fn test_operation_metrics_average_time() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n        metrics.record_success(200);\n        metrics.record_success(300);\n        assert_eq!(metrics.total_operations(), 3);\n        assert_eq!(metrics.total_time_ms(), 600);\n        assert!((metrics.average_time_ms() - 200.0).abs() \u003c 0.1);\n    }\n\n    #[test]\n    fn test_operation_metrics_success_rate_empty() {\n        let metrics = OperationMetrics::new();\n        assert_eq!(metrics.success_rate(), 100.0);\n    }\n\n    #[test]\n    fn test_operation_metrics_average_time_empty() {\n        let metrics = OperationMetrics::new();\n        assert_eq!(metrics.average_time_ms(), 0.0);\n    }\n\n    #[test]\n    fn test_operation_metrics_reset() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n        metrics.record_failure(50);\n        assert_eq!(metrics.total_operations(), 2);\n\n        metrics.reset();\n        assert_eq!(metrics.total_operations(), 0);\n        assert_eq!(metrics.successful_operations(), 0);\n        assert_eq!(metrics.failed_operations(), 0);\n        assert_eq!(metrics.total_time_ms(), 0);\n    }\n\n    #[test]\n    fn test_observability_context_new() {\n        let ctx = ObservabilityContext::new();\n        assert_eq!(ctx.remember_metrics.total_operations(), 0);\n        assert_eq!(ctx.recall_metrics.total_operations(), 0);\n        assert_eq!(ctx.memorize_metrics.total_operations(), 0);\n        assert_eq!(ctx.forget_metrics.total_operations(), 0);\n        assert_eq!(ctx.promote_metrics.total_operations(), 0);\n        assert_eq!(ctx.decay_metrics.total_operations(), 0);\n    }\n\n    #[test]\n    fn test_observability_context_reset_all() {\n        let ctx = ObservabilityContext::new();\n        ctx.remember_metrics.record_success(100);\n        ctx.recall_metrics.record_failure(50);\n        ctx.memorize_metrics.record_success(75);\n\n        assert!(ctx.remember_metrics.total_operations() \u003e 0);\n        assert!(ctx.recall_metrics.total_operations() \u003e 0);\n        assert!(ctx.memorize_metrics.total_operations() \u003e 0);\n\n        ctx.reset_all();\n\n        assert_eq!(ctx.remember_metrics.total_operations(), 0);\n        assert_eq!(ctx.recall_metrics.total_operations(), 0);\n        assert_eq!(ctx.memorize_metrics.total_operations(), 0);\n    }\n\n    #[test]\n    fn test_operation_timer_new() {\n        let timer = OperationTimer::new();\n        let elapsed = timer.elapsed_ms();\n        assert!(elapsed \u003c 100); // Should be very fast\n    }\n\n    #[test]\n    fn test_operation_timer_default() {\n        let timer = OperationTimer::default();\n        let elapsed = timer.elapsed_ms();\n        assert!(elapsed \u003c 100);\n    }\n\n    #[test]\n    fn test_observability_context_log_summary() {\n        let ctx = ObservabilityContext::new();\n        ctx.remember_metrics.record_success(100);\n        ctx.recall_metrics.record_failure(50);\n        ctx.memorize_metrics.record_success(75);\n\n        // Wrap in scoped DEBUG subscriber to evaluate log macro arguments\n        let subscriber = tracing_subscriber::fmt()\n            .with_max_level(tracing::Level::DEBUG)\n            .finish();\n        tracing::subscriber::with_default(subscriber, || {\n            ctx.log_summary();\n        });\n    }\n\n    #[test]\n    fn test_operation_metrics_default() {\n        let metrics = OperationMetrics::default();\n        assert_eq!(metrics.total_operations(), 0);\n        assert_eq!(metrics.success_rate(), 100.0);\n    }\n\n    #[test]\n    fn test_observability_context_default() {\n        let ctx = ObservabilityContext::default();\n        assert_eq!(ctx.remember_metrics.total_operations(), 0);\n    }\n\n    #[test]\n    fn test_operation_timer_record_success() {\n        let m = OperationMetrics::new();\n        OperationTimer::new().record_success(\u0026m);\n        assert_eq!(m.successful_operations(), 1);\n        assert_eq!(m.total_operations(), 1);\n    }\n\n    #[test]\n    fn test_operation_timer_record_failure() {\n        let m = OperationMetrics::new();\n        OperationTimer::new().record_failure(\u0026m, \"boom\");\n        assert_eq!(m.failed_operations(), 1);\n        assert_eq!(m.total_operations(), 1);\n    }\n\n    #[test]\n    fn test_operation_metrics_clone() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n\n        let cloned = metrics.clone();\n        assert_eq!(cloned.total_operations(), 1);\n        assert_eq!(cloned.successful_operations(), 1);\n        assert_eq!(cloned.total_time_ms(), 100);\n    }\n\n    #[test]\n    fn test_observability_context_clone() {\n        let ctx = ObservabilityContext::new();\n        ctx.remember_metrics.record_success(100);\n\n        let cloned = ctx.clone();\n        assert_eq!(cloned.remember_metrics.total_operations(), 1);\n    }\n}\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":72}},{"line":23,"address":[],"length":0,"stats":{"Line":216}},{"line":24,"address":[],"length":0,"stats":{"Line":216}},{"line":25,"address":[],"length":0,"stats":{"Line":216}},{"line":26,"address":[],"length":0,"stats":{"Line":72}},{"line":31,"address":[],"length":0,"stats":{"Line":87}},{"line":32,"address":[],"length":0,"stats":{"Line":174}},{"line":33,"address":[],"length":0,"stats":{"Line":174}},{"line":34,"address":[],"length":0,"stats":{"Line":261}},{"line":38,"address":[],"length":0,"stats":{"Line":74}},{"line":39,"address":[],"length":0,"stats":{"Line":148}},{"line":40,"address":[],"length":0,"stats":{"Line":148}},{"line":41,"address":[],"length":0,"stats":{"Line":222}},{"line":45,"address":[],"length":0,"stats":{"Line":60}},{"line":46,"address":[],"length":0,"stats":{"Line":120}},{"line":50,"address":[],"length":0,"stats":{"Line":20}},{"line":51,"address":[],"length":0,"stats":{"Line":40}},{"line":55,"address":[],"length":0,"stats":{"Line":12}},{"line":56,"address":[],"length":0,"stats":{"Line":24}},{"line"
