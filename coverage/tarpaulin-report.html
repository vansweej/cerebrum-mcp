;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","migration.rs"],"content":"use crate::embedder::Embedder;\nuse crate::error::{CerebrumError, Result};\n#[allow(unused_imports)]\nuse crate::models::{MemoryEntry, MemoryId};\nuse crate::traits::MemoryStore;\nuse async_trait::async_trait;\nuse std::collections::HashMap;\nuse std::fmt;\nuse std::sync::Arc;\n\n/// Metadata about an embedding's provenance.\n///\n/// Tracks which model generated an embedding and when, enabling\n/// migration strategies to make informed decisions about re-embedding.\n#[derive(Debug, Clone)]\npub struct EmbeddingProvenance {\n    /// Name of the model that generated this embedding (e.g., \"bge-small-v1.5\").\n    pub model_name: String,\n    /// ISO 8601 timestamp when the embedding was generated.\n    pub generated_at: String,\n    /// Version of the embedding model (for tracking breaking changes).\n    pub model_version: String,\n}\n\nimpl EmbeddingProvenance {\n    /// Create a new embedding provenance record.\n    pub fn new(model_name: String, model_version: String) -\u003e Self {\n        Self {\n            model_name,\n            generated_at: chrono::Utc::now().to_rfc3339(),\n            model_version,\n        }\n    }\n}\n\n/// Strategy for handling embedding migrations.\n///\n/// Different strategies support different use cases:\n/// - `Reembed`: Re-embed all memories with the new model (most accurate, slowest)\n/// - `Preserve`: Keep old embeddings, add new ones alongside (preserves history, uses more storage)\n/// - `Hybrid`: Re-embed high-salience memories, preserve low-salience ones (balanced approach)\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]\npub enum MigrationStrategy {\n    /// Re-embed all memories with the new model.\n    Reembed,\n    /// Keep old embeddings, add new ones alongside.\n    Preserve,\n    /// Re-embed high-salience memories, preserve low-salience ones.\n    Hybrid,\n}\n\n/// Configuration for an embedding migration.\n#[derive(Clone)]\npub struct MigrationConfig {\n    /// Strategy to use for the migration.\n    pub strategy: MigrationStrategy,\n    /// New embedder to use for re-embedding.\n    pub new_embedder: Arc\u003cdyn Embedder\u003e,\n    /// Salience threshold for hybrid strategy (0.0-1.0).\n    pub hybrid_threshold: f32,\n    /// Whether to perform a dry-run (preview changes without applying).\n    pub dry_run: bool,\n    /// Maximum number of memories to migrate in a single batch.\n    pub batch_size: usize,\n}\n\nimpl fmt::Debug for MigrationConfig {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        f.debug_struct(\"MigrationConfig\")\n            .field(\"strategy\", \u0026self.strategy)\n            .field(\"hybrid_threshold\", \u0026self.hybrid_threshold)\n            .field(\"dry_run\", \u0026self.dry_run)\n            .field(\"batch_size\", \u0026self.batch_size)\n            .field(\"new_embedder\", \u0026\"\u003cArc\u003cdyn Embedder\u003e\u003e\")\n            .finish()\n    }\n}\n\nimpl MigrationConfig {\n    /// Create a new migration configuration.\n    pub fn new(strategy: MigrationStrategy, new_embedder: Arc\u003cdyn Embedder\u003e) -\u003e Self {\n        Self {\n            strategy,\n            new_embedder,\n            hybrid_threshold: 0.5,\n            dry_run: false,\n            batch_size: 100,\n        }\n    }\n\n    /// Set the dry-run flag.\n    pub fn with_dry_run(mut self, dry_run: bool) -\u003e Self {\n        self.dry_run = dry_run;\n        self\n    }\n\n    /// Set the hybrid threshold.\n    pub fn with_hybrid_threshold(mut self, threshold: f32) -\u003e Self {\n        self.hybrid_threshold = threshold.clamp(0.0, 1.0);\n        self\n    }\n\n    /// Set the batch size.\n    pub fn with_batch_size(mut self, batch_size: usize) -\u003e Self {\n        self.batch_size = batch_size.max(1);\n        self\n    }\n}\n\n/// Result of an embedding migration.\n#[derive(Debug, Clone)]\npub struct MigrationResult {\n    /// Total number of memories processed.\n    pub total_memories: usize,\n    /// Number of memories re-embedded.\n    pub reembedded_count: usize,\n    /// Number of memories preserved.\n    pub preserved_count: usize,\n    /// Number of memories that failed to migrate.\n    pub failed_count: usize,\n    /// Whether this was a dry-run (no changes applied).\n    pub dry_run: bool,\n}\n\nimpl MigrationResult {\n    /// Create a new migration result.\n    pub fn new(total_memories: usize, dry_run: bool) -\u003e Self {\n        Self {\n            total_memories,\n            reembedded_count: 0,\n            preserved_count: 0,\n            failed_count: 0,\n            dry_run,\n        }\n    }\n\n    /// Get the success rate as a percentage.\n    pub fn success_rate(\u0026self) -\u003e f32 {\n        if self.total_memories == 0 {\n            100.0\n        } else {\n            ((self.total_memories - self.failed_count) as f32 / self.total_memories as f32) * 100.0\n        }\n    }\n}\n\n/// Trait for embedding migration strategies.\n#[async_trait]\npub trait EmbeddingMigration: Send + Sync {\n    /// Execute the migration on a memory store.\n    ///\n    /// # Arguments\n    /// * `store` - The memory store to migrate\n    /// * `config` - Migration configuration\n    ///\n    /// # Returns\n    /// A MigrationResult with statistics about the migration\n    async fn migrate(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e;\n}\n\n/// Reembed migration strategy: re-embed all memories with the new model.\npub struct ReembedMigration;\n\n#[async_trait]\nimpl EmbeddingMigration for ReembedMigration {\n    async fn migrate(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e {\n        // Retrieve all memories\n        let all_memories = store.list().await?;\n        let mut result = MigrationResult::new(all_memories.len(), config.dry_run);\n\n        for memory in all_memories {\n            match config.new_embedder.embed(\u0026memory.content).await {\n                Ok(new_embedding) =\u003e {\n                    let mut updated = memory.clone();\n                    updated.embedding = Some(new_embedding);\n\n                    if !config.dry_run {\n                        store.store(updated).await?;\n                    }\n\n                    result.reembedded_count += 1;\n                }\n                Err(_) =\u003e {\n                    result.failed_count += 1;\n                }\n            }\n        }\n\n        Ok(result)\n    }\n}\n\n/// Preserve migration strategy: keep old embeddings, add new ones alongside.\npub struct PreserveMigration;\n\n#[async_trait]\nimpl EmbeddingMigration for PreserveMigration {\n    async fn migrate(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e {\n        // Retrieve all memories\n        let all_memories = store.list().await?;\n        let mut result = MigrationResult::new(all_memories.len(), config.dry_run);\n\n        for memory in all_memories {\n            // Only add new embedding if one doesn't exist\n            if memory.embedding.is_none() {\n                match config.new_embedder.embed(\u0026memory.content).await {\n                    Ok(new_embedding) =\u003e {\n                        let mut updated = memory.clone();\n                        updated.embedding = Some(new_embedding);\n\n                        if !config.dry_run {\n                            store.store(updated).await?;\n                        }\n\n                        result.reembedded_count += 1;\n                    }\n                    Err(_) =\u003e {\n                        result.failed_count += 1;\n                    }\n                }\n            } else {\n                result.preserved_count += 1;\n            }\n        }\n\n        Ok(result)\n    }\n}\n\n/// Hybrid migration strategy: re-embed high-salience, preserve low-salience.\npub struct HybridMigration;\n\n#[async_trait]\nimpl EmbeddingMigration for HybridMigration {\n    async fn migrate(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e {\n        // Retrieve all memories\n        let all_memories = store.list().await?;\n        let mut result = MigrationResult::new(all_memories.len(), config.dry_run);\n\n        for memory in all_memories {\n            // Re-embed if salience is above threshold\n            if memory.salience \u003e= config.hybrid_threshold {\n                match config.new_embedder.embed(\u0026memory.content).await {\n                    Ok(new_embedding) =\u003e {\n                        let mut updated = memory.clone();\n                        updated.embedding = Some(new_embedding);\n\n                        if !config.dry_run {\n                            store.store(updated).await?;\n                        }\n\n                        result.reembedded_count += 1;\n                    }\n                    Err(_) =\u003e {\n                        result.failed_count += 1;\n                    }\n                }\n            } else {\n                result.preserved_count += 1;\n            }\n        }\n\n        Ok(result)\n    }\n}\n\n/// Migration manager for coordinating embedding migrations.\npub struct MigrationManager {\n    strategies: HashMap\u003cMigrationStrategy, Arc\u003cdyn EmbeddingMigration\u003e\u003e,\n}\n\nimpl MigrationManager {\n    /// Create a new migration manager with default strategies.\n    pub fn new() -\u003e Self {\n        let mut strategies = HashMap::new();\n        strategies.insert(\n            MigrationStrategy::Reembed,\n            Arc::new(ReembedMigration) as Arc\u003cdyn EmbeddingMigration\u003e,\n        );\n        strategies.insert(\n            MigrationStrategy::Preserve,\n            Arc::new(PreserveMigration) as Arc\u003cdyn EmbeddingMigration\u003e,\n        );\n        strategies.insert(\n            MigrationStrategy::Hybrid,\n            Arc::new(HybridMigration) as Arc\u003cdyn EmbeddingMigration\u003e,\n        );\n\n        Self { strategies }\n    }\n\n    /// Execute a migration using the configured strategy.\n    pub async fn execute(\n        \u0026self,\n        store: \u0026dyn MemoryStore,\n        config: \u0026MigrationConfig,\n    ) -\u003e Result\u003cMigrationResult\u003e {\n        let strategy = self\n            .strategies\n            .get(\u0026config.strategy)\n            .ok_or_else(|| CerebrumError::Validation(\"Unknown migration strategy\".to_string()))?;\n\n        strategy.migrate(store, config).await\n    }\n}\n\nimpl Default for MigrationManager {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::embedder::MockEmbedder;\n    use crate::models::MemoryTier;\n    use crate::synapse::SynapseMemory;\n\n    #[test]\n    fn test_embedding_provenance_new() {\n        let provenance = EmbeddingProvenance::new(\"bge-small\".to_string(), \"1.5\".to_string());\n        assert_eq!(provenance.model_name, \"bge-small\");\n        assert_eq!(provenance.model_version, \"1.5\");\n        assert!(!provenance.generated_at.is_empty());\n    }\n\n    #[test]\n    fn test_migration_config_new() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder);\n        assert_eq!(config.strategy, MigrationStrategy::Reembed);\n        assert!(!config.dry_run);\n        assert_eq!(config.hybrid_threshold, 0.5);\n        assert_eq!(config.batch_size, 100);\n    }\n\n    #[test]\n    fn test_migration_config_with_dry_run() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder).with_dry_run(true);\n        assert!(config.dry_run);\n    }\n\n    #[test]\n    fn test_migration_config_with_hybrid_threshold() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config =\n            MigrationConfig::new(MigrationStrategy::Hybrid, embedder).with_hybrid_threshold(0.75);\n        assert_eq!(config.hybrid_threshold, 0.75);\n    }\n\n    #[test]\n    fn test_migration_config_threshold_clamping() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config =\n            MigrationConfig::new(MigrationStrategy::Hybrid, embedder).with_hybrid_threshold(1.5); // Should clamp to 1.0\n        assert_eq!(config.hybrid_threshold, 1.0);\n    }\n\n    #[test]\n    fn test_migration_config_with_batch_size() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder).with_batch_size(50);\n        assert_eq!(config.batch_size, 50);\n    }\n\n    #[test]\n    fn test_migration_config_debug() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder);\n        let debug_str = format!(\"{:?}\", config);\n        assert!(debug_str.contains(\"MigrationConfig\"));\n        assert!(debug_str.contains(\"Reembed\"));\n    }\n\n    #[test]\n    fn test_migration_manager_default() {\n        let manager = MigrationManager::default();\n        assert!(manager.strategies.contains_key(\u0026MigrationStrategy::Reembed));\n        assert!(manager\n            .strategies\n            .contains_key(\u0026MigrationStrategy::Preserve));\n        assert!(manager.strategies.contains_key(\u0026MigrationStrategy::Hybrid));\n    }\n\n    #[test]\n    fn test_migration_result_new() {\n        let result = MigrationResult::new(100, false);\n        assert_eq!(result.total_memories, 100);\n        assert!(!result.dry_run);\n        assert_eq!(result.success_rate(), 100.0);\n    }\n\n    #[test]\n    fn test_migration_result_success_rate() {\n        let mut result = MigrationResult::new(100, false);\n        result.reembedded_count = 90;\n        result.failed_count = 10;\n        assert_eq!(result.success_rate(), 90.0);\n    }\n\n    #[test]\n    fn test_migration_result_success_rate_empty() {\n        let result = MigrationResult::new(0, false);\n        assert_eq!(result.success_rate(), 100.0);\n    }\n\n    #[tokio::test]\n    async fn test_reembed_migration() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let store = SynapseMemory::new(embedder.clone());\n\n        // Add a memory\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test content\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Synapse)\n            .build();\n        store.store(entry).await.unwrap();\n\n        // Run reembed migration\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder);\n        let migration = ReembedMigration;\n        let result = migration.migrate(\u0026store, \u0026config).await.unwrap();\n\n        assert_eq!(result.total_memories, 1);\n        assert_eq!(result.reembedded_count, 1);\n        assert_eq!(result.failed_count, 0);\n    }\n\n    #[tokio::test]\n    async fn test_reembed_migration_dry_run() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let store = SynapseMemory::new(embedder.clone());\n\n        // Add a memory\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test content\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Synapse)\n            .build();\n        store.store(entry).await.unwrap();\n\n        // Run reembed migration with dry-run\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder).with_dry_run(true);\n        let migration = ReembedMigration;\n        let result = migration.migrate(\u0026store, \u0026config).await.unwrap();\n\n        assert!(result.dry_run);\n        assert_eq!(result.reembedded_count, 1);\n    }\n\n    #[tokio::test]\n    async fn test_preserve_migration() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let store = SynapseMemory::new(embedder.clone());\n\n        // Add a memory with embedding\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test content\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Synapse)\n            .build();\n        store.store(entry).await.unwrap();\n\n        // Run preserve migration\n        let config = MigrationConfig::new(MigrationStrategy::Preserve, embedder);\n        let migration = PreserveMigration;\n        let result = migration.migrate(\u0026store, \u0026config).await.unwrap();\n\n        assert_eq!(result.total_memories, 1);\n        assert_eq!(result.preserved_count, 1);\n        assert_eq!(result.reembedded_count, 0);\n    }\n\n    #[tokio::test]\n    async fn test_hybrid_migration() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let store = SynapseMemory::new(embedder.clone());\n\n        // Add high-salience memory\n        let high_salience = MemoryEntry::builder(MemoryId::new(), \"important\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Synapse)\n            .salience(0.8)\n            .build();\n        store.store(high_salience).await.unwrap();\n\n        // Add low-salience memory\n        let low_salience = MemoryEntry::builder(MemoryId::new(), \"trivial\".to_string())\n            .embedding(vec![0.2; 384])\n            .tier(MemoryTier::Synapse)\n            .salience(0.2)\n            .build();\n        store.store(low_salience).await.unwrap();\n\n        // Run hybrid migration with threshold 0.5\n        let config =\n            MigrationConfig::new(MigrationStrategy::Hybrid, embedder).with_hybrid_threshold(0.5);\n        let migration = HybridMigration;\n        let result = migration.migrate(\u0026store, \u0026config).await.unwrap();\n\n        assert_eq!(result.total_memories, 2);\n        assert_eq!(result.reembedded_count, 1); // High-salience\n        assert_eq!(result.preserved_count, 1); // Low-salience\n    }\n\n    #[test]\n    fn test_migration_manager_new() {\n        let manager = MigrationManager::new();\n        assert!(manager.strategies.contains_key(\u0026MigrationStrategy::Reembed));\n        assert!(manager\n            .strategies\n            .contains_key(\u0026MigrationStrategy::Preserve));\n        assert!(manager.strategies.contains_key(\u0026MigrationStrategy::Hybrid));\n    }\n\n    #[tokio::test]\n    async fn test_migration_manager_execute() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let store = SynapseMemory::new(embedder.clone());\n\n        // Add a memory\n        let entry = MemoryEntry::builder(MemoryId::new(), \"test\".to_string())\n            .embedding(vec![0.1; 384])\n            .tier(MemoryTier::Synapse)\n            .build();\n        store.store(entry).await.unwrap();\n\n        // Execute migration\n        let manager = MigrationManager::new();\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder);\n        let result = manager.execute(\u0026store, \u0026config).await.unwrap();\n\n        assert_eq!(result.total_memories, 1);\n        assert_eq!(result.reembedded_count, 1);\n    }\n\n    #[test]\n    fn test_migration_config_clone() {\n        let embedder = Arc::new(MockEmbedder::new());\n        let config = MigrationConfig::new(MigrationStrategy::Reembed, embedder)\n            .with_dry_run(true)\n            .with_hybrid_threshold(0.7);\n        let cloned = config.clone();\n\n        assert_eq!(cloned.strategy, config.strategy);\n        assert_eq!(cloned.dry_run, config.dry_run);\n        assert_eq!(cloned.hybrid_threshold, config.hybrid_ cessible only to a specific user\n/// - Agent: Accessible only to a specific agent\n/// - Session: Accessible only within a specific session\n#[derive(Debug, Clone, Serialize, Deserialize, PartialEq, Eq, Hash)]\npub enum MemoryScope {\n    /// Global scope: accessible to all agents and users.\n    Global,\n    /// User scope: accessible only to a specific user.\n    User(String),\n    /// Agent scope: accessible only to a specific agent.\n    Agent(String),\n    /// Session scope: accessible only within a specific session.\n    Session(String),\n}\n\nimpl MemoryScope {\n    /// Check if this scope matches another scope.\n    ///\n    /// Global scope matches all scopes.\n    /// Other scopes match only if they are identical.\n    pub fn matches(\u0026self, other: \u0026MemoryScope) -\u003e bool {\n        match (self, other) {\n            (MemoryScope::Global, _) | (_, MemoryScope::Global) =\u003e true,\n            (MemoryScope::User(a), MemoryScope::User(b)) =\u003e a == b,\n            (MemoryScope::Agent(a), MemoryScope::Agent(b)) =\u003e a == b,\n            (MemoryScope::Session(a), MemoryScope::Session(b)) =\u003e a == b,\n            _ =\u003e false,\n        }\n    }\n\n    /// Get a string representation of the scope.\n    pub fn as_str(\u0026self) -\u003e String {\n        match self {\n            MemoryScope::Global =\u003e \"global\".to_string(),\n            MemoryScope::User(id) =\u003e format!(\"user:{}\", id),\n            MemoryScope::Agent(id) =\u003e format!(\"agent:{}\", id),\n            MemoryScope::Session(id) =\u003e format!(\"session:{}\", id),\n        }\n    }\n}\n\nimpl fmt::Display for MemoryScope {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"{}\", self.as_str())\n    }\n}\n\n/// A single memory entry with content, metadata, and embedding.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct MemoryEntry {\n    /// Unique identifier for this memory.\n    pub id: MemoryId,\n    /// The text content of the memory.\n    pub content: String,\n    /// Arbitrary key-value metadata.\n    pub metadata: std::collections::HashMap\u003cString, String\u003e,\n    /// When this memory was created.\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    /// Importance score (0.0–1.0) for ranking and promotion decisions.\n    pub salience: f32,\n    /// Which tier this memory currently resides in.\n    pub tier: MemoryTier,\n    /// Cached 384-dimensional embedding vector (BGE-small).\n    pub embedding: Option\u003cVec\u003cf32\u003e\u003e,\n    /// Session ID where this memory originated (if applicable).\n    pub source_session_id: Option\u003cString\u003e,\n    /// Scope or visibility of this memory.\n    pub scope: MemoryScope,\n}\n\nimpl MemoryEntry {\n    /// Create a new MemoryEntry with sensible defaults.\n    pub fn new(id: MemoryId, content: String) -\u003e Self {\n        Self {\n            id,\n            content,\n            metadata: std::collections::HashMap::new(),\n            timestamp: chrono::Utc::now(),\n            salience: 0.5,\n            tier: MemoryTier::Synapse,\n            embedding: None,\n            source_session_id: None,\n            scope: MemoryScope::Global,\n        }\n    }\n\n    /// Create a builder for constructing a MemoryEntry with custom fields.\n    pub fn builder(id: MemoryId, content: String) -\u003e MemoryEntryBuilder {\n        MemoryEntryBuilder {\n            id,\n            content,\n            metadata: std::collections::HashMap::new(),\n            timestamp: chrono::Utc::now(),\n            salience: 0.5,\n            tier: MemoryTier::Synapse,\n            embedding: None,\n            source_session_id: None,\n            scope: MemoryScope::Global,\n        }\n    }\n}\n\n/// Builder for constructing MemoryEntry with custom fields.\npub struct MemoryEntryBuilder {\n    id: MemoryId,\n    content: String,\n    metadata: std::collections::HashMap\u003cString, String\u003e,\n    timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    salience: f32,\n    tier: MemoryTier,\n    embedding: Option\u003cVec\u003cf32\u003e\u003e,\n    source_session_id: Option\u003cString\u003e,\n    scope: MemoryScope,\n}\n\nimpl MemoryEntryBuilder {\n    /// Set the salience score (0.0–1.0).\n    pub fn salience(mut self, salience: f32) -\u003e Self {\n        self.salience = salience.clamp(0.0, 1.0);\n        self\n    }\n\n    /// Set the memory tier.\n    pub fn tier(mut self, tier: MemoryTier) -\u003e Self {\n        self.tier = tier;\n        self\n    }\n\n    /// Set the embedding vector.\n    pub fn embedding(mut self, embedding: Vec\u003cf32\u003e) -\u003e Self {\n        self.embedding = Some(embedding);\n        self\n    }\n\n    /// Set the source session ID.\n    pub fn source_session_id(mut self, session_id: String) -\u003e Self {\n        self.source_session_id = Some(session_id);\n        self\n    }\n\n    /// Set the memory scope.\n    pub fn scope(mut self, scope: MemoryScope) -\u003e Self {\n        self.scope = scope;\n        self\n    }\n\n    /// Add a metadata key-value pair.\n    pub fn metadata(mut self, key: String, value: String) -\u003e Self {\n        self.metadata.insert(key, value);\n        self\n    }\n\n    /// Set the timestamp.\n    pub fn timestamp(mut self, timestamp: chrono::DateTime\u003cchrono::Utc\u003e) -\u003e Self {\n        self.timestamp = timestamp;\n        self\n    }\n\n    /// Build the MemoryEntry.\n    pub fn build(self) -\u003e MemoryEntry {\n        MemoryEntry {\n            id: self.id,\n            content: self.content,\n            metadata: self.metadata,\n            timestamp: self.timestamp,\n            salience: self.salience,\n            tier: self.tier,\n            embedding: self.embedding,\n            source_session_id: self.source_session_id,\n            scope: self.scope,\n        }\n    }\n}\n","traces":[{"line":11,"address":[],"length":0,"stats":{"Line":2145}},{"lin  successful operations.\n    pub successful_operations: Arc\u003cAtomicU64\u003e,\n    /// Total number of failed operations.\n    pub failed_operations: Arc\u003cAtomicU64\u003e,\n    /// Total time spent in operations (in milliseconds).\n    pub total_time_ms: Arc\u003cAtomicU64\u003e,\n}\n\nimpl OperationMetrics {\n    /// Create a new OperationMetrics instance.\n    pub fn new() -\u003e Self {\n        Self {\n            total_operations: Arc::new(AtomicU64::new(0)),\n            successful_operations: Arc::new(AtomicU64::new(0)),\n            failed_operations: Arc::new(AtomicU64::new(0)),\n            total_time_ms: Arc::new(AtomicU64::new(0)),\n        }\n    }\n\n    /// Record a successful operation with the given duration in milliseconds.\n    pub fn record_success(\u0026self, duration_ms: u64) {\n        self.total_operations.fetch_add(1, Ordering::Relaxed);\n        self.successful_operations.fetch_add(1, Ordering::Relaxed);\n        self.total_time_ms.fetch_add(duration_ms, Ordering::Relaxed);\n    }\n\n    /// Record a failed operation with the given duration in milliseconds.\n    pub fn record_failure(\u0026self, duration_ms: u64) {\n        self.total_operations.fetch_add(1, Ordering::Relaxed);\n        self.failed_operations.fetch_add(1, Ordering::Relaxed);\n        self.total_time_ms.fetch_add(duration_ms, Ordering::Relaxed);\n    }\n\n    /// Get the total number of operations.\n    pub fn total_operations(\u0026self) -\u003e u64 {\n        self.total_operations.load(Ordering::Relaxed)\n    }\n\n    /// Get the number of successful operations.\n    pub fn successful_operations(\u0026self) -\u003e u64 {\n        self.successful_operations.load(Ordering::Relaxed)\n    }\n\n    /// Get the number of failed operations.\n    pub fn failed_operations(\u0026self) -\u003e u64 {\n        self.failed_operations.load(Ordering::Relaxed)\n    }\n\n    /// Get the total time spent in operations (in milliseconds).\n    pub fn total_time_ms(\u0026self) -\u003e u64 {\n        self.total_time_ms.load(Ordering::Relaxed)\n    }\n\n    /// Get the average time per operation (in milliseconds).\n    pub fn average_time_ms(\u0026self) -\u003e f64 {\n        let total = self.total_operations();\n        if total == 0 {\n            0.0\n        } else {\n            self.total_time_ms() as f64 / total as f64\n        }\n    }\n\n    /// Get the success rate as a percentage.\n    pub fn success_rate(\u0026self) -\u003e f64 {\n        let total = self.total_operations();\n        if total == 0 {\n            100.0\n        } else {\n            (self.successful_operations() as f64 / total as f64) * 100.0\n        }\n    }\n\n    /// Reset all metrics to zero.\n    pub fn reset(\u0026self) {\n        self.total_operations.store(0, Ordering::Relaxed);\n        self.successful_operations.store(0, Ordering::Relaxed);\n        self.failed_operations.store(0, Ordering::Relaxed);\n        self.total_time_ms.store(0, Ordering::Relaxed);\n    }\n}\n\nimpl Default for OperationMetrics {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Observability context for tracking operations.\n#[derive(Clone)]\npub struct ObservabilityContext {\n    /// Metrics for remember operations.\n    pub remember_metrics: OperationMetrics,\n    /// Metrics for recall operations.\n    pub recall_metrics: OperationMetrics,\n    /// Metrics for memorize operations.\n    pub memorize_metrics: OperationMetrics,\n    /// Metrics for forget operations.\n    pub forget_metrics: OperationMetrics,\n    /// Metrics for promote operations.\n    pub promote_metrics: OperationMetrics,\n    /// Metrics for decay operations.\n    pub decay_metrics: OperationMetrics,\n}\n\nimpl ObservabilityContext {\n    /// Create a new ObservabilityContext.\n    pub fn new() -\u003e Self {\n        Self {\n            remember_metrics: OperationMetrics::new(),\n            recall_metrics: OperationMetrics::new(),\n            memorize_metrics: OperationMetrics::new(),\n            forget_metrics: OperationMetrics::new(),\n            promote_metrics: OperationMetrics::new(),\n            decay_metrics: OperationMetrics::new(),\n        }\n    }\n\n    /// Log a summary of all metrics.\n    pub fn log_summary(\u0026self) {\n        info!(\n            \"Memory Operations Summary: remember={} recall={} memorize={} forget={} promote={} decay={}\",\n            self.remember_metrics.total_operations(),\n            self.recall_metrics.total_operations(),\n            self.memorize_metrics.total_operations(),\n            self.forget_metrics.total_operations(),\n            self.promote_metrics.total_operations(),\n            self.decay_metrics.total_operations()\n        );\n\n        debug!(\n            \"Success Rates: remember={:.1}% recall={:.1}% memorize={:.1}% forget={:.1}% promote={:.1}% decay={:.1}%\",\n            self.remember_metrics.success_rate(),\n            self.recall_metrics.success_rate(),\n            self.memorize_metrics.success_rate(),\n            self.forget_metrics.success_rate(),\n            self.promote_metrics.success_rate(),\n            self.decay_metrics.success_rate()\n        );\n\n        debug!(\n            \"Average Latencies (ms): remember={:.2} recall={:.2} memorize={:.2} forget={:.2} promote={:.2} decay={:.2}\",\n            self.remember_metrics.average_time_ms(),\n            self.recall_metrics.average_time_ms(),\n            self.memorize_metrics.average_time_ms(),\n            self.forget_metrics.average_time_ms(),\n            self.promote_metrics.average_time_ms(),\n            self.decay_metrics.average_time_ms()\n        );\n    }\n\n    /// Reset all metrics.\n    pub fn reset_all(\u0026self) {\n        self.remember_metrics.reset();\n        self.recall_metrics.reset();\n        self.memorize_metrics.reset();\n        self.forget_metrics.reset();\n        self.promote_metrics.reset();\n        self.decay_metrics.reset();\n    }\n}\n\nimpl Default for ObservabilityContext {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Timer for measuring operation duration.\npub struct OperationTimer {\n    start: Instant,\n}\n\nimpl OperationTimer {\n    /// Create a new timer.\n    pub fn new() -\u003e Self {\n        Self {\n            start: Instant::now(),\n        }\n    }\n\n    /// Get the elapsed time in milliseconds.\n    pub fn elapsed_ms(\u0026self) -\u003e u64 {\n        self.start.elapsed().as_millis() as u64\n    }\n\n    /// Record the operation as successful in the given metrics.\n    pub fn record_success(self, metrics: \u0026OperationMetrics) {\n        let duration_ms = self.elapsed_ms();\n        metrics.record_success(duration_ms);\n        debug!(\"Operation completed successfully in {}ms\", duration_ms);\n    }\n\n    /// Record the operation as failed in the given metrics.\n    pub fn record_failure(self, metrics: \u0026OperationMetrics, error: \u0026str) {\n        let duration_ms = self.elapsed_ms();\n        metrics.record_failure(duration_ms);\n        warn!(\"Operation failed after {}ms: {}\", duration_ms, error);\n    }\n}\n\nimpl Default for OperationTimer {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_operation_metrics_new() {\n        let metrics = OperationMetrics::new();\n        assert_eq!(metrics.total_operations(), 0);\n        assert_eq!(metrics.successful_operations(), 0);\n        assert_eq!(metrics.failed_operations(), 0);\n        assert_eq!(metrics.total_time_ms(), 0);\n    }\n\n    #[test]\n    fn test_operation_metrics_record_success() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n        assert_eq!(metrics.total_operations(), 1);\n        assert_eq!(metrics.successful_operations(), 1);\n        assert_eq!(metrics.failed_operations(), 0);\n        assert_eq!(metrics.total_time_ms(), 100);\n    }\n\n    #[test]\n    fn test_operation_metrics_record_failure() {\n        let metrics = OperationMetrics::new();\n        metrics.record_failure(50);\n        assert_eq!(metrics.total_operations(), 1);\n        assert_eq!(metrics.successful_operations(), 0);\n        assert_eq!(metrics.failed_operations(), 1);\n        assert_eq!(metrics.total_time_ms(), 50);\n    }\n\n    #[test]\n    fn test_operation_metrics_success_rate() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n        metrics.record_success(100);\n        metrics.record_failure(50);\n        assert_eq!(metrics.total_operations(), 3);\n        assert_eq!(metrics.successful_operations(), 2);\n        assert_eq!(metrics.failed_operations(), 1);\n        assert!((metrics.success_rate() - 66.666).abs() \u003c 0.1);\n    }\n\n    #[test]\n    fn test_operation_metrics_average_time() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n        metrics.record_success(200);\n        metrics.record_success(300);\n        assert_eq!(metrics.total_operations(), 3);\n        assert_eq!(metrics.total_time_ms(), 600);\n        assert!((metrics.average_time_ms() - 200.0).abs() \u003c 0.1);\n    }\n\n    #[test]\n    fn test_operation_metrics_success_rate_empty() {\n        let metrics = OperationMetrics::new();\n        assert_eq!(metrics.success_rate(), 100.0);\n    }\n\n    #[test]\n    fn test_operation_metrics_average_time_empty() {\n        let metrics = OperationMetrics::new();\n        assert_eq!(metrics.average_time_ms(), 0.0);\n    }\n\n    #[test]\n    fn test_operation_metrics_reset() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n        metrics.record_failure(50);\n        assert_eq!(metrics.total_operations(), 2);\n\n        metrics.reset();\n        assert_eq!(metrics.total_operations(), 0);\n        assert_eq!(metrics.successful_operations(), 0);\n        assert_eq!(metrics.failed_operations(), 0);\n        assert_eq!(metrics.total_time_ms(), 0);\n    }\n\n    #[test]\n    fn test_observability_context_new() {\n        let ctx = ObservabilityContext::new();\n        assert_eq!(ctx.remember_metrics.total_operations(), 0);\n        assert_eq!(ctx.recall_metrics.total_operations(), 0);\n        assert_eq!(ctx.memorize_metrics.total_operations(), 0);\n        assert_eq!(ctx.forget_metrics.total_operations(), 0);\n        assert_eq!(ctx.promote_metrics.total_operations(), 0);\n        assert_eq!(ctx.decay_metrics.total_operations(), 0);\n    }\n\n    #[test]\n    fn test_observability_context_reset_all() {\n        let ctx = ObservabilityContext::new();\n        ctx.remember_metrics.record_success(100);\n        ctx.recall_metrics.record_failure(50);\n        ctx.memorize_metrics.record_success(75);\n\n        assert!(ctx.remember_metrics.total_operations() \u003e 0);\n        assert!(ctx.recall_metrics.total_operations() \u003e 0);\n        assert!(ctx.memorize_metrics.total_operations() \u003e 0);\n\n        ctx.reset_all();\n\n        assert_eq!(ctx.remember_metrics.total_operations(), 0);\n        assert_eq!(ctx.recall_metrics.total_operations(), 0);\n        assert_eq!(ctx.memorize_metrics.total_operations(), 0);\n    }\n\n    #[test]\n    fn test_operation_timer_new() {\n        let timer = OperationTimer::new();\n        let elapsed = timer.elapsed_ms();\n        assert!(elapsed \u003c 100); // Should be very fast\n    }\n\n    #[test]\n    fn test_operation_timer_default() {\n        let timer = OperationTimer::default();\n        let elapsed = timer.elapsed_ms();\n        assert!(elapsed \u003c 100);\n    }\n\n    #[test]\n    fn test_observability_context_log_summary() {\n        let ctx = ObservabilityContext::new();\n        ctx.remember_metrics.record_success(100);\n        ctx.recall_metrics.record_failure(50);\n        ctx.memorize_metrics.record_success(75);\n\n        // Wrap in scoped DEBUG subscriber to evaluate log macro arguments\n        let subscriber = tracing_subscriber::fmt()\n            .with_max_level(tracing::Level::DEBUG)\n            .finish();\n        tracing::subscriber::with_default(subscriber, || {\n            ctx.log_summary();\n        });\n    }\n\n    #[test]\n    fn test_operation_metrics_default() {\n        let metrics = OperationMetrics::default();\n        assert_eq!(metrics.total_operations(), 0);\n        assert_eq!(metrics.success_rate(), 100.0);\n    }\n\n    #[test]\n    fn test_observability_context_default() {\n        let ctx = ObservabilityContext::default();\n        assert_eq!(ctx.remember_metrics.total_operations(), 0);\n    }\n\n    #[test]\n    fn test_operation_timer_record_success() {\n        let m = OperationMetrics::new();\n        OperationTimer::new().record_success(\u0026m);\n        assert_eq!(m.successful_operations(), 1);\n        assert_eq!(m.total_operations(), 1);\n    }\n\n    #[test]\n    fn test_operation_timer_record_failure() {\n        let m = OperationMetrics::new();\n        OperationTimer::new().record_failure(\u0026m, \"boom\");\n        assert_eq!(m.failed_operations(), 1);\n        assert_eq!(m.total_operations(), 1);\n    }\n\n    #[test]\n    fn test_operation_metrics_clone() {\n        let metrics = OperationMetrics::new();\n        metrics.record_success(100);\n\n        let cloned = metrics.clone();\n        assert_eq!(cloned.total_operations(), 1);\n        assert_eq!(cloned.successful_operations(), 1);\n        assert_eq!(cloned.total_time_ms(), 100);\n    }\n\n    #[test]\n    fn test_observability_context_clone() {\n        let ctx = ObservabilityContext::new();\n        ctx.remember_metrics.record_success(100);\n\n        let cloned = ctx.clone();\n        assert_eq!(cloned.remember_metrics.total_operations(), 1);\n    }\n}\n","traces":[{"line":21,"address":[],"length":0,"stats":{"Line":72}},{"line":23,"address":[],"length":0,"stats":{"Line":216}},{"line":24,"address":[],"length":0,"stats":{"Line":216}},{"line":25,"address":[],"length":0,"stats":{"Line":216}},{"line":26,"addre stats":{"Line":1}},{"line":186,"address":[],"length":0,"stats":{"Line":4}},{"line":188,"address":[],"length":0,"stats":{"Line":4}},{"line":193,"address":[],"length":0,"stats":{"Line":4}},{"line":194,"address":[],"length":0,"stats":{"Line":4}},{"line":198,"address":[],"length":0,"stats":{"Line":1}},{"line":199,"address":[],"length":0,"stats":{"Line":3}},{"line":200,"address":[],"length":0,"stats":{"Line":3}},{"line":201,"address":[],"length":0,"stats":{"Line":1}},{"line":205,"address":[],"length":0,"stats":{"Line":1}},{"line":206,"address":[],"length":0,"stats":{"Line":3}},{"line":207,"address":[],"length":0,"stats":{"Line":3}},{"line":208,"address":[],"length":0,"stats":{"Line":1}},{"line":213,"address":[],"length":0,"stats":{"Line":1}},{"line":214,"address":[],"length":0,"stats":{"Line":1}}],"covered":90,"coverable":90},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","orchestrator.rs"],"content":"use crate::embedder::Embedder;\nuse crate::error::Result;\nuse crate::lancedb_cortex::LanceDBCortex;\nuse crate::models::{MemoryEntry, MemoryId, MemoryScope, MemoryTier};\nuse crate::synapse::SynapseMemory;\nuse crate::traits::MemoryStore;\nuse std::collections::HashMap;\nuse std::path::Path;\nuse std::sync::Arc;\n\n/// Orchestrates memory operations across Synapse and Cortex tiers.\n///\n/// Provides a unified interface for memory operations with automatic\n/// tier management, blended search, and promotion logic.\npub struct MemoryOrchestrator {\n    synapse: Arc\u003cSynapseMemory\u003e,\n    cortex: Arc\u003cdyn MemoryStore\u003e,\n    embedder: Arc\u003cdyn Embedder\u003e,\n}\n\nimpl MemoryOrchestrator {\n    /// Create a new MemoryOrchestrator with LanceDB Cortex backend.\n    ///\n    /// # Arguments\n    /// * `db_path`    – Path to the LanceDB database directory\n    /// * `table_name` – Name of the LanceDB table\n    /// * `dim`        – Expected embedding dimension\n    /// * `embedder`   – Embedder instance for generating embeddings\n    pub async fn new(\n        db_path: \u0026Path,\n        table_name: \u0026str,\n        dim: usize,\n        embedder: Arc\u003cdyn Embedder\u003e,\n    ) -\u003e Result\u003cSelf\u003e {\n        let synapse = Arc::new(SynapseMemory::new(embedder.clone()));\n        let cortex: Arc\u003cdyn MemoryStore\u003e =\n            Arc::new(LanceDBCortex::new(db_path, table_name, dim, embedder.clone()).await?);\n\n        Ok(Self {\n            synapse,\n            cortex,\n            embedder,\n        })\n    }\n\n    /// Get a reference to the embedder.\n    pub fn embedder(\u0026self) -\u003e Arc\u003cdyn Embedder\u003e {\n        Arc::clone(\u0026self.embedder)\n    }\n\n    /// Get a reference to the Synapse tier.\n    pub fn synapse(\u0026self) -\u003e Arc\u003cSynapseMemory\u003e {\n        Arc::clone(\u0026self.synapse)\n    }\n\n    /// Get a reference to the Cortex tier.\n    pub fn cortex(\u0026self) -\u003e Arc\u003cdyn MemoryStore\u003e {\n        Arc::clone(\u0026self.cortex)\n    }\n\n    /// Store a memory in the Synapse tier (short-term).\n    ///\n    /// # Arguments\n    /// * `content` - The memory content\n    /// * `metadata` - Optional metadata key-value pairs\n    ///\n    /// # Returns\n    /// The ID of the stored memory\n    pub async fn remember(\n        \u0026self,\n        content: String,\n        metadata: HashMap\u003cString, String\u003e,\n    ) -\u003e Result\u003cMemoryId\u003e {\n        let id = MemoryId::new();\n\n        // Generate embedding\n        let embedding = self.embedder.embed(\u0026content).await?;\n\n        // Create entry with embedding\n        let mut entry = MemoryEntry::builder(id, content)\n            .embedding(embedding)\n            .tier(MemoryTier::Synapse)\n            .build();\n\n        entry.metadata = metadata;\n\n        // Store in Synapse\n        self.synapse.store(entry).await?;\n\n        Ok(id)\n    }\n\n    /// Recall memories matching a query from both tiers.\n    ///\n    /// Performs blended search across Synapse and Cortex, merging and\n    /// ranking results by relevance and salience.\n    ///\n    /// # Arguments\n    /// * `query` - The search query\n    /// * `limit` - Maximum number of results to return\n    ///\n    /// # Returns\n    /// Ranked list of matching memories\n    pub async fn recall(\u0026self, query: String, limit: usize) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        // Search both tiers in parallel\n        let synapse_results = self.synapse.retrieve(\u0026query, limit).await?;\n        let cortex_results = self.cortex.retrieve(\u0026query, limit).await?;\n\n        // Merge results\n        let mut all_results = Vec::new();\n        all_results.extend(synapse_results);\n        all_results.extend(cortex_results);\n\n        // Remove duplicates (keep first occurrence)\n        let mut seen = std::collections::HashSet::new();\n        all_results.retain(|entry| seen.insert(entry.id));\n\n        // Sort by salience (descending)\n        all_results.sort_by(|a, b| {\n            b.salience\n                .partial_cmp(\u0026a.salience)\n                .unwrap_or(std::cmp::Ordering::Equal)\n        });\n\n        // Return top N\n        Ok(all_results.into_iter().take(limit).collect())\n    }\n\n    /// Recall memories matching a query and scope from both tiers (Phase 5).\n    ///\n    /// Performs blended search across Synapse and Cortex, filtering by scope,\n    /// and merging and ranking results by relevance and salience.\n    ///\n    /// # Arguments\n    /// * `query` - The search query\n    /// * `scope` - Memory scope filter\n    /// * `limit` - Maximum number of results to return\n    ///\n    /// # Returns\n    /// Ranked list of matching memories within the specified scope\n    pub async fn recall_by_scope(\n        \u0026self,\n        query: String,\n        scope: MemoryScope,\n        limit: usize,\n    ) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        // Search both tiers in parallel with scope filtering\n        let synapse_results = self\n            .synapse\n            .retrieve_by_scope(\u0026query, \u0026scope, limit)\n            .await?;\n        let cortex_results = self.cortex.retrieve_by_scope(\u0026query, \u0026scope, limit).await?;\n\n        // Merge results\n        let mut all_results = Vec::new();\n        all_results.extend(synapse_results);\n        all_results.extend(cortex_results);\n\n        // Remove duplicates (keep first occurrence)\n        let mut seen = std::collections::HashSet::new();\n        all_results.retain(|entry| seen.insert(entry.id));\n\n        // Sort by salience (descending)\n        all_results.sort_by(|a, b| {\n            b.salience\n                .partial_cmp(\u0026a.salience)\n                .unwrap_or(std::cmp::Ordering::Equal)\n        });\n\n        // Return top N\n        Ok(all_results.into_iter().take(limit).collect())\n    }\n    ///\n    /// Moves a memory from short-term to long-term storage.\n    ///\n    /// # Arguments\n    /// * `id` - The ID of the memory to promote\n    pub async fn memorize(\u0026self, id: MemoryId) -\u003e Result\u003c()\u003e {\n        // Retrieve from Synapse\n        if let Some(entry) = self.synapse.list().await?.into_iter().find(|e| e.id == id) {\n            // Create a copy with Cortex tier\n            let mut cortex_entry = entry.clone();\n            cortex_entry.tier = MemoryTier::Cortex;\n\n            // Store in Cortex\n            self.cortex.store(cortex_entry).await?;\n\n            // Delete from Synapse\n            self.synapse.delete(\u0026id).await?;\n\n            Ok(())\n        } else {\n            Err(crate::error::CerebrumError::NotFound(format!(\n                \"Memory {} not found in Synapse\",\n                id\n            )))\n        }\n    }\n\n    /// Delete a memory from both tiers.\n    ///\n    /// # Arguments\n    /// * `id` - The ID of the memory to delete\n    pub async fn forget(\u0026self, id: MemoryId) -\u003e Result\u003c()\u003e {\n        // Try to delete from both tiers (ignore errors if not found)\n        let _ = self.synapse.delete(\u0026id).await;\n        let _ = self.cortex.delete(\u0026id).await;\n\n        Ok(())\n    }\n\n    /// End the current session.\n    ///\n    /// Clears Synapse and optionally promotes high-salience memories to Cortex.\n    ///\n    /// # Arguments\n    /// * `auto_promote_threshold` - Salience threshold for automatic promotion (0.0-1.0)\n    pub async fn end_session(\u0026self, auto_promote_threshold: f32) -\u003e Result\u003c()\u003e {\n        // Get all memories from Synapse\n        let memories = self.synapse.list().await?;\n\n        // Promote high-salience memories\n        for entry in memories {\n            if entry.salience \u003e= auto_promote_threshold {\n                let mut cortex_entry = entry.clone();\n                cortex_entry.tier = MemoryTier::Cortex;\n                self.cortex.store(cortex_entry).await?;\n            }\n        }\n\n        // Clear Synapse\n        self.synapse.clear().await?;\n\n        Ok(())\n    }\n\n    /// Get the number of memories in Synapse.\n    pub async fn synapse_len(\u0026self) -\u003e Result\u003cusize\u003e {\n        Ok(self.synapse.len())\n    }\n\n    /// Get the number of memories in Cortex.\n    pub async fn cortex_len(\u0026self) -\u003e Result\u003cusize\u003e {\n        self.cortex.len().await\n    }\n\n    /// Get all memories from Synapse.\n    pub async fn synapse_list(\u0026self) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        self.synapse.list().await\n    }\n\n    /// Get all memories from Cortex.\n    pub async fn cortex_list(\u0026self) -\u003e Result\u003cVec\u003cMemoryEntry\u003e\u003e {\n        self.cortex.list().await\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use tempfile;\n\n    #[tokio::test]\n    async fn test_orchestrator_new() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n        assert_eq!(orchestrator.cortex_len().await.unwrap(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_remember() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n\n        let memories = orchestrator.synapse_list().await.unwrap();\n        assert_eq!(memories[0].id, id);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_recall() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let results = orchestrator\n            .recall(\"test\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_memorize() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n        assert_eq!(orchestrator.cortex_len().await.unwrap(), 0);\n\n        orchestrator.memorize(id).await.expect(\"Failed to memorize\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n        assert_eq!(orchestrator.cortex_len().await.unwrap(), 1);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_forget() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n\n        orchestrator.forget(id).await.expect(\"Failed to forget\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_end_session_with_promotion() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        // Store memories with different salience levels\n        let _id1 = orchestrator\n            .remember(\"Important memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let _id2 = orchestrator\n            .remember(\"Less important memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Manually set salience (in real scenario, this would be set during remember)\n        let mut memories = orchestrator.synapse_list().await.unwrap();\n        memories[0].salience = 0.9;\n        memories[1].salience = 0.2;\n\n        // Re-store with updated salience\n        orchestrator.forget(_id1).await.ok();\n        orchestrator.forget(_id2).await.ok();\n\n        let _id1 = orchestrator\n            .remember(\"Important memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let _id2 = orchestrator\n            .remember(\"Less important memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Update salience manually\n        let mut synapse_memories = orchestrator.synapse_list().await.unwrap();\n        synapse_memories[0].salience = 0.9;\n        synapse_memories[1].salience = 0.2;\n\n        // End session with threshold 0.5\n        orchestrator\n            .end_session(0.5)\n            .await\n            .expect(\"Failed to end session\");\n\n        // Synapse should be empty\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_blended_recall() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        // Store in Synapse\n        let _id1 = orchestrator\n            .remember(\"Synapse memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Store in Cortex\n        let id2 = orchestrator\n            .remember(\"Cortex memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        orchestrator\n            .memorize(id2)\n            .await\n            .expect(\"Failed to memorize\");\n\n        // Recall should return results from both tiers\n        let results = orchestrator\n            .recall(\"memory\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        assert_eq!(results.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_recall_deduplication() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Promote to Cortex (now in both tiers)\n        orchestrator.memorize(id).await.expect(\"Failed to memorize\");\n\n        // Store another copy in Synapse\n        let _id2 = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        // Recall should deduplicate\n        let results = orchestrator\n            .recall(\"test\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        // Should have 2 unique memories, not duplicates\n        assert_eq!(results.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_orc rator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let _id1 = orchestrator\n            .remember(\"First memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let _id2 = orchestrator\n            .remember(\"Second memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let results = orchestrator\n            .recall(\"memory\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        assert_eq!(results.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_lancedb_memorize() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n\n        orchestrator.memorize(id).await.expect(\"Failed to memorize\");\n\n        // After memorize, memory should still be accessible\n        let results = orchestrator\n            .recall(\"test\".to_string(), 10)\n            .await\n            .expect(\"Failed to recall\");\n\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_lancedb_forget() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 1);\n\n        orchestrator.forget(id).await.expect(\"Failed to forget\");\n\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_lancedb_recall_by_scope() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let _id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        let results = orchestrator\n            .recall_by_scope(\"test\".to_string(), MemoryScope::Global, 10)\n            .await\n            .expect(\"Failed to recall by scope\");\n\n        assert!(!results.is_empty());\n    }\n\n    #[tokio::test]\n    async fn test_orchestrator_lancedb_end_session() {\n        let dir = tempfile::tempdir().unwrap();\n        let embedder: Arc\u003cdyn Embedder\u003e = Arc::new(crate::embedder::MockEmbedder::new());\n        let orchestrator = MemoryOrchestrator::new(dir.path(), \"memories\", 384, embedder)\n            .await\n            .expect(\"Failed to create orchestrator\");\n\n        let _id = orchestrator\n            .remember(\"Test memory\".to_string(), HashMap::new())\n            .await\n            .expect(\"Failed to remember\");\n\n        orchestrator\n            .end_session(0.5)\n            .await\n            .expect(\"Failed to end session\");\n\n        // After end_session, synapse should be empty\n        assert_eq!(orchestrator.synapse_len().await.unwrap(), 0);\n    }\n}\n","traces":[{"line":29,"address":[],"length":0,"stats":{"Line":81}},{"line":35,"address":[],"length":0,"stats":{"Line":324}},{"line":36,"address":[],"length":0,"stats":{"Line":162}},{"line":37,"address":[],"length":0,"stats":{"Line":486}},{"line":39,"address":[],"length":0,"stats":{"Line":81}},{"line":40,"address":[],"length":0,"stats":{"Line":162}},{"line":41,"address":[],"length":0,"stats":{"Line":81}},{"line":42,"address":[],"length":0,"stats":{"Line":81}},{"line":47,"address":[],"length":0,"stats":{"Line":2}},{"line":48,"address":[],"length":0,"stats":{"Line":2}},{"line":52,"address":[],"length":0,"stats":{"Line":2}},{"line":53,"address":[],"length":0,"stats":{"Line":4}},{"line":57,"address":[],"length":0,"stats":{"Line":3}},{"line":58,"address":[],"length":0,"stats":{"Line":3}},{"line":69,"address":[],"length":0,"stats":{"Line":104}},{"line":74,"address":[],"length":0,"stats":{"Line":208}},{"line":77,"address":[],"length":0,"stats":{"Line":312}},{"line":80,"address":[],"length":0,"stats":{"Line":416}},{"line":81,"address":[],"length":0,"stats":{"Line":208}},{"line":82,"address":[],"length":0,"stats":{"Line":208}},{"line":85,"address":[],"length":0,"stats":{"Line":208}},{"line":88,"address":[],"length":0,"stats":{"Line":208}},{"line":90,"address":[],"length":0,"stats":{"Line":104}},{"line":104,"address":[],"length":0,"stats":{"Line":140}},{"line":106,"address":[],"length":0,"stats":{"Line":280}},{"line":107,"address":[],"length":0,"stats":{"Line":276}},{"line":110,"address":[],"length":0,"stats":{"Line":138}},{"line":111,"address":[],"length":0,"stats":{"Line":207}},{"line":112,"address":[],"length":0,"stats":{"Line":207}},{"line":115,"address":[],"length":0,"stats":{"Line":138}},{"line":116,"address":[],"length":0,"stats":{"Line":306}},{"line":119,"address":[],"length":0,"stats":{"Line":163}},{"line":120,"address":[],"length":0,"stats":{"Line":25}},{"line":121,"address":[],"length":0,"stats":{"Line": ddress":[],"length":0,"stats":{"Line":14}},{"line":225,"address":[],"length":0,"stats":{"Line":24}},{"line":226,"address":[],"length":0,"stats":{"Line":8}},{"line":227,"address":[],"length":0,"stats":{"Line":16}},{"line":232,"address":[],"length":0,"stats":{"Line":10}},{"line":234,"address":[],"length":0,"stats":{"Line":10}},{"line":238,"address":[],"length":0,"stats":{"Line":60}},{"line":239,"address":[],"length":0,"stats":{"Line":30}},{"line":243,"address":[],"length":0,"stats":{"Line":22}},{"line":244,"address":[],"length":0,"stats":{"Line":11}},{"line":248,"address":[],"length":0,"stats":{"Line":14}},{"line":249,"address":[],"length":0,"stats":{"Line":7}},{"line":253,"address":[],"length":0,"stats":{"Line":2}},{"line":254,"address":[],"length":0,"stats":{"Line":1}}],"covered":80,"coverable":83},{"path":["/","Users","Shared","PhilipsDev","cerebrum-mcp","crates","cerebrum-core","src","promotion.rs"],"content":"//! Memory promotion strategies for automatic Synapse → Cortex promotion.\n//!\n//! This module provides pluggable promotion strategies that determine when and how\n//! memories should be promoted from short-term (Synapse) to long-term (Cortex) storage.\n\nuse crate::models::MemoryEntry;\n\n/// Trait for memory promotion strategies.\n///\n/// Implementations define different criteria for promoting memories from Synapse to Cortex.\npub trait PromotionStrategy: Send + Sync {\n    /// Calculate a promotion score for a memory (0.0-1.0).\n    ///\n    /// Higher scores indicate stronger candidates for promotion.\n    /// A score of 1.0 means the memory should definitely be promoted.\n    /// A score of 0.0 means the memory should not be promoted.\n    fn score(\u0026self, entry: \u0026MemoryEntry, context: \u0026PromotionContext) -\u003e f32;\n\n    /// Get the name of this strategy.\n    fn name(\u0026self) -\u003e \u0026str;\n}\n\n/// Context information for promotion decisions.\n///\n/// Provides additional data that promotion strategies may use to make decisions.\n#[derive(Clone, Debug)]\npub struct PromotionContext {\n    /// Total number of memories in Synapse\n    pub synapse_total: usize,\n    /// Total number of memories in Cortex\n    pub cortex_total: usize,\n    /// Average salience of memories in Synapse\n    pub avg_salience: f32,\n    /// Maximum salience of memories in Synapse\n    pub max_salience: f32,\n    /// Minimum salience of memories in Synapse\n    pub min_salience: f32,\n}\n\n/// Frequency-based promotion strategy.\n///\n/// Promotes memories that have been accessed frequently.\n/// Requires `access_count` field in MemoryEntry.\npub struct FrequencyBasedPromotion {\n    /// Threshold for access count (memories with count \u003e= threshold are promoted)\n    pub threshold: usize,\n}\n\nimpl FrequencyBasedPromotion {\n    /// Create a new frequency-based promotion strategy.\n    pub fn new(threshold: usize) -\u003e Self {\n        Self { threshold }\n    }\n}\n\nimpl PromotionStrategy for FrequencyBasedPromotion {\n    fn score(\u0026self, entry: \u0026MemoryEntry, _context: \u0026PromotionContext) -\u003e f32 {\n        // Score based on access count (normalized to 0.0-1.0)\n        // Assuming access_count is stored in metadata under \"access_count\"\n        let access_count = entry\n            .metadata\n            .get(\"access_count\")\n            .and_then(|s| s.parse::\u003cusize\u003e().ok())\n            .unwrap_or(0);\n\n        if access_count \u003e= self.threshold {\n            // Normalize: score increases with access count\n            // Cap at 1.0 for very high access counts\n            ((access_count as f32) / (self.threshold as f32 * 2.0)).min(1.0)\n        } else {\n            0.0\n        }\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"FrequencyBased\"\n    }\n}\n\n/// Recency-based promotion strategy.\n///\n/// Promotes memories that have been accessed recently.\n/// Uses the `timestamp` field to determine recency.\npub struct RecencyBasedPromotion {\n    /// Maximum age in seconds for a memory to be considered recent\n    pub max_age_seconds: i64,\n}\n\nimpl RecencyBasedPromotion {\n    /// Create a new recency-based promotion strategy.\n    pub fn new(max_age_seconds: i64) -\u003e Self {\n        Self { max_age_seconds }\n    }\n}\n\nimpl PromotionStrategy for RecencyBasedPromotion {\n    fn score(\u0026self, entry: \u0026MemoryEntry, _context: \u0026PromotionContext) -\u003e f32 {\n        use chrono::Utc;\n\n        let now = Utc::now();\n        let age_seconds = (now - entry.timestamp).num_seconds();\n\n        if age_seconds \u003c= self.max_age_seconds {\n            // Score decreases with age\n            // Recent memories get higher scores\n            1.0 - (age_seconds as f32 / self.max_age_seconds as f32)\n        } else {\n            0.0\n        }\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"RecencyBased\"\n    }\n}\n\n/// Importance-based promotion strategy.\n///\n/// Promotes memories with high salience scores.\npub struct ImportanceBasedPromotion {\n    /// Salience threshold for promotion (0.0-1.0)\n    pub threshold: f32,\n}\n\nimpl ImportanceBasedPromotion {\n    /// Create a new importance-based promotion strategy.\n    pub fn new(threshold: f32) -\u003e Self {\n        Self {\n            threshold: threshold.clamp(0.0, 1.0),\n        }\n    }\n}\n\nimpl PromotionStrategy for ImportanceBasedPromotion {\n    fn score(\u0026self, entry: \u0026MemoryEntry, _context: \u0026PromotionContext) -\u003e f32 {\n        if entry.salience \u003e= self.threshold {\n            entry.salience\n        } else {\n            0.0\n        }\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"ImportanceBased\"\n    }\n}\n\n/// Hybrid promotion strategy combining multiple strategies.\n///\n/// Combines multiple strategies with configurable weights.\npub struct HybridPromotion {\n    strategies: Vec\u003c(Box\u003cdyn PromotionStrategy\u003e, f32)\u003e, // (strategy, weight)\n}\n\nimpl HybridPromotion {\n    /// Create a new hybrid promotion strategy.\n    pub fn new() -\u003e Self {\n        Self {\n            strategies: Vec::new(),\n        }\n    }\n\n    /// Add a strategy with a weight.\n    ///\n    /// Weights are normalized, so they don't need to sum to 1.0.\n    pub fn add_strategy(mut self, strategy: Box\u003cdyn PromotionStrategy\u003e, weight: f32) -\u003e Self {\n        self.strategies.push((strategy, weight));\n        self\n    }\n}\n\nimpl Default for HybridPromotion {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl PromotionStrategy for HybridPromotion {\n    fn score(\u0026self, entry: \u0026MemoryEntry, context: \u0026PromotionContext) -\u003e f32 {\n        if self.strategies.is_empty() {\n            return 0.0;\n        }\n\n        let total_weight: f32 = self.strategies.iter().map(|(_, w)| w).sum();\n        if total_weight == 0.0 {\n            return 0.0;\n        }\n\n        let weighted_score: f32 = self\n            .strategies\n            .iter()\n            .map(|(strategy, weight)| strategy.score(entry, context) * weight)\n            .sum();\n\n        weighted_score / total_weight\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"Hybrid\"\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::models::{MemoryId, MemoryTier};\n    use chrono::Utc;\n    use std::collections::HashMap;\n\n    fn create_test_entry(salience: f32, access_count: usize) -\u003e MemoryEntry {\n        let mut metadata = HashMap::new();\n        metadata.insert(\"access_count\".to_string(), access_count.to_string());\n\n        MemoryEntry {\n            id: MemoryId::new(),\n            content: \"Test memory\".to_string(),\n            metadata,\n            timestamp: Utc::now(),\n            salience,\n            tier: MemoryTier::Synapse,\n            embedding: None,\n            source_session_id: None,\n            scope: crate::models::MemoryScope::Global,\n        }\n    }\n\n    fn create_test_context() -\u003e PromotionContext {\n        PromotionContext {\n            synapse_total: 10,\n            cortex_total: 50,\n            avg_salience: 0.5,\n            max_salience: 0.9,\n            min_salience: 0.1,\n        }\n    }\n\n    #[test]\n    fn test_frequency_based_promotion_above_threshold() {\n        let strategy = FrequencyBasedPromotion::new(5);\n        let entry = create_test_entry(0.5, 10);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.0, \"Should promote high-frequency memories\");\n    }\n\n    #[test]\n    fn test_frequency_based_promotion_below_threshold() {\n        let strategy = FrequencyBasedPromotion::new(5);\n        let entry = create_test_entry(0.5, 2);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.0, \"Should not promote low-frequency memories\");\n    }\n\n    #[test]\n    fn test_importance_based_promotion_above_threshold() {\n        let strategy = ImportanceBasedPromotion::new(0.7);\n        let entry = create_test_entry(0.8, 0);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.8, \"Should promote high-salience memories\");\n    }\n\n    #[test]\n    fn test_importance_based_promotion_below_threshold() {\n        let strategy = ImportanceBasedPromotion::new(0.7);\n        let entry = create_test_entry(0.5, 0);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.0, \"Should not promote low-salience memories\");\n    }\n\n    #[test]\n    fn test_recency_based_promotion_recent() {\n        let strategy = RecencyBasedPromotion::new(3600); // 1 hour\n        let entry = create_test_entry(0.5, 0);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.9, \"Should promote very recent memories\");\n    }\n\n    #[test]\n    fn test_recency_based_promotion_old() {\n        let strategy = RecencyBasedPromotion::new(60); // 1 minute\n        let mut entry = create_test_entry(0.5, 0);\n        // Simulate an old memory by setting timestamp to 2 hours ago\n        entry.timestamp = Utc::now() - chrono::Duration::hours(2);\n        let context = create_test_context();\n\n        let score = strategy.score(\u0026entry, \u0026context);\n        assert_eq!(score, 0.0, \"Should not promote old memories\");\n    }\n\n    #[test]\n    fn test_hybrid_promotion_single_strategy() {\n        let freq_strategy = Box::new(FrequencyBasedPromotion::new(5));\n        let hybrid = HybridPromotion::new().add_strategy(freq_strategy, 1.0);\n\n        let entry = create_test_entry(0.5, 10);\n        let context = create_test_context();\n\n        let score = hybrid.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.0, \"Hybrid should work with single strategy\");\n    }\n\n    #[test]\n    fn test_hybrid_promotion_multiple_strategies() {\n        let freq_strategy = Box::new(FrequencyBasedPromotion::new(5));\n        let importance_strategy = Box::new(ImportanceBasedPromotion::new(0.7));\n\n        let hybrid = HybridPromotion::new()\n            .add_strategy(freq_strategy, 0.5)\n            .add_strategy(importance_strategy, 0.5);\n\n        let entry = create_test_entry(0.8, 10);\n        let context = create_test_context();\n\n        let score = hybrid.score(\u0026entry, \u0026context);\n        assert!(score \u003e 0.0, \"Hybrid should combine multiple strategies\");\n    }\n\n    #[test]\n    fn test_promotion_strategy_name() {\n        let freq = FrequencyBasedPromotion::new(5);\n        assert_eq!(freq.name(), \"FrequencyBased\");\n\n        let importance = ImportanceBasedPromotion::new(0.7);\n        assert_eq!(importance.name(), \"ImportanceBased\");\n\n        let recency = RecencyBasedPromotion::new(3600);\n        assert_eq!(recency.name(), \"RecencyBased\");\n\n        let hybrid = HybridPromotion::new();\n        assert_eq!(hybrid.name(), \"Hybrid\");\n    }\n}\n","traces":[{"line":51,"address":[],"length":0,"stats":{"Line":7}},{"line":57,"address":[],"length":0,"stats":{"Line":6}},{"line":60,"address":[],"length":0,"stats":{"Line":12}},{"line":61,"address":[],"length":0,"stats":{"Line":6}},{"line":63,"address":[],"length":0,"stats":{"Line":14}},{"line":66,"address":[],"length":0,"stats":{"Line":6}},{"line":69,"address":[],"length":0,"stats":{"Line":6}},{"line":71,"address":[],"length":0,"stats":{"Line":3}},{"line":75,"address":[],"length":0,"stats":{"Line":1}},{"line":76,"address":[],"length":0,"stats":{"Line":1}},{"line":91,"address":[],"length":0,"stats":{"Line":4}},{"line":97,"address":[],"length":0,"stats":{"Line":3}},{"line":100,"address":[],"length":0,"stats":{"Line":6}},{"line":101,"address":[],"length":0,"stats":{"Line":9}},{"line":103,"address":[],"length":0,"stats":{"Line":3}},{"line":106,"address":[],"length":0,"stats":{"Line":2}},{"line":108,"address":[],"length":0,"stats":{"Line":1}},{"line":112,"address":[],"length":0,"stats":{"Line":1}},{"line":113,"address":[],"length":0,"stats":{"Line":1}},{"line":127,"address":[],"length":0,"stats":{"Line":6}},{"line":129,"address":[],"length":0,"stats":{"Line":6}},{"line":135,"address":[],"length":0,"stats":{"Line":5}},{"line":136,"address":[],"length":0,"stats":{"Line":5}},{"line":137,"address":[],"length":0,"stats":{"Line":4}},{"line":139,"address":[],"length":0,"stats":{"Line":1}},{"line":143,"address":[],"length":0,"stats":{"Line":1}},{"line":144,"address":[],"length":0,"stats":{"Line":1}},{"line":157,"address":[],"length":0,"stats":{"Line":4}},{"line":159,"address":[],"length":0,"stats":{"Line":4}},{"line":166,"address":[],"length":0,"stats":{"Line":5}},{"line":167,"address":[],"length":0
